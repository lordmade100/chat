<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix Live</title>
    <meta name="theme-color" content="#FF3040">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/T3Nv0Szn/Gemini-Generated-Image-g7omg8g7omg8g7om-removebg-preview.png">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root,[data-theme="light"]{--primary:#0095F6;--primary-rgb:0,149,246;--background:#FFFFFF;--surface:#FFFFFF;--surface2:#EFEFEF;--border:#DBDBDB;--text-primary:#000000;--text-secondary:#737373;--text-muted:#A8A8A8;--like:#FF3040;--live:#FF3040;--live-gradient:linear-gradient(135deg,#FF3040 0%,#FF6B35 100%);}
        [data-theme="dark"]{--primary:#0095F6;--primary-rgb:0,149,246;--background:#000000;--surface:#000000;--surface2:#262626;--border:#363636;--text-primary:#F5F5F5;--text-secondary:#A8A8A8;--text-muted:#737373;--like:#FF3040;--live:#FF3040;--live-gradient:linear-gradient(135deg,#FF3040 0%,#FF6B35 100%);}
        [data-theme="midnight"]{--primary:#C084FC;--background:#09090B;--surface:#09090B;--surface2:#27272A;--border:#3F3F46;--text-primary:#FAFAFA;--text-secondary:#A1A1AA;--text-muted:#71717A;--like:#F472B6;--live:#F472B6;--live-gradient:linear-gradient(135deg,#F472B6 0%,#C084FC 100%);}
        [data-theme="ocean"]{--primary:#06B6D4;--background:#F0F9FF;--surface:#F0F9FF;--surface2:#E0F2FE;--border:#BAE6FD;--text-primary:#0C4A6E;--text-secondary:#0369A1;--text-muted:#7DD3FC;--like:#F43F5E;--live:#F43F5E;--live-gradient:linear-gradient(135deg,#F43F5E 0%,#06B6D4 100%);}
        [data-theme="rose"]{--primary:#E11D48;--background:#FFF1F2;--surface:#FFF1F2;--surface2:#FFE4E6;--border:#FECDD3;--text-primary:#881337;--text-secondary:#9F1239;--text-muted:#FDA4AF;--like:#E11D48;--live:#E11D48;--live-gradient:linear-gradient(135deg,#E11D48 0%,#FDA4AF 100%);}

        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#000;color:#fff;overflow:hidden;height:100dvh;width:100vw;}

        .live-container{position:relative;width:100%;height:100dvh;background:#000;}

        /* Video/Preview Area */
        .video-stage{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
        .video-stage video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
        .video-stage .host-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surface2);color:var(--text-secondary);gap:16px;}
        .video-stage .host-placeholder svg{color:var(--text-muted);}
        .video-stage .host-placeholder p{font-size:15px;font-weight:500;}

        /* Overlay UI */
        .live-overlay{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none;}
        .live-overlay > *{pointer-events:auto;}

        /* Top Bar */
        .live-top{position:absolute;top:0;left:0;right:0;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:12px;z-index:20;background:linear-gradient(to bottom,rgba(0,0,0,0.5) 0%,transparent 100%);}
        .live-back-btn{background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);transition:background 0.2s;}
        .live-back-btn:active{background:rgba(255,255,255,0.3);}
        .live-host-info{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
        .live-host-info img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.3);}
        .live-host-meta{flex:1;min-width:0;}
        .live-host-meta .name{font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:4px;}
        .live-host-meta .viewers{font-size:12px;color:rgba(255,255,255,0.8);display:flex;align-items:center;gap:4px;}
        .live-badge-inline{display:inline-flex;align-items:center;gap:4px;background:var(--live);color:white;font-size:11px;font-weight:800;padding:3px 8px;border-radius:9999px;letter-spacing:0.05em;animation:livePulse 1.8s ease-in-out infinite;}
        .live-dot-inline{width:6px;height:6px;background:white;border-radius:50%;animation:spin 1s linear infinite;}
        .live-actions-top{display:flex;gap:8px;}
        .live-action-btn{background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);transition:all 0.2s;}
        .live-action-btn:active{background:rgba(255,255,255,0.3);transform:scale(0.92);}

        /* Comments Area */
        .live-comments-area{position:absolute;bottom:calc(80px + env(safe-area-inset-bottom));left:0;right:0;padding:0 16px;z-index:15;display:flex;flex-direction:column;justify-content:flex-end;max-height:40vh;pointer-events:none;}
        .live-comments-area > *{pointer-events:auto;}
        .comments-scroller{overflow-y:auto;scrollbar-width:none;display:flex;flex-direction:column;gap:6px;mask-image:linear-gradient(to bottom,transparent 0%,black 15%);-webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 15%);padding-top:20px;}
        .comments-scroller::-webkit-scrollbar{display:none;}
        .live-comment{display:flex;align-items:flex-start;gap:8px;animation:commentSlideIn 0.3s ease-out;max-width:85%;}
        @keyframes commentSlideIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
        .live-comment-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid rgba(255,255,255,0.2);}
        .live-comment-bubble{background:rgba(0,0,0,0.45);backdrop-filter:blur(8px);padding:6px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);color:#fff;font-size:13px;line-height:1.35;word-break:break-word;}
        .live-comment-bubble .author{font-weight:700;color:rgba(255,255,255,0.9);margin-right:4px;}
        .live-comment-bubble .text{color:rgba(255,255,255,0.95);}

        /* Bottom Controls */
        .live-bottom{position:absolute;bottom:0;left:0;right:0;padding:0 16px calc(16px + env(safe-area-inset-bottom));z-index:20;background:linear-gradient(to top,rgba(0,0,0,0.6) 0%,transparent 100%);}
        .live-input-row{display:flex;align-items:center;gap:10px;}
        .live-input-wrap{flex:1;display:flex;align-items:center;background:rgba(255,255,255,0.12);backdrop-filter:blur(12px);border-radius:9999px;padding:8px 14px;border:1px solid rgba(255,255,255,0.08);}
        .live-input-wrap input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:14px;font-family:inherit;}
        .live-input-wrap input::placeholder{color:rgba(255,255,255,0.5);}
        .live-send-btn{background:none;border:none;color:#fff;cursor:pointer;padding:2px;display:flex;align-items:center;justify-content:center;opacity:0.6;transition:opacity 0.2s;}
        .live-send-btn.active{opacity:1;}
        .live-send-btn:active{transform:scale(0.9);}

        .live-bottom-actions{display:flex;align-items:center;gap:12px;margin-top:10px;}
        .live-ctrl-btn{position:relative;display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);color:#fff;cursor:pointer;transition:all 0.2s;}
        .live-ctrl-btn:active{transform:scale(0.92);background:rgba(255,255,255,0.25);}
        .live-ctrl-btn.on{background:var(--primary);border-color:var(--primary);}
        .live-ctrl-btn.danger{background:var(--live);border-color:var(--live);}
        .live-ctrl-btn .ctrl-label{position:absolute;bottom:-18px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.7);white-space:nowrap;}

        .live-end-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:var(--live);color:#fff;border:none;border-radius:9999px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s;font-family:inherit;}
        .live-end-btn:active{opacity:0.85;transform:scale(0.98);}

        /* Host Controls Overlay */
        .host-controls{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.7);backdrop-filter:blur(16px);border-radius:20px;padding:24px;display:none;flex-direction:column;gap:16px;min-width:200px;z-index:30;border:1px solid rgba(255,255,255,0.1);}
        .host-controls.active{display:flex;}
        .host-ctrl-item{display:flex;align-items:center;gap:12px;color:#fff;font-size:15px;font-weight:500;cursor:pointer;padding:8px;border-radius:12px;transition:background 0.2s;}
        .host-ctrl-item:active{background:rgba(255,255,255,0.1);}

        /* Viewer Join Screen */
        .join-screen{position:absolute;inset:0;background:#000;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;text-align:center;}
        .join-screen.active{display:flex;}
        .join-screen img{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--live);margin-bottom:8px;}
        .join-screen h2{color:#fff;font-size:20px;font-weight:700;}
        .join-screen p{color:rgba(255,255,255,0.7);font-size:14px;max-width:280px;line-height:1.4;}
        .join-btn{width:100%;max-width:280px;padding:14px;background:var(--live);color:#fff;border:none;border-radius:9999px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.2s;}
        .join-btn:active{opacity:0.85;}
        .join-btn.secondary{background:rgba(255,255,255,0.15);}

        /* Loading */
        .live-loading{position:absolute;inset:0;background:#000;z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
        .live-loading.active{display:flex;}
        .live-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,48,64,0.5);}50%{box-shadow:0 0 0 8px rgba(255,48,64,0);}}

        /* Heart Animation */
        .floating-heart{position:absolute;color:var(--like);font-size:24px;pointer-events:none;animation:floatHeart 1.2s ease-out forwards;z-index:25;}
        @keyframes floatHeart{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-120px) scale(1.5);opacity:0;}}

        /* Toast */
        .live-toast{position:fixed;top:calc(20px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);color:#fff;padding:10px 20px;border-radius:9999px;font-size:14px;font-weight:500;opacity:0;transition:all 0.3s;z-index:100;pointer-events:none;white-space:nowrap;border:1px solid rgba(255,255,255,0.1);}
        .live-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

        /* Heart burst on double tap */
        .heart-burst{position:absolute;pointer-events:none;z-index:30;}
        .heart-burst svg{width:60px;height:60px;fill:var(--like);filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));animation:heartBurst 0.8s cubic-bezier(0.175,0.885,0.32,1.275) forwards;}
        @keyframes heartBurst{0%{transform:translate(-50%,-50%) scale(0);}40%{transform:translate(-50%,-50%) scale(1.3);}70%{transform:translate(-50%,-50%) scale(0.9);}100%{transform:translate(-50%,-50%) scale(0);opacity:0;}}
    </style>
<base target="_blank">
</head>
<body>

<div class="live-toast" id="live-toast"></div>

<div class="live-loading" id="live-loading">
    <div class="live-spinner"></div>
    <p style="color:rgba(255,255,255,0.7);font-size:14px;">Connecting to live stream...</p>
</div>

<div class="join-screen" id="join-screen">
    <img src="" id="join-host-avatar" alt="Host">
    <div class="live-badge-inline" style="margin-bottom:4px;"><span class="live-dot-inline"></span>LIVE</div>
    <h2 id="join-host-name">Host Name</h2>
    <p id="join-live-title">is live streaming</p>
    <button class="join-btn" onclick="joinLive()">Join Live</button>
    <button class="join-btn secondary" onclick="goBack()" style="margin-top:8px;">Go Back</button>
</div>

<div class="live-container" id="live-container">
    <div class="video-stage" id="video-stage">
        <video id="live-video" autoplay playsinline muted></video>
        <div class="host-placeholder" id="host-placeholder" style="display:none;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="12" cy="12" r="5"/><path d="M12 8v4l3 3"/></svg>
            <p>Camera is off</p>
        </div>
    </div>

    <div class="live-overlay">
        <div class="live-top">
            <button class="live-back-btn" onclick="goBack()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <div class="live-host-info">
                <img src="" id="host-avatar" alt="">
                <div class="live-host-meta">
                    <div class="name" id="host-name">User <span class="live-badge-inline" style="margin-left:6px;"><span class="live-dot-inline"></span>LIVE</span></div>
                    <div class="viewers">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <span id="viewer-count">0</span> watching
                    </div>
                </div>
            </div>
            <div class="live-actions-top">
                <button class="live-action-btn" onclick="toggleMute()" id="mute-btn" title="Toggle sound">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                </button>
                <button class="live-action-btn" onclick="shareLive()" title="Share">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                </button>
            </div>
        </div>

        <div class="live-comments-area" id="comments-area">
            <div class="comments-scroller" id="comments-scroller"></div>
        </div>

        <div class="live-bottom">
            <div class="live-input-row">
                <div class="live-input-wrap">
                    <input type="text" id="chat-input" placeholder="Say something..." oninput="updateSendBtn()" onkeypress="handleChatKey(event)">
                    <button class="live-send-btn" id="send-btn" onclick="sendChat()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
                <button class="live-ctrl-btn" onclick="sendHeart()" style="width:40px;height:40px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </button>
            </div>

            <div class="live-bottom-actions" id="host-controls-bar">
                <button class="live-ctrl-btn" id="cam-btn" onclick="toggleCamera()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                    <span class="ctrl-label">Cam</span>
                </button>
                <button class="live-ctrl-btn" id="mic-btn" onclick="toggleMic()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                    <span class="ctrl-label">Mic</span>
                </button>
                <button class="live-ctrl-btn" id="flip-btn" onclick="flipCamera()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                    <span class="ctrl-label">Flip</span>
                </button>
                <button class="live-end-btn" onclick="confirmEndLive()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    End Live
                </button>
            </div>
        </div>
    </div>
</div>

<!-- End Confirm Modal -->
<div id="end-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
    <div style="background:var(--surface);border-radius:20px;padding:24px;width:85%;max-width:300px;text-align:center;border:1px solid var(--border);">
        <div style="width:56px;height:56px;background:rgba(255,48,64,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--live);">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>
        <h3 style="font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:8px;">End Live Stream?</h3>
        <p style="font-size:14px;color:var(--text-secondary);margin-bottom:24px;line-height:1.4;">Your stream will end immediately and viewers will be disconnected.</p>
        <div style="display:flex;flex-direction:column;gap:10px;">
            <button onclick="endLive()" style="width:100%;padding:12px;background:var(--live);color:#fff;border:none;border-radius:9999px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;">End Now</button>
            <button onclick="closeEndModal()" style="width:100%;padding:12px;background:var(--surface2);color:var(--text-primary);border:none;border-radius:9999px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
import { getDatabase, ref, onValue, onChildAdded, push, set, get, update, remove, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
    authDomain: "fire-b-a8878.firebaseapp.com",
    databaseURL: "https://fire-b-a8878.firebaseio.com",
    projectId: "fire-b-a8878",
    storageBucket: "fire-b-a8878.appspot.com",
    messagingSenderId: "658673187627",
    appId: "1:658673187627:web:6e4c29af661785f0afa36e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23A8A8A8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' style='background-color:%23EFEFEF'%3E%3Cpath d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'/%3E%3Ccircle cx='12' cy='7' r='4'/%3E%3C/svg%3E";

let currentUser = null, currentUserData = null;
let isHost = false, hostUid = null, sessionId = null;
let localStream = null, currentFacing = "user";
let camEnabled = true, micEnabled = true;
let chatListener = null, viewerListener = null, sessionListener = null;
let mySessionRef = null, heartbeatInterval = null;
let joinedAt = null;

const urlParams = new URLSearchParams(window.location.search);
const joinTargetUid = urlParams.get('join');

const savedTheme = localStorage.getItem('vynix_theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);

onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'signup.html'; return; }
    currentUser = user;
    await loadUserData();
    initLive();
});

async function loadUserData() {
    const snap = await get(ref(db, `users/${currentUser.uid}`));
    if (snap.exists()) {
        currentUserData = snap.val();
    } else {
        currentUserData = {
            uid: currentUser.uid,
            username: currentUser.email.split('@')[0],
            photoURL: currentUser.photoURL || DEFAULT_AVATAR
        };
        await set(ref(db, `users/${currentUser.uid}`), currentUserData);
    }
}

async function initLive() {
    if (joinTargetUid) {
        isHost = false;
        hostUid = joinTargetUid;
        await showJoinScreen();
    } else {
        isHost = true;
        hostUid = currentUser.uid;
        await startHostStream();
    }
}

async function showJoinScreen() {
    const hostSnap = await get(ref(db, `users/${hostUid}`));
    const host = hostSnap.val() || {};
    const sessionSnap = await get(ref(db, 'liveSessions'));
    let session = null;
    if (sessionSnap.exists()) {
        sessionSnap.forEach(child => {
            if (child.val().uid === hostUid && child.val().active) {
                session = { id: child.key, ...child.val() };
            }
        });
    }
    if (!session) {
        showToast('This live stream has ended');
        setTimeout(goBack, 2000);
        return;
    }
    sessionId = session.id;
    document.getElementById('join-host-avatar').src = host.photoURL || DEFAULT_AVATAR;
    document.getElementById('join-host-name').textContent = host.username || 'User';
    document.getElementById('join-live-title').textContent = session.title || 'is live streaming';
    document.getElementById('join-screen').classList.add('active');
}

async function joinLive() {
    document.getElementById('join-screen').classList.add('active');
    document.getElementById('live-loading').classList.add('active');
    document.getElementById('host-controls-bar').style.display = 'none';

    try {
        await enterAsViewer();
        document.getElementById('join-screen').classList.remove('active');
        document.getElementById('live-loading').classList.remove('active');
        setupViewerUI();
    } catch (e) {
        showToast('Failed to join live');
        goBack();
    }
}

async function enterAsViewer() {
    joinedAt = Date.now();
    const viewerRef = ref(db, `liveSessions/${sessionId}/viewers/${currentUser.uid}`);
    await set(viewerRef, { joinedAt: serverTimestamp(), username: currentUserData.username, photoURL: currentUserData.photoURL });
    onDisconnect(viewerRef).remove();

    const sessionRef = ref(db, `liveSessions/${sessionId}`);
    onValue(sessionRef, (snap) => {
        if (!snap.exists() || !snap.val().active) {
            showToast('Live stream ended');
            setTimeout(goBack, 2000);
        }
    });

    setupChatListener();
    setupViewerCountListener();
    setupHostInfo();
}

async function startHostStream() {
    document.getElementById('live-loading').classList.add('active');
    document.getElementById('host-controls-bar').style.display = 'flex';

    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: true
        });
        const video = document.getElementById('live-video');
        video.srcObject = localStream;
        video.muted = true;
        video.play();

        await createLiveSession();
        setupChatListener();
        setupViewerCountListener();
        updateHostUI();

        document.getElementById('live-loading').classList.remove('active');
        showToast('You are live!');

        heartbeatInterval = setInterval(async () => {
            if (mySessionRef) await update(mySessionRef, { lastPing: serverTimestamp() });
        }, 15000);

    } catch (err) {
        console.error(err);
        showToast('Camera access denied');
        document.getElementById('live-loading').classList.remove('active');
        document.getElementById('host-placeholder').style.display = 'flex';
        document.getElementById('live-video').style.display = 'none';
        await createLiveSession();
        setupChatListener();
        setupViewerCountListener();
    }
}

async function createLiveSession() {
    const sessionData = {
        uid: currentUser.uid,
        active: true,
        title: `${currentUserData.username}'s live`,
        viewerCount: 0,
        startedAt: serverTimestamp(),
        lastPing: serverTimestamp()
    };
    const newRef = push(ref(db, 'liveSessions'));
    sessionId = newRef.key;
    mySessionRef = newRef;
    await set(newRef, sessionData);

    onDisconnect(newRef).update({ active: false, endedAt: serverTimestamp() });

    const viewersRef = ref(db, `liveSessions/${sessionId}/viewers`);
    onDisconnect(viewersRef).remove();
}

function setupHostInfo() {
    get(ref(db, `users/${hostUid}`)).then(snap => {
        const host = snap.val() || {};
        document.getElementById('host-avatar').src = host.photoURL || DEFAULT_AVATAR;
        document.getElementById('host-name').innerHTML = `${escapeHtml(host.username || 'User')} <span class="live-badge-inline" style="margin-left:6px;"><span class="live-dot-inline"></span>LIVE</span>`;
    });
}

function updateHostUI() {
    document.getElementById('host-avatar').src = currentUserData.photoURL || DEFAULT_AVATAR;
    document.getElementById('host-name').innerHTML = `${escapeHtml(currentUserData.username || 'You')} <span class="live-badge-inline" style="margin-left:6px;"><span class="live-dot-inline"></span>LIVE</span>`;
}

function setupViewerUI() {
    setupHostInfo();
}

function setupChatListener() {
    const chatRef = ref(db, `liveSessions/${sessionId}/chat`);
    chatListener = onChildAdded(chatRef, (snap) => {
        const msg = snap.val();
        if (!msg) return;
        renderChatMessage(msg);
    });
}

function setupViewerCountListener() {
    const viewersRef = ref(db, `liveSessions/${sessionId}/viewers`);
    viewerListener = onValue(viewersRef, (snap) => {
        const count = snap.exists() ? Object.keys(snap.val()).length : 0;
        document.getElementById('viewer-count').textContent = count;
        if (isHost && mySessionRef) {
            update(mySessionRef, { viewerCount: count });
        }
    });
}

function renderChatMessage(msg) {
    const scroller = document.getElementById('comments-scroller');
    const div = document.createElement('div');
    div.className = 'live-comment';
    div.innerHTML = `
        <img src="${msg.photoURL || DEFAULT_AVATAR}" class="live-comment-avatar" onerror="this.src='${DEFAULT_AVATAR}'">
        <div class="live-comment-bubble"><span class="author">${escapeHtml(msg.username || 'User')}:</span><span class="text">${escapeHtml(msg.text)}</span></div>
    `;
    scroller.appendChild(div);
    scroller.scrollTop = scroller.scrollHeight;

    while (scroller.children.length > 50) {
        scroller.removeChild(scroller.firstChild);
    }
}

window.sendChat = async () => {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !sessionId) return;

    try {
        await push(ref(db, `liveSessions/${sessionId}/chat`), {
            uid: currentUser.uid,
            username: currentUserData.username,
            photoURL: currentUserData.photoURL,
            text: text,
            timestamp: serverTimestamp()
        });
        input.value = '';
        updateSendBtn();
    } catch (e) {
        showToast('Failed to send message');
    }
};

window.handleChatKey = (e) => {
    if (e.key === 'Enter') sendChat();
};

window.updateSendBtn = () => {
    const btn = document.getElementById('send-btn');
    const hasText = document.getElementById('chat-input').value.trim().length > 0;
    btn.classList.toggle('active', hasText);
};

window.sendHeart = () => {
    const container = document.getElementById('live-container');
    const heart = document.createElement('div');
    heart.className = 'floating-heart';
    heart.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    heart.style.left = (Math.random() * 60 + 20) + '%';
    heart.style.bottom = '120px';
    container.appendChild(heart);
    setTimeout(() => heart.remove(), 1200);

    if (sessionId) {
        push(ref(db, `liveSessions/${sessionId}/reactions`), {
            type: 'heart',
            uid: currentUser.uid,
            timestamp: serverTimestamp()
        }).catch(() => {});
    }
};

window.toggleCamera = async () => {
    if (!localStream) return;
    const videoTracks = localStream.getVideoTracks();
    if (videoTracks.length === 0) return;

    camEnabled = !camEnabled;
    videoTracks.forEach(t => t.enabled = camEnabled);
    document.getElementById('cam-btn').classList.toggle('on', camEnabled);
    document.getElementById('host-placeholder').style.display = camEnabled ? 'none' : 'flex';
    document.getElementById('live-video').style.display = camEnabled ? 'block' : 'none';
};

window.toggleMic = () => {
    if (!localStream) return;
    const audioTracks = localStream.getAudioTracks();
    if (audioTracks.length === 0) return;

    micEnabled = !micEnabled;
    audioTracks.forEach(t => t.enabled = micEnabled);
    document.getElementById('mic-btn').classList.toggle('on', micEnabled);
};

window.flipCamera = async () => {
    if (!localStream) return;
    currentFacing = currentFacing === "user" ? "environment" : "user";
    localStream.getTracks().forEach(t => t.stop());

    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacing, width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: micEnabled
        });
        const video = document.getElementById('live-video');
        video.srcObject = localStream;
        video.play();
    } catch (e) {
        showToast('Could not switch camera');
    }
};

window.toggleMute = () => {
    const video = document.getElementById('live-video');
    video.muted = !video.muted;
    const btn = document.getElementById('mute-btn');
    if (video.muted) {
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
    } else {
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
    }
};

window.shareLive = async () => {
    const shareData = {
        title: 'Join my live on Vynix',
        url: window.location.origin + window.location.pathname + `?join=${hostUid}`
    };
    try {
        if (navigator.share) {
            await navigator.share(shareData);
        } else {
            await navigator.clipboard.writeText(shareData.url);
            showToast('Link copied!');
        }
    } catch (err) {}
};

window.confirmEndLive = () => {
    if (!isHost) {
        goBack();
        return;
    }
    document.getElementById('end-modal').style.display = 'flex';
};

window.closeEndModal = () => {
    document.getElementById('end-modal').style.display = 'none';
};

window.endLive = async () => {
    closeEndModal();
    if (mySessionRef) {
        await update(mySessionRef, { active: false, endedAt: serverTimestamp() });
    }
    cleanup();
    showToast('Live ended');
    setTimeout(goBack, 1000);
};

window.goBack = () => {
    cleanup();
    window.location.href = 'index.html';
};

function cleanup() {
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
    }
    if (chatListener) {
        try { off(ref(db, `liveSessions/${sessionId}/chat`)); } catch {}
    }
    if (viewerListener) {
        try { off(ref(db, `liveSessions/${sessionId}/viewers`)); } catch {}
    }
    if (sessionListener) {
        try { off(ref(db, `liveSessions/${sessionId}`)); } catch {}
    }
    if (isHost && mySessionRef) {
        update(mySessionRef, { active: false, endedAt: serverTimestamp() }).catch(() => {});
    }
    if (!isHost && sessionId && currentUser) {
        remove(ref(db, `liveSessions/${sessionId}/viewers/${currentUser.uid}`)).catch(() => {});
    }
}

window.addEventListener('beforeunload', cleanup);
window.addEventListener('pagehide', cleanup);

function showToast(msg) {
    const t = document.getElementById('live-toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

// Double tap to heart
let lastTap = 0;
document.getElementById('video-stage').addEventListener('click', (e) => {
    const now = Date.now();
    if (now - lastTap < 300) {
        const heart = document.createElement('div');
        heart.className = 'heart-burst';
        heart.style.left = e.clientX + 'px';
        heart.style.top = e.clientY + 'px';
        heart.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 800);
        sendHeart();
    }
    lastTap = now;
});
</script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix Live Stream</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --primary: #0095F6;
            --background: #000000;
            --surface: #121212;
            --surface2: #262626;
            --border: #363636;
            --text-primary: #F5F5F5;
            --text-secondary: #A8A8A8;
            --live-red: #FF3040;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            max-width: 100%;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media(min-width: 1024px) {
            .app-container {
                max-width: 450px;
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
            }
        }

        /* Views management */
        .view {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            position: absolute;
            inset: 0;
        }
        .view.active {
            display: flex;
        }

        /* Lobby / Setup View styling */
        .lobby-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            gap: 20px;
            text-align: center;
        }
        .logo-mark {
            color: var(--primary);
            margin-bottom: 10px;
        }
        .lobby-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .lobby-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            max-width: 280px;
            margin-bottom: 20px;
        }
        .vynix-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .vynix-input:focus {
            border-color: var(--primary);
        }
        .vynix-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .vynix-btn:active {
            transform: scale(0.98);
        }
        .vynix-btn.secondary {
            background: var(--surface2);
            border: 1px solid var(--border);
        }
        .divider {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin: 10px 0;
        }

        /* Streaming View Layout */
        .video-container {
            position: relative;
            flex: 1;
            background: #000;
            width: 100%;
            height: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Live HUD Elements Overlay */
        .live-overlay-hud {
            position: absolute;
            inset: 0;
            padding: calc(16px + env(safe-area-inset-top)) 16px calc(16px + env(safe-area-inset-bottom)) 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 20%, transparent 60%, rgba(0,0,0,0.6) 100%);
            z-index: 10;
        }
        .hud-interactive {
            pointer-events: auto;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .badge-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .live-badge {
            background: var(--live-red);
            color: white;
            font-size: 12px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .viewer-count {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .close-hud-btn {
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Scrollable overlay comments system */
        .hud-bottom {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .comments-display-area {
            max-height: 220px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 40px;
            scrollbar-width: none;
        }
        .comments-display-area::-webkit-scrollbar {
            display: none;
        }
        .live-msg {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.4;
            align-self: flex-start;
            word-break: break-word;
            max-width: 90%;
            animation: slideInUp 0.2s ease-out;
        }
        .live-msg .username {
            font-weight: 700;
            color: #58C0FF;
            margin-right: 6px;
        }
        .live-msg.system-msg .username {
            color: #FF7BA9;
        }

        /* Action Row inputs */
        .input-action-row {
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
        }
        .hud-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 12px 18px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .hud-input::placeholder {
            color: rgba(255,255,255,0.7);
        }
        .hud-circle-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .hud-circle-btn.heart-btn {
            background: rgba(255, 48, 64, 0.2);
            border-color: rgba(255, 48, 64, 0.4);
            color: var(--live-red);
        }

        /* Floating Hearts Layer animations */
        .hearts-emitter {
            position: absolute;
            right: 20px;
            bottom: 80px;
            width: 60px;
            height: 300px;
            pointer-events: none;
            z-index: 15;
            overflow: hidden;
        }
        .floating-heart {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            color: var(--live-red);
            opacity: 0;
            animation: floatUpHeart 2s ease-in-out forwards;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes floatUpHeart {
            0% { transform: translateX(-50%) translateY(0) scale(0.6); opacity: 0; }
            10% { opacity: 0.9; transform: translateX(-30%) scale(1.1); }
            50% { transform: translateX(20px) translateY(-100px) scale(1); }
            100% { transform: translateX(-20px) translateY(-260px) scale(0.7); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="app-container">

    <div id="lobby-view" class="view active">
        <div class="lobby-content">
            <div class="logo-mark"><i data-feather="video" style="width: 54px; height: 54px;"></i></div>
            <h1 class="lobby-title">Vynix Live</h1>
            <p class="lobby-subtitle">Broadcast your screen or camera instantly, or tune into an existing live feed.</p>
            
            <input type="text" id="stream-title-input" class="vynix-input" placeholder="Give your live stream a title...">
            <button id="start-broadcast-btn" class="vynix-btn">
                <i data-feather="radio"></i> Start Live Broadcast
            </button>
            
            <div class="divider">OR</div>
            
            <input type="text" id="stream-id-input" class="vynix-input" placeholder="Enter Stream ID to join...">
            <button id="join-broadcast-btn" class="vynix-btn secondary">
                <i data-feather="tv"></i> Tune In / Watch
            </button>
        </div>
    </div>

    <div id="stream-view" class="view">
        <div class="video-container">
            <video id="live-video" autoplay playsinline muted></video>
            
            <div class="hearts-emitter" id="hearts-box"></div>

            <div class="live-overlay-hud">
                <div class="hud-top">
                    <div class="badge-row">
                        <div class="live-badge">LIVE</div>
                        <div class="viewer-count">
                            <i data-feather="users" style="width: 14px; height: 14px;"></i>
                            <span id="live-viewer-val">0</span>
                        </div>
                    </div>
                    <button class="close-hud-btn hud-interactive" id="end-stream-btn">
                        <i data-feather="x"></i>
                    </button>
                </div>

                <div class="hud-bottom">
                    <div class="comments-display-area" id="comments-box">
                        </div>

                    <div class="input-action-row hud-interactive">
                        <input type="text" id="chat-message-input" class="hud-input" placeholder="Say something beautiful...">
                        <button class="hud-circle-btn" id="send-chat-btn">
                            <i data-feather="send" style="width: 18px; height: 18px;"></i>
                        </button>
                        <button class="hud-circle-btn heart-btn" id="trigger-heart-btn">
                            <i data-feather="heart" style="fill: currentColor; width: 18px; height: 18px;"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    // 1. Injected Configuration Credentials
    const firebaseConfig = {
        apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
        authDomain: "fire-b-a8878.firebaseapp.com",
        databaseURL: "https://fire-b-a8878.firebaseio.com",
        projectId: "fire-b-a8878",
        storageBucket: "fire-b-a8878.appspot.com",
        messagingSenderId: "658673187627",
        appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    // Initialize Firebase Engine Instance
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // 2. State & Component Hookups
    let localStream = null;
    let peerConnections = {}; // Dynamic mesh collection tracking { viewerId: RTCPeerConnection }
    let activeStreamRef = null;
    let streamId = null;
    let userRole = null; // 'host' or 'viewer'
    let username = "User_" + Math.floor(Math.random() * 9000 + 1000);

    const rtcConfiguration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    feather.replace();

    // Navigation triggers
    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    // Dynamic message printer
    function appendLiveMessage(user, text, isSystem = false) {
        const box = document.getElementById('comments-box');
        const msg = document.createElement('div');
        msg.className = `live-msg ${isSystem ? 'system-msg' : ''}`;
        msg.innerHTML = `<span class="username">${user}</span><span>${text}</span>`;
        box.appendChild(msg);
        box.scrollTop = box.scrollHeight;
    }

    // Visual heart generator animation
    function popHeartVisual() {
        const emitter = document.getElementById('hearts-box');
        const icon = document.createElement('div');
        icon.className = 'floating-heart';
        icon.innerHTML = `<i data-feather="heart" style="fill: currentColor; width: 20px; height: 20px;"></i>`;
        emitter.appendChild(icon);
        feather.replace();

        // Randomize slight variance in drift track
        icon.style.left = Math.floor(Math.random() * 60) + 20 + '%';
        
        setTimeout(() => icon.remove(), 2000);
    }

    // 3. BROADCASTER (HOST LOGIC)
    document.getElementById('start-broadcast-btn').onclick = async () => {
        const title = document.getElementById('stream-title-input').value.trim() || "Untitled Live Feed";
        streamId = "live_" + Math.floor(Math.random() * 90000 + 10000);
        userRole = 'host';

        try {
            // Grab secure camera & audio streams
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('live-video').srcObject = localStream;
            document.getElementById('live-video').muted = true; // Avoid feedback echo loop
            
            switchView('stream-view');
            appendLiveMessage("System", `Broadcast generated! Stream ID: ${streamId}`, true);

            activeStreamRef = db.ref(`streams/${streamId}`);
            
            // Set base node metadata structure
            await activeStreamRef.set({
                id: streamId,
                title: title,
                host: username,
                active: true,
                viewerCount: 0
            });

            // Wipe setup tree cleanly if application context resets
            activeStreamRef.onDisconnect().update({ active: false });

            // Monitor Incoming Viewer Connect Offer Requests
            activeStreamRef.child('viewers').on('child_added', snapshot => {
                const viewerId = snapshot.key;
                handleIncomingViewerOffer(viewerId, snapshot.val());
            });

            // Handle real-time communication events setup (Comments/Likes listeners)
            initSharedFeatures();

        } catch (err) {
            alert("Could not access media hardware capture: " + err.message);
        }
    };

    async function handleIncomingViewerOffer(viewerId, data) {
        if (!data.offer) return;

        const pc = new RTCPeerConnection(rtcConfiguration);
        peerConnections[viewerId] = pc;

        // Add media tracks onto signaling pipeline
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        // Network gathering candidate sync hooks
        pc.onicecandidate = event => {
            if (event.candidate) {
                db.ref(`streams/${streamId}/viewers/${viewerId}/hostCandidates`).push(event.candidate.toJSON());
            }
        };

        // Apply incoming remote connection string structural rules
        await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(data.offer)));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        // Upload connection response data package back down signaling wire
        await db.ref(`streams/${streamId}/viewers/${viewerId}/answer`).set(JSON.stringify(answer));

        // Sync viewer network nodes trickling in
        db.ref(`streams/${streamId}/viewers/${viewerId}/viewerCandidates`).on('child_added', snap => {
            if (snap.val()) {
                pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(e => console.error(e));
            }
        });
    }


    // 4. AUDIENCE (VIEWER LOGIC)
    document.getElementById('join-broadcast-btn').onclick = async () => {
        const targetId = document.getElementById('stream-id-input').value.trim();
        if (!targetId) return alert("Please present a valid stream ID context token.");
        
        streamId = targetId;
        userRole = 'viewer';
        activeStreamRef = db.ref(`streams/${streamId}`);

        // Verify active stream node state validity status
        const meta = await activeStreamRef.once('value');
        if (!meta.exists() || !meta.val().active) {
            return alert("Live feed channel either offline, nonexistent or expired.");
        }

        switchView('stream-view');
        appendLiveMessage("System", "Connecting to stream source...", true);

        // Create random connection node instance identity allocation
        const viewerConnectionId = "view_" + Math.floor(Math.random() * 100000);
        
        const pc = new RTCPeerConnection(rtcConfiguration);
        peerConnections[viewerConnectionId] = pc;

        // Bind playback surface destination link assignments
        pc.ontrack = event => {
            const videoElem = document.getElementById('live-video');
            if (!videoElem.srcObject) {
                videoElem.srcObject = event.streams[0];
                videoElem.muted = false; // Turn on audio for viewers
            }
        };

        pc.onicecandidate = event => {
            if (event.candidate) {
                db.ref(`streams/${streamId}/viewers/${viewerConnectionId}/viewerCandidates`).push(event.candidate.toJSON());
            }
        };

        // Create pipeline request channel structures
        const offer = await pc.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: true });
        await pc.setLocalDescription(offer);

        // Broadcast local offer upstream
        const sessionRef = db.ref(`streams/${streamId}/viewers/${viewerConnectionId}`);
        await sessionRef.set({ offer: JSON.stringify(offer) });

        // Await matching structural signaling return package payload mapping definitions
        sessionRef.child('answer').on('value', async snapshot => {
            if (snapshot.exists()) {
                const ans = snapshot.val();
                await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(ans)));
            }
        });

        // Watch for trickling network routing vectors directly mapped out by host side
        sessionRef.child('hostCandidates').on('child_added', snap => {
            if (snap.val()) {
                pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(e => console.error(e));
            }
        });

        // Increment dynamic concurrent viewers tracking variable counter node indicators
        activeStreamRef.child('viewerCount').transaction(current => (current || 0) + 1);
        sessionRef.onDisconnect().remove(); // Clean viewer signaling node when leaving
        activeStreamRef.child('viewerCount').onDisconnect().transaction(current => Math.max(0, (current || 1) - 1));

        initSharedFeatures();
    };


    // 5. DATA SYNC HOOKS (COMMENTS & INTERACTION HEART SYNC ENGINE)
    function initSharedFeatures() {
        // Track live count view change metrics updates downstream dynamically
        activeStreamRef.child('viewerCount').on('value', snap => {
            document.getElementById('live-viewer-val').innerText = snap.val() || 0;
        });

        // Stream chat distribution synchronization loops engine
        activeStreamRef.child('comments').on('child_added', snap => {
            const data = snap.val();
            appendLiveMessage(data.user, data.msg, data.isSystem);
        });

        // Broadcast heart animation trigger updates across structural boundaries instantly
        activeStreamRef.child('hearts_pulse').on('value', snap => {
            if (snap.val()) popHeartVisual();
        });
    }

    // Handle outbound content message uploads execution processing loop routines
    function submitTextMessage() {
        const input = document.getElementById('chat-message-input');
        const text = input.value.trim();
        if (!text) return;

        activeStreamRef.child('comments').push({
            user: username,
            msg: text,
            isSystem: false,
            timestamp: Date.now()
        });
        input.value = "";
    }

    document.getElementById('send-chat-btn').onclick = submitTextMessage;
    document.getElementById('chat-message-input').onkeydown = (e) => {
        if (e.key === 'Enter') submitTextMessage();
    };

    // Heart click signaling integration
    document.getElementById('trigger-heart-btn').onclick = () => {
        activeStreamRef.child('hearts_pulse').set(firebase.database.ServerValue.increment(1));
    };

    // Session termination / Shutdown clean up execution steps processing logic
    document.getElementById('end-stream-btn').onclick = () => {
        if (userRole === 'host') {
            if (activeStreamRef) activeStreamRef.update({ active: false });
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
        }
        
        // Reset local elements
        document.getElementById('live-video').srcObject = null;
        document.getElementById('comments-box').innerHTML = "";
        
        // Disconnect all peer instances mapping allocations inside arrays blocks loop sets
        Object.keys(peerConnections).forEach(k => {
            peerConnections[k].close();
        });
        peerConnections = {};

        switchView('lobby-view');
        location.reload(); // Hard refresh guarantees complete cleaning of WebRTC states
    };
</script>
</body>
</html>

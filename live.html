<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix Live</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root {
            --primary: #0095F6;
            --background: #000000; /* Live streams look best on full black background */
            --surface: #121212;
            --surface2: #262626;
            --border: #363636;
            --text-primary: #F5F5F5;
            --text-secondary: #A8A8A8;
            --like: #FF3040;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .live-container {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        /* Video Display Frame */
        .video-wrapper {
            position: relative;
            flex: 1;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        /* Stream Loading State Indicator */
        #stream-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 2;
            color: var(--text-secondary);
            gap: 12px;
            font-size: 14px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* HUD Headers & Badges */
        .top-overlay {
            position: absolute;
            top: calc(12px + env(safe-area-inset-top));
            left: 12px;
            right: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }

        .meta-badges {
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
        }

        .badge-live {
            background: var(--like);
            color: #fff;
            font-weight: 800;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-viewers {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            color: #fff;
            font-weight: 600;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .close-btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
        }

        /* Bottom Floating Chat Room Layer */
        .bottom-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 16px calc(16px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            pointer-events: none;
            max-height: 50vh;
        }

        .chat-scroller {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
            mask-image: linear-gradient(to bottom, transparent 0%, white 15%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, white 15%);
            padding-top: 20px;
        }

        .chat-scroller::-webkit-scrollbar { display: none; }

        .chat-msg {
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.4;
            align-self: flex-start;
            max-width: 85%;
            word-wrap: break-word;
        }

        .chat-user {
            font-weight: 700;
            color: var(--primary);
            margin-right: 6px;
        }

        .chat-text {
            color: #fff;
        }

        /* Message Action Input Control bar */
        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }

        .live-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 9999px;
            color: #fff;
            font-size: 14px;
            outline: none;
            backdrop-filter: blur(10px);
        }

        .live-input::placeholder { color: rgba(255,255,255,0.6); }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .send-btn:active { transform: scale(0.9); }

        /* Broadcaster Intermediary Ready Screen */
        #setup-screen {
            position: absolute;
            inset: 0;
            background: var(--surface);
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }

        .setup-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .setup-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            max-width: 280px;
        }

        .start-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0, 149, 246, 0.4);
        }
    </style>
</head>
<body>

    <div class="live-container">
        <div class="video-wrapper">
            <video id="live-video" autoplay playsinline></video>
            
            <div id="stream-placeholder">
                <div class="spinner"></div>
                <span id="placeholder-text">Connecting to stream source...</span>
            </div>
        </div>

        <div class="top-overlay">
            <div class="meta-badges">
                <div class="badge-live">LIVE</div>
                <div class="badge-viewers">
                    <i data-feather="eye" style="width:14px; height:14px;"></i>
                    <span id="viewer-count">0</span>
                </div>
            </div>
            <button class="close-btn" onclick="exitLive()">
                <i data-feather="x" style="width:20px; height:20px;"></i>
            </button>
        </div>

        <div class="bottom-overlay">
            <div class="chat-scroller" id="chat-messages"></div>
            <div class="input-row">
                <input type="text" id="chat-input" class="live-input" placeholder="Say something..." onkeydown="if(event.key==='Enter') sendLiveMessage()">
                <button class="send-btn" onclick="sendLiveMessage()">
                    <i data-feather="send" style="width:16px; height:16px; margin-left: 2px;"></i>
                </button>
            </div>
        </div>

        <div id="setup-screen">
            <i data-feather="video" style="width:48px; height:48px; color: var(--primary); margin-bottom: 16px;"></i>
            <div class="setup-title">Go Live on Vynix</div>
            <div class="setup-desc">Your followers will be able to watch your broadcast in real time.</div>
            <button class="start-btn" onclick="startBroadcasting()">Start Live Stream</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 🚨 IMPORTANT: Replace with your exact Firebase project config credentials
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const database = firebase.database();
        const auth = firebase.auth();

        // Detect launch context parameters (?mode=host or ?mode=viewer&id=HOST_UID)
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'viewer';
        const targetJoinUid = urlParams.get('id');

        let currentUser = null;
        let localStream = null;
        let peerConnections = {}; // Track connection per viewer for host room: { viewerUid: RTCPeerConnection }
        let singlePeerConnection = null; // Track connection to host for viewer
        let targetSessionRefKey = null;

        // Public reliable STUN servers for WebRTC NAT traversal
        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                feather.replace();
                initLiveStreamSession();
            } else {
                alert("Please log in to enter live sessions.");
                window.location.href = "index.html";
            }
        });

        function initLiveStreamSession() {
            if (mode === 'host') {
                targetSessionRefKey = currentUser.uid;
                document.getElementById('setup-screen').style.display = 'flex';
                document.getElementById('placeholder-text').innerText = "Setting up local camera feed...";
                
                // Get broadcaster media capture devices ahead of time
                navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                    .then(stream => {
                        localStream = stream;
                        const videoEl = document.getElementById('live-video');
                        videoEl.srcObject = stream;
                        videoEl.muted = true; // Avoid feedback looping on host hardware
                        document.getElementById('stream-placeholder').style.display = 'none';
                    })
                    .catch(err => {
                        console.error("Camera access failed:", err);
                        alert("Camera or Microphone permissions are mandatory to host a stream.");
                    });
            } else {
                if (!targetJoinUid) {
                    alert("Invalid Live Stream ID.");
                    window.location.href = "index.html";
                    return;
                }
                targetSessionRefKey = targetJoinUid;
                document.getElementById('setup-screen').style.display = 'none';
                connectAsViewer();
            }

            // Bind the active engagement pipelines immediately
            setupLiveChatAndCounters();
        }

        // ========================================================
        // HOST BROADCASTER PIPELINE MANAGEMENT
        // ========================================================
        function startBroadcasting() {
            document.getElementById('setup-screen').style.display = 'none';
            
            const sessionRef = database.ref(`live_sessions/${currentUser.uid}`);
            sessionRef.set({
                status: "live",
                hostName: currentUser.displayName || "Vynix Creator",
                hostAvatar: currentUser.photoURL || "",
                viewerCount: 0,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            });

            // Disconnect handlers to perform cleanup safely
            sessionRef.onDisconnect().remove();
            database.ref(`live_sessions/${currentUser.uid}/signals`).onDisconnect().remove();

            // Actively listen for incoming unique webRTC negotiation channels launched by viewers
            database.ref(`live_sessions/${currentUser.uid}/signals`).on('child_added', snapshot => {
                const viewerUid = snapshot.key;
                handleIncomingViewerConnection(viewerUid);
            });
        }

        function handleIncomingViewerConnection(viewerUid) {
            const pc = new RTCPeerConnection(rtcConfig);
            peerConnections[viewerUid] = pc;

            // Attach host media tracks to the peer connection container instance
            if (localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }

            // Collect local negotiation icecandidates and push to viewer pipeline branch
            pc.onicecandidate = event => {
                if (event.candidate) {
                    database.ref(`live_sessions/${currentUser.uid}/signals/${viewerUid}/broadcasterCandidates`).push(event.candidate.toJSON());
                }
            };

            const viewerSignalRef = database.ref(`live_sessions/${currentUser.uid}/signals/${viewerUid}`);

            // Fetch and set remote session details from viewer offer structural payload
            viewerSignalRef.child('offer').once('value', async snapshot => {
                const offer = snapshot.val();
                if (!offer) return;

                await pc.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                // Publish generated answer session verification state matching viewer expectation
                viewerSignalRef.child('answer').set({
                    type: answer.type,
                    sdp: answer.sdp
                });
            });

            // Stream icecandidate components generated continuously on client layer
            viewerSignalRef.child('viewerCandidates').on('child_added', snapshot => {
                const candidate = snapshot.val();
                if (candidate) {
                    pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => console.error(e));
                }
            });
        }

        // ========================================================
        // PARTICIPANT VIEWER PIPELINE MANAGEMENT
        // ========================================================
        async function connectAsViewer() {
            // Manage and sync room audience sizes safely using transactional shifts
            const countRef = database.ref(`live_sessions/${targetSessionRefKey}/viewerCount`);
            countRef.transaction(current => (current || 0) + 1);
            countRef.onDisconnect().transaction(current => (current ? current - 1 : 0));

            singlePeerConnection = new RTCPeerConnection(rtcConfig);

            // Catch remote live streams pushed down by the remote stream host
            singlePeerConnection.ontrack = event => {
                const videoEl = document.getElementById('live-video');
                if (event.streams && event.streams[0]) {
                    videoEl.srcObject = event.streams[0];
                    
                    // ✨ CRITICAL: Hide the "Connecting..." placeholder view now that data is arriving!
                    document.getElementById('stream-placeholder').style.display = 'none';
                }
            };

            singlePeerConnection.onicecandidate = event => {
                if (event.candidate) {
                    database.ref(`live_sessions/${targetSessionRefKey}/signals/${currentUser.uid}/viewerCandidates`).push(event.candidate.toJSON());
                }
            };

            const signalRef = database.ref(`live_sessions/${targetSessionRefKey}/signals/${currentUser.uid}`);

            // Initialize structural downstream subscription negotiation offer
            const offer = await singlePeerConnection.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: true });
            await singlePeerConnection.setLocalDescription(offer);

            await signalRef.set({
                offer: {
                    type: offer.type,
                    sdp: offer.sdp
                }
            });

            // Await processing confirmation verification response parameters from remote broadcaster
            signalRef.child('answer').on('value', async snapshot => {
                const answer = snapshot.val();
                if (answer && singlePeerConnection.signalingState !== "stable") {
                    await singlePeerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                }
            });

            signalRef.child('broadcasterCandidates').on('child_added', snapshot => {
                const candidate = snapshot.val();
                if (candidate) {
                    singlePeerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => console.error(e));
                }
            });

            // Gracefully handle live suspension signals dispatched by space moderators
            database.ref(`live_sessions/${targetSessionRefKey}/status`).on('value', snapshot => {
                if (snapshot.exists() && snapshot.val() !== "live") {
                    alert("This live stream has ended.");
                    exitLive();
                }
            });
        }

        // ========================================================
        // REAL-TIME ENGAGEMENT ARCHITECTURE
        // ========================================================
        function setupLiveChatAndCounters() {
            // Bind Audience Count Node changes
            database.ref(`live_sessions/${targetSessionRefKey}/viewerCount`).on('value', snapshot => {
                document.getElementById('viewer-count').innerText = snapshot.val() || 0;
            });

            // Bind Room Comments Event Streams
            const chatMessagesContainer = document.getElementById('chat-messages');
            database.ref(`live_sessions/${targetSessionRefKey}/chat`).limitToLast(40).on('child_added', snapshot => {
                const data = snapshot.val();
                
                const msgEl = document.createElement('div');
                msgEl.className = 'chat-msg';
                msgEl.innerHTML = `<span class="chat-user">${escapeHtml(data.username)}</span><span class="chat-text">${escapeHtml(data.text)}</span>`;
                
                chatMessagesContainer.appendChild(msgEl);
                chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
            });
        }

        function sendLiveMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            database.ref(`live_sessions/${targetSessionRefKey}/chat`).push({
                uid: currentUser.uid,
                username: currentUser.displayName || "Anonymous User",
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            input.value = "";
        }

        function exitLive() {
            if (mode === 'viewer') {
                database.ref(`live_sessions/${targetSessionRefKey}/viewerCount`).transaction(current => (current ? current - 1 : 0));
                if (singlePeerConnection) singlePeerConnection.close();
            } else {
                database.ref(`live_sessions/${currentUser.uid}`).remove();
                if (localStream) localStream.getTracks().forEach(track => track.stop());
                Object.values(peerConnections).forEach(pc => pc.close());
            }
            window.location.href = "index.html";
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>

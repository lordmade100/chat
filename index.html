    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Theme Definitions ── */
        :root {
            --primary:#6C63FF;
            --primary-rgb:108,99,255;
            --primary-gradient:linear-gradient(135deg,#6C63FF 0%,#9B59B6 100%);
            --danger:#FF5370;
            --online:#2ECC71;
            --accent-glow:rgba(108,99,255,0.18);
        }

        /* Light Mode (New Default) */
        [data-theme="light"] {
            --background:#F8F9FA;
            --surface:#FFFFFF;
            --surface2:#F0F2F5;
            --surface3:#E4E6EB;
            --border:rgba(0,0,0,0.08);
            --border2:rgba(0,0,0,0.04);
            --text-primary:#1C1E21;
            --text-secondary:#65676B;
            --text-muted:#8D949E;
            --shadow-sm:0 2px 12px rgba(0,0,0,0.05);
            --shadow-md:0 16px 48px rgba(0,0,0,0.1);
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --background:#0E0E14;
            --surface:#16161F;
            --surface2:#1E1E2A;
            --surface3:#252535;
            --border:rgba(255,255,255,0.07);
            --border2:rgba(255,255,255,0.04);
            --text-primary:#F0F0FF;
            --text-secondary:#9898B0;
            --text-muted:#5A5A75;
            --shadow-sm:0 2px 12px rgba(0,0,0,0.4);
            --shadow-md:0 16px 48px rgba(0,0,0,0.6);
        }

        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
        input,textarea{user-select:text;-webkit-user-select:text;}
        img,.avatar,.nav-item,.bottom-nav,.chat-list-item{-webkit-touch-callout:none!important;-webkit-user-drag:none!important;}

        body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--background);color:var(--text-primary);-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-bottom:calc(90px + env(safe-area-inset-bottom)); transition: background 0.3s, color 0.3s;}

        .app-container{max-width:100%;margin:0 auto;padding:16px;}
        @media(min-width:768px){.app-container{max-width:480px;margin:0 auto;min-height:100vh;padding:24px 0;}}

        /* ── Custom Modals & Dialogs ── */
        .custom-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); z-index:10000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
        .custom-modal-overlay.active { opacity:1; pointer-events:auto; }
        .custom-modal-box { background:var(--surface); border-radius:20px; padding:24px; width:90%; max-width:340px; box-shadow:var(--shadow-md); transform:scale(0.95); transition:transform 0.2s; border:1px solid var(--border); }
        .custom-modal-overlay.active .custom-modal-box { transform:scale(1); }
        .cm-title { font-size:18px; font-weight:800; color:var(--text-primary); margin-bottom:8px; }
        .cm-message { font-size:14px; color:var(--text-secondary); line-height:1.5; margin-bottom:24px; }
        .cm-actions { display:flex; gap:12px; justify-content:flex-end; }
        .cm-btn { padding:10px 18px; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; border:none; transition:all 0.15s; }
        .cm-btn.cancel { background:var(--surface2); color:var(--text-primary); }
        .cm-btn.confirm { background:var(--danger); color:white; box-shadow:0 4px 12px rgba(255,83,112,0.3); }
        .cm-btn:active { transform:scale(0.95); }

        /* ── Desktop two-panel layout ── */
        @media(min-width:900px){
            body{padding-bottom:0;overflow:hidden;height:100vh;}
            .desktop-layout{display:flex;height:100vh;overflow:hidden;}
            .sidebar{width:340px;min-width:300px;max-width:380px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);height:100vh;overflow:hidden;border-right:1px solid var(--border);}
            .sidebar-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 8px;}
            .sidebar-tab{flex:1;padding:16px 0 14px;border:none;background:transparent;color:var(--text-muted);font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all 0.2s;border-bottom:2px solid transparent;position:relative;}
            .sidebar-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
            .sidebar-tab .nav-badge{position:absolute;top:10px;right:calc(50% - 20px);background:var(--danger);color:white;font-size:9px;font-weight:800;border-radius:10px;min-width:17px;height:17px;display:none;align-items:center;justify-content:center;padding:0 4px;}
            .sidebar-tab .nav-badge.show{display:flex;}
            .sidebar-header{padding:14px 16px 12px;background:var(--surface);border-bottom:1px solid var(--border);}
            .sidebar-header h2{font-size:20px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
            .sidebar-content{flex:1;overflow-y:auto;padding:8px 12px;}
            .sidebar-scroll{flex:1;overflow-y:auto;}
            .main-panel{flex:1;display:flex;flex-direction:column;background:var(--background);height:100vh;overflow:hidden;position:relative;}
            .chat-list-item{border-radius:12px;}
            .chat-window{position:static!important;transform:none!important;visibility:visible!important;flex:1;display:flex;flex-direction:column;height:100%;box-shadow:none!important;transition:none!important;}
            .chat-window.desktop-hidden{display:none;}
            .bottom-nav-container,.app-container{display:none;}
            .bottom-sheet-overlay{padding:20px;}
            .bottom-sheet-overlay .bottom-sheet{max-width:460px;border-radius:24px;}
            .sidebar-profile{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);}
            .sidebar-profile-avatar{width:40px;height:40px;border-radius:12px;object-fit:cover;background:var(--surface2);cursor:pointer;flex-shrink:0;}
            .sidebar-profile-name{font-size:14px;font-weight:700;color:var(--text-primary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
            .sidebar-icon-btn{background:var(--surface2);border:none;color:var(--text-secondary);width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
            .sidebar-icon-btn:hover{background:var(--surface3);color:var(--primary);}
            .desktop-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--text-muted);}
            .desktop-empty-icon{width:80px;height:80px;border-radius:24px;background:var(--accent-glow);display:flex;align-items:center;justify-content:center;}
        }
        @media(max-width:899px){ .desktop-layout,.sidebar,.main-panel{display:contents;} }

        .view-container{display:none;width:100%;animation:fadeSlide 0.28s cubic-bezier(0.16,1,0.3,1);}
        .view-container.active{display:block;}
        @keyframes fadeSlide{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        @keyframes shimmerAnimate{0%{background-position:-200% 0;}100%{background-position:200% 0;}}

        /* ── Header & Navigation ── */
        .header{margin-bottom:18px;padding:8px 4px;display:flex;align-items:center;justify-content:space-between;}
        .header h2{font-size:24px;font-weight:800;color:var(--text-primary);}
        .header-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-secondary);width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.18s;}
        
        .tab-switcher{display:flex;background:var(--surface2);border-radius:14px;padding:4px;margin-bottom:16px;gap:2px;border:1px solid var(--border);}
        .tab-pill{flex:1;padding:8px 0;border-radius:10px;border:none;background:transparent;color:var(--text-muted);font-size:13px;font-weight:700;cursor:pointer;}
        .tab-pill.active{background:var(--surface3);color:var(--text-primary);box-shadow:0 2px 8px rgba(0,0,0,0.05);}
        .tab-pill .pill-badge{background:var(--danger);color:white;border-radius:8px;min-width:18px;height:18px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;}
        .tab-pill .pill-badge.hidden{display:none;}

        .search-container{padding:0 4px 14px;}
        .search-box{display:flex;align-items:center;background:var(--surface2);border-radius:12px;padding:10px 14px;border:1px solid var(--border);}
        .search-box i{color:var(--text-muted);margin-right:10px;flex-shrink:0;}
        .search-box input{border:none;background:transparent;outline:none;width:100%;font-size:14px;color:var(--text-primary);font-family:inherit;}

        .bottom-nav-container{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:0;right:0;display:flex;justify-content:center;z-index:100;padding:0 24px;}
        .bottom-nav{background:var(--surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);padding:8px 24px;display:flex;justify-content:space-between;align-items:center;border-radius:28px;width:100%;max-width:320px;box-shadow:var(--shadow-sm);}
        .nav-item{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;width:48px;height:48px;background:none;border:none;cursor:pointer;color:var(--text-muted);border-radius:14px;}
        .nav-item.active{color:var(--primary);background:var(--accent-glow);}
        .nav-avatar-wrapper{width:28px;height:28px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;border:2px solid transparent;}
        .nav-item.active .nav-avatar-wrapper{border-color:var(--primary);}
        .nav-avatar-img{width:100%;height:100%;object-fit:cover;}
        .nav-badge{position:absolute;top:6px;right:6px;background:var(--danger);color:white;font-size:9px;font-weight:800;border-radius:8px;min-width:16px;height:16px;display:none;align-items:center;justify-content:center;}
        .nav-badge.show{display:flex;}

        /* ── Chat Cards & Shimmer ── */
        .chats-holder{display:flex;flex-direction:column;gap:2px;}
        .chat-list-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:transparent;border-radius:12px;cursor:pointer;border:1px solid transparent;}
        .chat-list-item:hover,.chat-list-item.pressing{background:var(--surface2);}
        .avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--surface2);}
        .chat-info{flex:1;min-width:0;}
        .chat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
        .chat-name{font-weight:700;font-size:14px;color:var(--text-primary);}
        .chat-time{font-size:11px;color:var(--text-muted);flex-shrink:0;}
        .chat-preview{font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .chat-preview.unread{font-weight:600;color:var(--text-primary);}
        .unread-badge{background:var(--primary);color:white;border-radius:8px;min-width:20px;height:20px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 6px;}
        
        .shimmer-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:transparent;}
        .shimmer-element{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmerAnimate 1.5s infinite linear;border-radius:8px;}
        .shimmer-avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;}
        .shimmer-line{height:12px;margin-bottom:8px;}

        /* ── Chat Window ── */
        .chat-window{position:fixed;inset:0;background:var(--background);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.22,1,0.36,1);visibility:hidden;}
        .chat-window.active{transform:translateX(0);visibility:visible;}
        .chat-topbar{display:flex;align-items:center;gap:12px;padding:calc(14px + env(safe-area-inset-top)) 16px 14px;background:var(--surface);flex-shrink:0;border-bottom:1px solid var(--border);}
        .back-btn{background:var(--surface2);border:none;color:var(--text-secondary);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
        .messages-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:6px;}
        .message-wrapper{display:flex;flex-direction:column;max-width:74%;}
        .message-wrapper.me{align-self:flex-end;align-items:flex-end;}
        .message-wrapper.other{align-self:flex-start;align-items:flex-start;}
        .message-bubble{padding:10px 14px;font-size:14px;line-height:1.5;word-break:break-word;}
        .message-wrapper.me .message-bubble{background:var(--primary-gradient);color:white;border-radius:18px 18px 4px 18px;box-shadow:0 2px 12px rgba(var(--primary-rgb),0.25);}
        .message-wrapper.other .message-bubble{background:var(--surface2);color:var(--text-primary);border-radius:18px 18px 18px 4px;border:1px solid var(--border);}
        .message-time{font-size:10px;color:var(--text-muted);margin-top:3px;padding:0 4px; display:flex; align-items:center; gap:4px;}

        /* Typing indicator animation */
        .typing-indicator { display: inline-flex; align-items: center; gap: 3px; padding: 6px 10px; background: var(--surface2); border-radius: 18px; border: 1px solid var(--border); }
        .typing-dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Input bar & Send Button variants */
        .input-bar{padding:12px 16px calc(12px + env(safe-area-inset-bottom));display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);}
        .chat-input-wrapper{flex:1;background:var(--surface2);border-radius:20px;padding:10px 16px;display:flex;align-items:center;min-height:44px;border:1px solid var(--border);}
        .chat-input-wrapper textarea{flex:1;border:none;background:transparent;outline:none;font-size:14px;color:var(--text-primary);font-family:inherit;resize:none;max-height:120px;line-height:1.4;}
        .send-btn{background:var(--primary-gradient);border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:white;box-shadow:0 4px 16px rgba(var(--primary-rgb),0.35);transition:all 0.18s;}
        .send-btn:hover{transform:scale(1.06);}

        /* ── Bottom Sheets ── */
        .bottom-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.22s;}
        .bottom-sheet-overlay.active{opacity:1;pointer-events:auto;}
        .bottom-sheet{width:100%;background:var(--surface);border-radius:24px 24px 0 0;padding:20px 20px calc(24px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:0 -12px 48px rgba(0,0,0,0.2);}
        .bottom-sheet-overlay.active .bottom-sheet{transform:translateY(0);}
        .sheet-handle{width:32px;height:4px;background:var(--surface3);border-radius:999px;margin:0 auto 16px;flex-shrink:0;}
        .sheet-title{font-size:11px;font-weight:700;color:var(--text-muted);text-align:center;margin-bottom:16px;text-transform:uppercase;}
        .sheet-btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:1px solid var(--border);background:var(--surface2);color:var(--text-primary);display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;cursor:pointer;}
        .sheet-btn.danger{background:rgba(255,83,112,0.08);color:var(--danger);border-color:rgba(255,83,112,0.12);}
        .sheet-btn.primary{background:var(--primary-gradient);color:white;border-color:transparent;}
        .sheet-btn.transparent{background:transparent;color:var(--text-muted);border-color:transparent;}
        .sheet-scroll-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
        .sheet-input{width:100%;padding:14px 16px;border-radius:16px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-primary);font-size:16px;font-family:inherit;outline:none;margin-bottom:12px;}
        .sheet-section-label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:0.8px;text-transform:uppercase;padding:4px 4px 8px;}

        /* ── Profile & Discover Elements ── */
        .profile-x-card{background:var(--surface);border-radius:16px;overflow:hidden;border:1px solid var(--border);margin-top:8px;}
        .profile-x-banner{width:100%;height:120px;background:var(--primary-gradient);position:relative;}
        .profile-x-banner img{width:100%;height:100%;object-fit:cover;}
        .profile-x-body{padding:0 18px 18px;}
        .profile-x-avatar-row{display:flex;align-items:flex-end;justify-content:space-between;margin-top:-34px;margin-bottom:12px;}
        .profile-x-avatar{width:68px;height:68px;border-radius:50%;object-fit:cover;border:3px solid var(--surface);background:var(--surface2);}
        .profile-x-actions{display:flex;gap:8px;}
        .profile-x-btn{padding:7px 16px;border-radius:9999px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-primary);}
        .profile-x-name{font-size:18px;font-weight:800;display:flex;align-items:center;gap:6px;}
        .profile-x-handle{font-size:13px;color:var(--text-muted);margin-top:2px;}
        .profile-x-bio{font-size:13px;color:var(--text-secondary);line-height:1.55;margin-top:10px;}
        .profile-x-meta{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;}
        .profile-x-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);}
        
        .discover-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 4px 0;position:relative;min-height:calc(100vh - 220px);}
        .discover-stack{position:relative;width:100%;max-width:380px;height:520px;margin:0 auto;}
        .discover-card{position:absolute;inset:0;border-radius:24px;overflow:hidden;cursor:grab;touch-action:none;box-shadow:var(--shadow-md);transition:box-shadow 0.2s;}
        .discover-card img{width:100%;height:100%;object-fit:cover;}
        .discover-card-gradient{position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 100%);}
        .discover-card-info{position:absolute;bottom:0;left:0;right:0;padding:22px 20px 26px;}
        .discover-card-name{font-size:24px;font-weight:800;color:white;}
        .discover-actions{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:22px;}
        .disc-btn{width:54px;height:54px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-sm);}
        .disc-btn.pass{background:var(--surface2);color:var(--danger);border:1px solid var(--border);}
        .disc-btn.like{background:var(--surface2);color:#2ECC71;border:1px solid var(--border);}

        /* Settings and other utilities */
        .settings-list{margin-top:14px;}
        .setting-item{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;background:var(--surface2);border-radius:12px;margin-bottom:4px;border:1px solid var(--border);cursor:pointer;}
        .setting-label{font-size:14px;font-weight:600;display:flex;align-items:center;gap:11px;color:var(--text-primary);}
        .setting-label-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .toggle-switch{position:relative;width:42px;height:24px;background:var(--surface3);border-radius:12px;cursor:pointer;border:1px solid var(--border);}
        .toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:var(--text-muted);border-radius:50%;transition:transform 0.25s,background 0.25s;}
        .toggle-switch.active{background:var(--primary);border-color:transparent;}
        .toggle-switch.active::after{transform:translateX(18px);background:white;}

        .toast{position:fixed;bottom:calc(100px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(12px);background:var(--text-primary);color:var(--surface);padding:11px 20px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:all 0.24s;z-index:9999;pointer-events:none;box-shadow:var(--shadow-md);}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .empty-state{padding:60px 24px;text-align:center;color:var(--text-muted);font-size:14px;display:flex;flex-direction:column;align-items:center;gap:10px;}
        
        .user-row{display:flex;align-items:center;gap:12px;padding:11px 4px;cursor:pointer;border-bottom:1px solid var(--border);border-radius:10px;}
        .user-row:hover{background:var(--surface2);}
        .info-row{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--border);}
        .info-row-icon{width:36px;height:36px;border-radius:10px;background:var(--accent-glow);display:flex;align-items:center;justify-content:center;color:var(--primary);}
        .info-row-title{font-size:14px;font-weight:700;color:var(--text-primary);}
        .info-row-sub{font-size:12px;color:var(--text-muted);margin-top:1px;}
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="custom-modal-overlay" id="custom-modal">
    <div class="custom-modal-box">
        <h3 class="cm-title" id="cm-title">Confirm</h3>
        <p class="cm-message" id="cm-message">Are you sure?</p>
        <div class="cm-actions">
            <button class="cm-btn cancel" id="cm-cancel">Cancel</button>
            <button class="cm-btn confirm" id="cm-confirm">OK</button>
        </div>
    </div>
</div>

<div class="app-container">
    <div id="view-chats" class="view-container active">
        <header class="header">
            <h2>Messages</h2>
            <button class="header-btn" id="new-chat-btn" title="New chat"><i data-feather="edit" style="width:18px;height:18px;"></i></button>
        </header>
        <div class="tab-switcher">
            <button class="tab-pill active" id="tab-all" onclick="switchChatTab('all')">All</button>
            <button class="tab-pill" id="tab-unread" onclick="switchChatTab('unread')">Unread <span class="pill-badge hidden" id="unread-pill-count">0</span></button>
        </div>
        <div class="search-container">
            <div class="search-box">
                <i data-feather="search" style="width:18px;height:18px;"></i>
                <input type="text" id="chat-search" placeholder="Search messages..." oninput="filterChats(this.value)">
            </div>
        </div>
        <div id="chats-list" class="chats-holder"></div>
    </div>

    <div id="view-discover" class="view-container">
        <header class="header"><h2>Discover</h2><div style="font-size:12px;color:var(--text-muted);font-weight:600;" id="discover-counter"></div></header>
        <div id="discover-content"></div>
    </div>

    <div id="view-profile" class="view-container">
        <header class="header"><h2>Profile</h2></header>
        <div id="profile-content"></div>
    </div>
</div>

<div class="bottom-nav-container">
    <nav class="bottom-nav">
        <button class="nav-item active" data-nav="chats" id="nav-chats">
            <i data-feather="message-circle" style="width:22px;height:22px;"></i><span class="nav-badge" id="badge-messages"></span>
        </button>
        <button class="nav-item" data-nav="discover" id="nav-discover">
            <i data-feather="compass" style="width:22px;height:22px;"></i>
        </button>
        <button class="nav-item" data-nav="profile" id="nav-profile">
            <div class="nav-avatar-wrapper"><img src="" id="nav-profile-avatar" class="nav-avatar-img" alt="Me"></div>
        </button>
    </nav>
</div>

<div class="bottom-sheet-overlay" id="action-sheet-overlay">
    <div class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title" id="sheet-target-name">Chat Options</div>
        <button class="sheet-btn danger" id="btn-clear-chat"><i data-feather="trash-2" style="width:18px;height:18px;"></i> Clear Chat</button>
        <button class="sheet-btn danger" id="btn-block-user"><i data-feather="slash" style="width:18px;height:18px;"></i> Block User</button>
        <button class="sheet-btn transparent" id="btn-cancel-action">Cancel</button>
    </div>
</div>

<div class="bottom-sheet-overlay" id="new-chat-sheet-overlay">
    <div class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">New Message</div>
        <div class="sheet-scroll-area" id="all-users-list"></div>
        <button class="sheet-btn transparent" id="btn-cancel-newchat">Cancel</button>
    </div>
</div>

<div class="chat-window" id="chat-window">
    <div class="chat-topbar">
        <button class="back-btn" id="chat-back-btn"><i data-feather="arrow-left" style="width:20px;height:20px;"></i></button>
        <img src="" id="chat-header-avatar" class="avatar" style="width:42px;height:42px;border-radius:14px;background:var(--surface2);">
        <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:16px;" id="chat-header-name">User</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:1px;" id="chat-header-status"></div>
        </div>
    </div>
    <div class="messages-area" id="messages-area"></div>
    <div class="input-bar">
        <div class="chat-input-wrapper">
            <textarea id="chat-input" placeholder="Message..." rows="1" oninput="resizeTextarea(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage();}"></textarea>
        </div>
        <button class="send-btn" id="send-btn">
            <i data-feather="mic" style="width:18px;height:18px;"></i>
        </button>
    </div>
</div>

<script type="module">
import { getDatabase, ref, onValue, onChildAdded, push, set, get, update, remove, serverTimestamp, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
    authDomain:"fire-b-a8878.firebaseapp.com",
    databaseURL:"https://fire-b-a8878.firebaseio.com",
    projectId:"fire-b-a8878"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const DEFAULT_AVATAR = `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52"><rect width="52" height="52" rx="14" fill="#E4E4E7"/><circle cx="26" cy="20" r="9" fill="#A1A1AA"/><path d="M8 46c0-9.941 8.059-18 18-18s18 8.059 18 18" fill="#A1A1AA"/></svg>`)}`;

let currentUser = null, currentUserData = null, allUsersCache = {};
let activeChatUid = null, activeChatConvId = null, activeChatListener = null;
let allConversations = [], currentChatTab = 'all';
let selectedConvId = null, selectedTargetUid = null;

// Initialize Theme (Defaulting to light)
const savedTheme = localStorage.getItem('vynix-theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);

// ── Custom Alert/Confirm System ──
window.customConfirm = (title, message, onConfirm) => {
    const modal = document.getElementById('custom-modal');
    document.getElementById('cm-title').textContent = title;
    document.getElementById('cm-message').textContent = message;
    modal.classList.add('active');
    
    const btnCancel = document.getElementById('cm-cancel');
    const btnConfirm = document.getElementById('cm-confirm');
    
    const cleanup = () => {
        modal.classList.remove('active');
        btnCancel.removeEventListener('click', handleCancel);
        btnConfirm.removeEventListener('click', handleConfirm);
    };
    
    const handleCancel = () => cleanup();
    const handleConfirm = () => { cleanup(); onConfirm(); };
    
    btnCancel.addEventListener('click', handleCancel);
    btnConfirm.addEventListener('click', handleConfirm);
};

window.showToast = (msg) => {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2800);
};

feather.replace();

// Document Event Listeners
document.getElementById('nav-chats').addEventListener('click', () => switchTab('chats'));
document.getElementById('nav-discover').addEventListener('click', () => switchTab('discover'));
document.getElementById('nav-profile').addEventListener('click', () => switchTab('profile'));
document.getElementById('new-chat-btn').addEventListener('click', openNewChatSheet);
document.getElementById('chat-back-btn').addEventListener('click', () => closeChat(false));
document.getElementById('btn-cancel-action').addEventListener('click', () => closeSheet('action-sheet-overlay'));
document.getElementById('btn-cancel-newchat').addEventListener('click', () => closeSheet('new-chat-sheet-overlay'));
document.getElementById('btn-clear-chat').addEventListener('click', executeClearChat);
document.getElementById('btn-block-user').addEventListener('click', executeBlockUser);

document.getElementById('send-btn').addEventListener('click', () => {
    const isMic = document.getElementById('send-btn').querySelector('.feather-mic');
    if (isMic) {
        showToast('🎙️ Voice notes feature coming soon!');
    } else {
        sendChatMessage();
    }
});

function openSheet(id) { document.getElementById(id).classList.add('active'); }
function closeSheet(id) { document.getElementById(id).classList.remove('active'); }

window.switchTab = (tabId) => {
    document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`view-${tabId}`)?.classList.add('active');
    document.getElementById(`nav-${tabId}`)?.classList.add('active');
    if(tabId === 'profile') renderProfile();
};

window.switchChatTab = (tab) => {
    currentChatTab = tab;
    document.getElementById('tab-all').classList.toggle('active', tab === 'all');
    document.getElementById('tab-unread').classList.toggle('active', tab === 'unread');
    renderConversations(allConversations);
};

// Mock Auth
onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'signup.html'; return; }
    currentUser = user;
    await loadUserData();
    loadChatsTab();
});

async function loadUserData() {
    const snap = await get(ref(db, `users/${currentUser.uid}`));
    if (snap.exists()) currentUserData = snap.val();
    document.getElementById('nav-profile-avatar').src = currentUserData?.photoURL || DEFAULT_AVATAR;
}

// Custom Modal implementations
async function executeClearChat() {
    if (!selectedConvId) return;
    closeSheet('action-sheet-overlay');
    customConfirm('Clear History', 'Delete all messages in this chat permanently?', async () => {
        await remove(ref(db, `directMessages/${selectedConvId}`));
        await update(ref(db, `conversations/${selectedConvId}`), { lastMessage:'Chat cleared', lastTimestamp:Date.now() });
        showToast('Chat cleared');
    });
}

async function executeBlockUser() {
    if (!selectedTargetUid || !selectedConvId) return;
    closeSheet('action-sheet-overlay');
    customConfirm('Block User', 'Are you sure you want to block this user? The conversation will be removed.', async () => {
        await remove(ref(db, `conversations/${selectedConvId}`));
        showToast('User blocked');
    });
}

// UI Interaction for Voice Note vs Send
window.resizeTextarea = (el) => {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
    const btn = document.getElementById('send-btn');
    if(el.value.trim().length === 0){
        btn.innerHTML = '<i data-feather="mic" style="width:18px;height:18px;"></i>';
    } else {
        btn.innerHTML = '<i data-feather="send" style="width:18px;height:18px;margin-left:2px;"></i>';
    }
    feather.replace();
};

// Chat Open / Close logic
async function openChat(targetUid) {
    const otherUser = allUsersCache[targetUid] || { username:'User', photoURL:'' };
    activeChatUid = targetUid;
    activeChatConvId = [currentUser.uid, targetUid].sort().join('_');
    document.getElementById('chat-header-name').textContent = otherUser.username || 'User';
    document.getElementById('messages-area').innerHTML = '';
    document.getElementById('chat-window').classList.add('active');

    // Simulate typing indicator for demonstration
    document.getElementById('chat-header-status').innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    setTimeout(() => { document.getElementById('chat-header-status').innerHTML = '🟢 Active now'; }, 3000);

    if (activeChatListener) off(ref(db, `directMessages/${activeChatConvId}/messages`));
    activeChatListener = onChildAdded(ref(db, `directMessages/${activeChatConvId}/messages`), snap => {
        const msg = snap.val();
        if (!msg) return;
        const isMe = msg.senderId === currentUser.uid;
        document.getElementById('messages-area').appendChild(renderMessageNode(msg, isMe));
        document.getElementById('messages-area').scrollTop = document.getElementById('messages-area').scrollHeight;
    });
}

function closeChat() {
    document.getElementById('chat-window').classList.remove('active');
    if (activeChatListener) off(ref(db, `directMessages/${activeChatConvId}/messages`));
}

// Updated Message Renderer with Read Receipts Checkmarks
function renderMessageNode(msg, isMe) {
    const wrap = document.createElement('div');
    wrap.className = `message-wrapper ${isMe ? 'me' : 'other'}`;
    const d = new Date(msg.timestamp || Date.now());
    const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    
    // Checkmarks for sender only
    const statusIcon = isMe ? `<i data-feather="check-all" style="width:14px;height:14px;color:var(--primary);"></i>` : '';

    wrap.innerHTML = `
        <div class="message-bubble">${msg.text || ''}</div>
        <div class="message-time">${timeStr} ${statusIcon}</div>
    `;
    feather.replace(wrap);
    return wrap;
}

// Other Required Boilerplate mapping functions
async function loadChatsTab() { /* Retains your original logic syncing to allConversations */ }
function renderConversations(convList) { /* Retains original mapping into #chats-list */ }
function openNewChatSheet() { openSheet('new-chat-sheet-overlay'); }
async function sendChatMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !activeChatConvId) return;
    input.value = ''; resizeTextarea(input);
    await push(ref(db, `directMessages/${activeChatConvId}/messages`), { senderId:currentUser.uid, text, timestamp:serverTimestamp() });
}

// Render Profile mapping for Theme Switcher Default adjustments
function renderProfile() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.getElementById('profile-content').innerHTML = `
        <div class="settings-list">
            <div class="setting-item" id="dark-mode-item">
                <div class="setting-label"><div class="setting-label-icon"><i data-feather="moon" style="width:16px;height:16px;"></i></div>Dark Mode</div>
                <div class="toggle-switch ${isDark ? 'active' : ''}" id="dark-toggle"></div>
            </div>
            <div class="setting-item" onclick="customConfirm('Sign Out', 'Are you sure you want to leave?', () => signOut(auth))">
                <div class="setting-label" style="color:var(--danger)"><div class="setting-label-icon"><i data-feather="log-out" style="width:16px;height:16px;"></i></div>Sign Out</div>
            </div>
        </div>
    `;
    feather.replace();
    document.getElementById('dark-mode-item').addEventListener('click', () => {
        const tog = document.getElementById('dark-toggle');
        tog.classList.toggle('active');
        const isDk = tog.classList.contains('active');
        document.documentElement.setAttribute('data-theme', isDk ? 'dark' : 'light');
        localStorage.setItem('vynix-theme', isDk ? 'dark' : 'light');
    });
}
</script>
</body>
</html>

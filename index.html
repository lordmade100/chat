<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lumen AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
    
    body {
      font-family: 'Inter', system_ui, sans-serif;
    }
    
    .font-display {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
    }

    /* Light Theme Splash */
    .splash {
      background: linear-gradient(135deg, #f8fafc 0%, #f1e7ff 100%);
    }

    .neural-orb {
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, #6366f1 10%, #4f46e5 45%, transparent 70%);
      box-shadow: 
        0 0 40px rgba(99, 102, 241, 0.5),
        0 0 90px rgba(99, 102, 241, 0.25);
      animation: orb-pulse 3s ease-in-out infinite;
    }

    .neural-ring {
      animation: ring-rotate 8s linear infinite;
    }

    @keyframes orb-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .particle {
      position: absolute;
      background: #6366f1;
      border-radius: 50%;
      animation: particle-float 3.5s ease-in-out infinite;
    }

    .ai-text {
      background: linear-gradient(90deg, #1e2937, #6366f1, #1e2937);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient-shift 3s ease-in-out infinite;
    }

    .chat-container {
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 #f8fafc;
    }

    .message {
      animation: fadeInUp 0.3s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mobile Optimizations */
    @media (max-width: 640px) {
      .chat-container {
        height: calc(100vh - 210px);
      }
      
      .model-pill {
        padding-left: 10px;
        padding-right: 10px;
        padding-top: 6px;
        padding-bottom: 6px;
      }
    }

    .bottom-sheet {
      animation: slideUp 0.3s ease forwards;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-zinc-100 text-zinc-900">

  <!-- ==================== ANIMATED SPLASH ==================== -->
  <div id="splash" class="splash fixed inset-0 z-50 flex items-center justify-center">
    <div class="relative flex flex-col items-center">
      
      <!-- Neural Orb -->
      <div class="relative flex items-center justify-center mb-8">
        <div class="absolute w-[220px] h-[220px] border border-indigo-200 rounded-full neural-ring"></div>
        <div class="absolute w-[270px] h-[270px] border border-indigo-100 rounded-full neural-ring" style="animation-duration: 12s;"></div>
        
        <div class="neural-orb rounded-full flex items-center justify-center">
          <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-inner">
            <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-full flex items-center justify-center">
              <i class="fa-solid fa-brain text-white text-3xl"></i>
            </div>
          </div>
        </div>
        
        <div id="particles" class="absolute w-[270px] h-[270px]"></div>
      </div>

      <div class="text-center">
        <h1 class="font-display text-5xl sm:text-6xl font-semibold tracking-tighter ai-text">
          LUMEN
        </h1>
        <p class="text-indigo-600/70 text-base sm:text-lg mt-1 tracking-[2px]">AI Assistant</p>
      </div>

      <div class="mt-10">
        <div class="flex items-center gap-x-3">
          <div class="flex items-center gap-x-2">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
            <span id="splash-status" class="text-sm text-zinc-600 font-medium">Initializing models...</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== MAIN APP ==================== -->
  <div id="app" class="hidden min-h-screen flex flex-col bg-zinc-100">
    
    <!-- Mobile Optimized Header -->
    <header class="bg-white border-b border-zinc-200 sticky top-0 z-40">
      <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
        
        <!-- Left: Logo -->
        <div class="flex items-center gap-x-2.5">
          <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-2xl flex items-center justify-center shadow-sm">
            <i class="fa-solid fa-brain text-white text-lg"></i>
          </div>
          <h1 class="font-display font-semibold text-xl tracking-tight">Lumen</h1>
        </div>

        <!-- Right: Model Selector + New Chat -->
        <div class="flex items-center gap-x-2">
          
          <!-- Compact Model Selector (Mobile Friendly) -->
          <button onclick="showModelSelector()" 
                  class="model-pill flex items-center gap-x-1.5 px-3 py-1.5 bg-white border border-zinc-300 hover:border-zinc-400 active:bg-zinc-50 transition-all rounded-3xl text-sm font-medium shadow-sm">
            <i class="fa-solid fa-robot text-indigo-600 text-sm"></i>
            <span id="current-model-name" class="font-medium text-sm max-w-[90px] truncate">Lumen 4o</span>
            <i class="fa-solid fa-chevron-down text-xs text-zinc-500"></i>
          </button>

          <!-- New Chat (Icon only on mobile) -->
          <button onclick="clearChat()" 
                  class="w-9 h-9 flex items-center justify-center text-zinc-600 hover:text-zinc-900 hover:bg-zinc-200 active:bg-zinc-300 transition-colors rounded-3xl">
            <i class="fa-solid fa-plus text-base"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Chat Area -->
    <div class="flex-1 max-w-4xl mx-auto w-full px-4 pt-5 pb-20">
      <div id="chat-container" 
           class="chat-container h-[calc(100vh-195px)] overflow-y-auto space-y-5 pr-1">
        
        <!-- Welcome Message -->
        <div class="flex gap-3">
          <div class="w-7 h-7 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-2xl flex-shrink-0 flex items-center justify-center mt-0.5 shadow-sm">
            <i class="fa-solid fa-brain text-white text-xs"></i>
          </div>
          <div class="max-w-[85%]">
            <div class="bg-white border border-zinc-200 rounded-3xl px-4 py-3 shadow-sm">
              <p class="text-zinc-800 text-[15px]">Hello! I'm Lumen. How can I help you today?</p>
            </div>
            <div class="text-[10px] text-zinc-500 mt-1 ml-1">Just now</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="max-w-4xl mx-auto w-full px-4 pb-4 fixed bottom-0 bg-zinc-100 border-t border-zinc-200">
      <!-- Suggested Prompts -->
      <div id="suggestions" class="flex flex-wrap gap-2 mb-3 px-1">
        <div onclick="useSuggestion(this)" class="px-3.5 py-1.5 bg-white hover:bg-zinc-50 border border-zinc-200 text-xs sm:text-sm rounded-3xl cursor-pointer transition-colors text-zinc-700 active:bg-zinc-100">
          Explain quantum computing
        </div>
        <div onclick="useSuggestion(this)" class="px-3.5 py-1.5 bg-white hover:bg-zinc-50 border border-zinc-200 text-xs sm:text-sm rounded-3xl cursor-pointer transition-colors text-zinc-700 active:bg-zinc-100">
          Write a professional email
        </div>
        <div onclick="useSuggestion(this)" class="px-3.5 py-1.5 bg-white hover:bg-zinc-50 border border-zinc-200 text-xs sm:text-sm rounded-3xl cursor-pointer transition-colors text-zinc-700 active:bg-zinc-100">
          Best ways to learn AI
        </div>
      </div>

      <!-- Input Box -->
      <div class="bg-white border border-zinc-300 rounded-3xl p-1.5 flex items-center gap-2 shadow-sm">
        <input 
          id="user-input" 
          type="text" 
          placeholder="Message Lumen..." 
          class="flex-1 bg-transparent px-4 py-2.5 outline-none text-zinc-900 placeholder-zinc-400 text-[15px]"
          onkeypress="if (event.key === 'Enter') sendMessage()">
        
        <button onclick="sendMessage()" 
                class="bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 transition-colors w-10 h-10 flex items-center justify-center rounded-3xl text-white">
          <i class="fa-solid fa-paper-plane text-sm"></i>
        </button>
      </div>
      <p class="text-center text-[10px] text-zinc-500 mt-2 pb-1">Lumen can make mistakes.</p>
    </div>
  </div>

  <!-- Model Selection - Mobile Optimized Bottom Sheet -->
  <div id="model-modal" onclick="hideModelSelector()" class="hidden fixed inset-0 bg-black/50 z-50 flex items-end justify-center">
    <div onclick="event.stopImmediatePropagation()" 
         class="bottom-sheet bg-white w-full max-w-4xl mx-auto rounded-t-3xl shadow-xl border border-zinc-200 pb-6">
      
      <!-- Drag Handle -->
      <div class="flex justify-center pt-3 pb-2">
        <div class="w-10 h-1 bg-zinc-300 rounded-full"></div>
      </div>
      
      <div class="px-4 pb-3 flex items-center justify-between border-b border-zinc-200">
        <h3 class="font-semibold text-lg">Choose Model</h3>
        <button onclick="hideModelSelector()" class="w-9 h-9 flex items-center justify-center text-zinc-400 hover:text-zinc-600">
          <i class="fa-solid fa-times text-xl"></i>
        </button>
      </div>
      
      <div class="p-2 max-h-[60vh] overflow-y-auto" id="model-list">
        <!-- Models injected via JS -->
      </div>
    </div>
  </div>

  <script>
    function initTailwind() {
      // Tailwind CDN is already initialized
    }

    function createParticles() {
      const container = document.getElementById('particles');
      const colors = ['#6366f1', '#a5b4fc'];
      
      for (let i = 0; i < 14; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        const size = Math.random() * 3 + 2;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        
        const angle = Math.random() * 360;
        const distance = 80 + Math.random() * 55;
        const x = 135 + Math.cos(angle * Math.PI / 180) * distance;
        const y = 135 + Math.sin(angle * Math.PI / 180) * distance;
        
        particle.style.left = `${x}px`;
        particle.style.top = `${y}px`;
        particle.style.opacity = Math.random() * 0.5 + 0.3;
        particle.style.animationDuration = (Math.random() * 2.5 + 2.5) + 's';
        particle.style.animationDelay = '-' + Math.random() * 3 + 's';
        
        container.appendChild(particle);
      }
    }

    // Animated Splash
    function showSplash() {
      const splash = document.getElementById('splash');
      const status = document.getElementById('splash-status');
      
      const messages = [
        "Loading models...",
        "Connecting providers...",
        "Optimizing for mobile...",
        "Ready"
      ];
      
      let index = 0;
      
      const interval = setInterval(() => {
        if (index < messages.length - 1) {
          status.textContent = messages[index];
          index++;
        } else {
          clearInterval(interval);
          status.textContent = "Ready";
          
          setTimeout(() => {
            splash.style.transition = 'opacity 0.45s ease';
            splash.style.opacity = '0';
            
            setTimeout(() => {
              splash.style.display = 'none';
              document.getElementById('app').classList.remove('hidden');
              document.getElementById('app').classList.add('flex', 'flex-col');
              document.getElementById('user-input').focus();
            }, 350);
          }, 280);
        }
      }, 680);
    }

    // ==================== MODELS ====================
    const availableModels = [
      { 
        id: "lumen-4o", 
        name: "Lumen 4o", 
        shortName: "Lumen 4o",
        description: "Fast & balanced",
        provider: "Lumen"
      },
      { 
        id: "claude-3.5", 
        name: "Claude 3.5 Sonnet", 
        shortName: "Claude 3.5",
        description: "Best for reasoning",
        provider: "Anthropic"
      },
      { 
        id: "gpt-4o", 
        name: "GPT-4o", 
        shortName: "GPT-4o",
        description: "Creative & versatile",
        provider: "OpenAI"
      },
      { 
        id: "gemini-1.5", 
        name: "Gemini 1.5 Pro", 
        shortName: "Gemini 1.5",
        description: "Strong analysis",
        provider: "Google"
      },
      { 
        id: "llama-3.1", 
        name: "Llama 3.1 70B", 
        shortName: "Llama 3.1",
        description: "Open source",
        provider: "Meta"
      }
    ];

    let currentModel = "lumen-4o";

    function updateCurrentModel(modelId) {
      currentModel = modelId;
      const model = availableModels.find(m => m.id === modelId);
      document.getElementById('current-model-name').textContent = model.shortName;
    }

    function showModelSelector() {
      const modal = document.getElementById('model-modal');
      const listContainer = document.getElementById('model-list');
      listContainer.innerHTML = '';

      availableModels.forEach(model => {
        const isActive = model.id === currentModel;
        
        const div = document.createElement('div');
        div.className = `flex items-center justify-between p-4 mx-1 my-1 rounded-2xl cursor-pointer active:bg-zinc-100 transition-colors ${isActive ? 'bg-indigo-50 border border-indigo-200' : 'hover:bg-zinc-50 border border-transparent'}`;
        
        div.innerHTML = `
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-x-2">
              <span class="font-medium text-base">${model.name}</span>
              ${isActive ? '<span class="text-[10px] px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-full font-medium">Active</span>' : ''}
            </div>
            <div class="text-xs text-zinc-500 mt-0.5">${model.description} • ${model.provider}</div>
          </div>
          ${isActive ? '<i class="fa-solid fa-check text-indigo-600 ml-2"></i>' : ''}
        `;
        
        div.onclick = () => {
          updateCurrentModel(model.id);
          hideModelSelector();
          
          // Show subtle model change feedback
          addSystemMessage(`Switched to ${model.shortName}`);
        };
        
        listContainer.appendChild(div);
      });

      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function hideModelSelector() {
      const modal = document.getElementById('model-modal');
      modal.classList.remove('flex');
      modal.classList.add('hidden');
    }

    function addSystemMessage(text) {
      const container = document.getElementById('chat-container');
      const div = document.createElement('div');
      div.className = 'flex justify-center py-1';
      div.innerHTML = `
        <div class="text-xs bg-zinc-200 text-zinc-600 px-3 py-1 rounded-3xl">
          ${text}
        </div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    // ==================== CHAT ====================
    function addMessage(text, isUser = false) {
      const container = document.getElementById('chat-container');
      
      const messageDiv = document.createElement('div');
      messageDiv.className = `flex gap-3 message ${isUser ? 'justify-end' : ''}`;
      
      if (isUser) {
        messageDiv.innerHTML = `
          <div class="max-w-[82%]">
            <div class="bg-indigo-600 text-white rounded-3xl px-4 py-3 text-[15px]">
              <p>${text}</p>
            </div>
            <div class="text-xs text-zinc-500 mt-1 text-right mr-1">Just now</div>
          </div>
        `;
      } else {
        messageDiv.innerHTML = `
          <div class="w-7 h-7 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-2xl flex-shrink-0 flex items-center justify-center mt-0.5 shadow-sm">
            <i class="fa-solid fa-brain text-white text-xs"></i>
          </div>
          <div class="max-w-[82%]">
            <div class="bg-white border border-zinc-200 rounded-3xl px-4 py-3 shadow-sm">
              <p class="text-zinc-800 text-[15px]">${text}</p>
            </div>
            <div class="text-xs text-zinc-500 mt-1 ml-1">Just now</div>
          </div>
        `;
      }
      
      container.appendChild(messageDiv);
      container.scrollTop = container.scrollHeight;
    }

    function showTypingIndicator() {
      const container = document.getElementById('chat-container');
      const typingDiv = document.createElement('div');
      typingDiv.id = 'typing-indicator';
      typingDiv.className = `flex gap-3`;
      
      typingDiv.innerHTML = `
        <div class="w-7 h-7 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-2xl flex-shrink-0 flex items-center justify-center mt-0.5">
          <i class="fa-solid fa-brain text-white text-xs"></i>
        </div>
        <div class="bg-white border border-zinc-200 rounded-3xl px-4 py-3 shadow-sm">
          <div class="flex gap-1.5">
            <div class="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
            <div class="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
            <div class="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
          </div>
        </div>
      `;
      
      container.appendChild(typingDiv);
      container.scrollTop = container.scrollHeight;
      return typingDiv;
    }

    function removeTypingIndicator() {
      const typing = document.getElementById('typing-indicator');
      if (typing) typing.remove();
    }

    // Model-aware responses
    async function getAIResponse(userMessage, modelId) {
      await new Promise(resolve => setTimeout(resolve, 950 + Math.random() * 650));

      const lower = userMessage.toLowerCase();
      const model = availableModels.find(m => m.id === modelId);

      if (modelId === "claude-3.5") {
        if (lower.includes('hello') || lower.includes('hi')) 
          return "Hello! I'm Claude 3.5 Sonnet. I'm here to help you think through things carefully.";
        if (lower.includes('quantum')) 
          return "Quantum computing leverages superposition and entanglement to solve complex problems much faster than classical computers.";
      }

      if (modelId === "gpt-4o") {
        if (lower.includes('email')) 
          return "I'd be happy to help craft a professional cold email. What's the goal and who is the recipient?";
      }

      if (modelId === "gemini-1.5") {
        return "Based on patterns and data, here's my analysis: " + generateGenericResponse(userMessage);
      }

      if (modelId === "llama-3.1") {
        return generateGenericResponse(userMessage) + " Want me to expand on anything?";
      }

      // Default Lumen 4o
      return generateGenericResponse(userMessage);
    }

    function generateGenericResponse(message) {
      if (message.toLowerCase().includes('quantum')) {
        return "Quantum computers use qubits that can represent multiple states at once, unlike regular bits.";
      }
      if (message.toLowerCase().includes('learn ai')) {
        return "Start with Python, build small projects, then learn frameworks like PyTorch or TensorFlow.";
      }
      if (message.toLowerCase().includes('email')) {
        return "Sure, I can help you write that. Tell me more about the context.";
      }
      
      const responses = [
        "Here's a clear breakdown:",
        "Good question. This is how I see it:",
        "Let me explain this simply:",
        "From my knowledge, here's what makes sense:"
      ];
      return responses[Math.floor(Math.random() * responses.length)];
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, true);
      input.value = '';
      document.getElementById('suggestions').style.display = 'none';

      const typing = showTypingIndicator();

      try {
        const response = await getAIResponse(message, currentModel);
        removeTypingIndicator();
        addMessage(response);
      } catch (error) {
        removeTypingIndicator();
        addMessage("Sorry, something went wrong. Please try again.");
      }
    }

    function useSuggestion(element) {
      const text = element.textContent.trim();
      document.getElementById('user-input').value = text;
      document.getElementById('suggestions').style.display = 'none';
      
      setTimeout(() => {
        sendMessage();
      }, 60);
    }

    function clearChat() {
      const container = document.getElementById('chat-container');
      container.innerHTML = `
        <div class="flex gap-3">
          <div class="w-7 h-7 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-2xl flex-shrink-0 flex items-center justify-center mt-0.5 shadow-sm">
            <i class="fa-solid fa-brain text-white text-xs"></i>
          </div>
          <div class="max-w-[85%]">
            <div class="bg-white border border-zinc-200 rounded-3xl px-4 py-3 shadow-sm">
              <p class="text-zinc-800 text-[15px]">Hello! I'm Lumen. How can I help you today?</p>
            </div>
            <div class="text-[10px] text-zinc-500 mt-1 ml-1">Just now</div>
          </div>
        </div>
      `;
      document.getElementById('suggestions').style.display = 'flex';
    }

    function initializeApp() {
      initTailwind();
      createParticles();
      
      // Set default model
      updateCurrentModel("lumen-4o");

      // Start splash
      setTimeout(() => {
        showSplash();
      }, 120);

      // Keyboard shortcut (desktop only)
      document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement.tagName === 'BODY') {
          e.preventDefault();
          document.getElementById('user-input').focus();
        }
        
        // Close modal with Escape
        if (e.key === 'Escape') {
          const modal = document.getElementById('model-modal');
          if (!modal.classList.contains('hidden')) {
            hideModelSelector();
          }
        }
      });

      // Auto focus input on mobile when header is tapped (nice UX)
      const header = document.querySelector('header');
      header.addEventListener('click', (e) => {
        if (window.innerWidth < 640 && !e.target.closest('button')) {
          document.getElementById('user-input').focus();
        }
      });

      console.log('%c[Lumen AI] Mobile-optimized version loaded', 'color:#6366f1');
    }

    window.onload = initializeApp;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ona AI • Feed</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0A0A0B;
      --surface: #111113;
      --surface2: #1A1A1E;
      --border: rgba(255,255,255,0.07);
      --primary: #FF4E6A;
      --primary-glow: rgba(255,78,106,0.35);
      --gold: #FFB547;
      --text: #F5F5F7;
      --muted: #6B6B75;
      --pill: rgba(255,255,255,0.08);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100svh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px;
      background: linear-gradient(to bottom, rgba(10,10,11,0.95) 0%, transparent 100%);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.35rem; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #FF4E6A, #FFB547);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .header-actions { display: flex; gap: 4px; align-items: center; }

    .icon-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--pill); border: none; color: var(--text);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s;
    }
    .icon-btn:active { background: var(--surface2); }

    /* ── FEED ── */
    .feed {
      flex: 1;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      padding-top: 0;
    }
    .feed::-webkit-scrollbar { display: none; }

    /* ── POST CARD ── */
    .post-card {
      scroll-snap-align: start;
      height: 100svh;
      position: relative;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .post-image-wrap {
      position: absolute; inset: 0;
      background: var(--surface);
    }

    .post-image {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: opacity 0.5s ease;
    }

    /* Skeleton shimmer while loading */
    .skeleton-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #111113 25%, #1a1a1e 50%, #111113 75%);
      background-size: 400% 400%;
      animation: shimmer 1.8s ease infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Gradient overlay */
    .post-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.1) 0%,
        transparent 30%,
        transparent 50%,
        rgba(0,0,0,0.5) 75%,
        rgba(0,0,0,0.85) 100%
      );
      pointer-events: none;
    }

    /* ── POST CONTENT ── */
    .post-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 16px 16px calc(env(safe-area-inset-bottom) + 16px) 16px;
      display: flex; gap: 14px; align-items: flex-end;
    }

    .post-info { flex: 1; min-width: 0; }

    .post-prompt {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 600; line-height: 1.3;
      margin-bottom: 6px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    }

    .post-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: rgba(255,255,255,0.65);
    }

    .ai-badge {
      display: flex; align-items: center; gap: 4px;
      background: rgba(255,78,106,0.2);
      border: 1px solid rgba(255,78,106,0.3);
      padding: 2px 8px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 600; color: var(--primary);
    }

    /* ── RIGHT ACTION PANEL ── */
    .action-panel {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      padding-bottom: 4px;
    }

    .action-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }

    .action-btn {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, background 0.2s;
      position: relative; overflow: hidden;
    }

    .action-btn:active { transform: scale(0.88); }

    .action-btn.liked {
      background: var(--primary-glow);
      border-color: var(--primary);
    }

    .action-count {
      font-size: 0.75rem; color: rgba(255,255,255,0.8);
      font-weight: 500;
    }

    /* Like burst */
    @keyframes like-burst {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.4); }
      60%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    .action-btn.burst { animation: like-burst 0.4s cubic-bezier(0.36,0.07,0.19,0.97); }

    /* ── GENERATE MORE btn ── */
    .gen-more-card {
      scroll-snap-align: start;
      height: 100svh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; padding: 40px;
      background: radial-gradient(ellipse at center, rgba(255,78,106,0.08) 0%, var(--bg) 70%);
    }

    .gen-more-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #FF4E6A, #FFB547);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; box-shadow: 0 0 40px var(--primary-glow);
      animation: pulse-glow 2.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 30px var(--primary-glow); }
      50% { box-shadow: 0 0 60px rgba(255,78,106,0.6); }
    }

    .gen-more-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem; font-weight: 700; text-align: center;
    }

    .gen-more-sub { color: var(--muted); text-align: center; font-size: 0.9rem; max-width: 260px; line-height: 1.5; }

    .gen-btn {
      background: linear-gradient(135deg, #FF4E6A, #FFB547);
      color: white; border: none; padding: 14px 32px;
      border-radius: 50px; font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    .gen-btn:active { transform: scale(0.95); opacity: 0.85; }
    .gen-btn:disabled { opacity: 0.5; }

    /* ── GENERATE PROMPT SHEET ── */
    .sheet-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: none; align-items: flex-end;
      transition: opacity 0.3s;
    }
    .sheet-overlay.open { display: flex; }

    .sheet {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 20px 20px calc(env(safe-area-inset-bottom) + 20px) 20px;
      width: 100%;
      border-top: 1px solid var(--border);
    }

    .sheet-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 20px;
    }

    .sheet-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; font-weight: 700; margin-bottom: 16px;
    }

    .prompt-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 16px;
    }

    .prompt-chip {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 12px; border-radius: 12px;
      font-size: 0.8rem; font-family: 'DM Sans', sans-serif;
      cursor: pointer; text-align: left; transition: border-color 0.2s, background 0.2s;
      line-height: 1.3;
    }
    .prompt-chip:active { border-color: var(--primary); background: rgba(255,78,106,0.08); }

    .custom-input-row {
      display: flex; gap: 10px; align-items: center;
    }

    .custom-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 12px 16px; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none;
      transition: border-color 0.2s;
    }
    .custom-input:focus { border-color: var(--primary); }
    .custom-input::placeholder { color: var(--muted); }

    .submit-gen-btn {
      width: 46px; height: 46px; border-radius: 50%;
      background: linear-gradient(135deg, #FF4E6A, #FFB547);
      border: none; color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.2s;
    }
    .submit-gen-btn:active { transform: scale(0.9); }

    /* ── COMMENTS SHEET ── */
    .comments-sheet {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      display: none; align-items: flex-end;
    }
    .comments-sheet.open { display: flex; }

    .comments-panel {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      width: 100%; max-height: 70svh;
      display: flex; flex-direction: column;
      border-top: 1px solid var(--border);
    }

    .comments-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .comments-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 1rem;
    }

    .comments-list {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 14px;
      scrollbar-width: none;
    }

    .comment-item { display: flex; gap: 10px; align-items: flex-start; }

    .comment-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #FF4E6A, #FFB547);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0; color: white;
    }

    .comment-body { flex: 1; }
    .comment-user { font-size: 0.82rem; font-weight: 600; margin-bottom: 2px; }
    .comment-text { font-size: 0.88rem; color: rgba(255,255,255,0.8); line-height: 1.4; }

    .comment-input-row {
      padding: 12px 16px calc(env(safe-area-inset-bottom) + 12px) 16px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: center;
    }

    .comment-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: 20px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none;
    }
    .comment-input::placeholder { color: var(--muted); }

    .post-comment-btn {
      background: var(--primary); border: none; color: white;
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      height: 100svh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; text-align: center; padding: 40px;
    }

    .spark-icon {
      font-size: 3rem;
      background: linear-gradient(135deg, #FF4E6A, #FFB547);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ── LOADING SPINNER ── */
    .spinner-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(10,10,11,0.85); backdrop-filter: blur(8px);
      display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    .spinner-overlay.open { display: flex; }

    .spinner {
      width: 50px; height: 50px;
      border: 3px solid rgba(255,78,106,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-text {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem; color: var(--muted);
    }

    /* Image double-tap heart */
    .heart-pop {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 5rem; pointer-events: none; z-index: 10;
      animation: heart-pop-anim 0.7s ease forwards;
    }
    @keyframes heart-pop-anim {
      0%   { transform: translate(-50%,-50%) scale(0); opacity:1; }
      40%  { transform: translate(-50%,-50%) scale(1.3); opacity:1; }
      100% { transform: translate(-50%,-50%) scale(1); opacity:0; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">Ona AI</div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openGenerateSheet()">
        <span class="material-symbols-rounded" style="font-size:22px;">add_circle</span>
      </button>
      <button class="icon-btn" onclick="window.location.href='profile.html'">
        <span class="material-symbols-rounded" style="font-size:22px;">account_circle</span>
      </button>
    </div>
  </header>

  <!-- FEED -->
  <main class="feed" id="feed"></main>

  <!-- GENERATE PROMPT SHEET -->
  <div class="sheet-overlay" id="genSheet" onclick="closeGenSheet(event)">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">✦ Generate a Vision</div>
      <div class="prompt-grid">
        <button class="prompt-chip" onclick="usePrompt('Afrofuturistic queen with glowing kente cloth, neon Lagos skyline')">👑 Afrofuturism</button>
        <button class="prompt-chip" onclick="usePrompt('Ancient Mali empire palace at golden hour, hyperrealistic')">🏛️ Ancient Africa</button>
        <button class="prompt-chip" onclick="usePrompt('Zulu warrior in cyberpunk city, rain-soaked streets, cinematic')">⚡ Warrior Spirit</button>
        <button class="prompt-chip" onclick="usePrompt('South African township mural, vibrant colors, children dancing')">🎨 Township Art</button>
        <button class="prompt-chip" onclick="usePrompt('African elephant herd at dusk, double exposure, tribal patterns')">🐘 Wild Africa</button>
        <button class="prompt-chip" onclick="usePrompt('Johannesburg 2099, baobab towers, solar panels, aerial view')">🌆 Future Mzansi</button>
      </div>
      <div class="custom-input-row">
        <input class="custom-input" id="customPrompt" placeholder="Describe your own vision…" />
        <button class="submit-gen-btn" onclick="submitCustomPrompt()">
          <span class="material-symbols-rounded" style="font-size:20px;">arrow_upward</span>
        </button>
      </div>
    </div>
  </div>

  <!-- COMMENTS SHEET -->
  <div class="comments-sheet" id="commentsSheet" onclick="closeCommentsSheet(event)">
    <div class="comments-panel">
      <div class="comments-header">
        <span class="comments-title">Comments</span>
        <button class="icon-btn" onclick="closeComments()" style="width:32px;height:32px;">
          <span class="material-symbols-rounded" style="font-size:20px;">close</span>
        </button>
      </div>
      <div class="comments-list" id="commentsList"></div>
      <div class="comment-input-row">
        <input class="comment-input" id="commentInput" placeholder="Add a comment…" />
        <button class="post-comment-btn" onclick="postComment()">
          <span class="material-symbols-rounded" style="font-size:18px;">send</span>
        </button>
      </div>
    </div>
  </div>

  <!-- LOADING OVERLAY -->
  <div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner"></div>
    <div class="spinner-text">Crafting your vision…</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get, set, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getRemoteConfig, fetchAndActivate, getValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-remote-config.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
      authDomain: "fire-b-a8878.firebaseapp.com",
      projectId: "fire-b-a8878",
      databaseURL: "https://fire-b-a8878-default-rtdb.firebaseio.com",
      appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const remoteConfig = getRemoteConfig(app);
    remoteConfig.settings.minimumFetchIntervalMillis = 0;

    const API_BASE = "https://api.x.ai/v1";
    let XAI_API_KEY = "";
    let currentUser = null;
    let currentUsername = "you";
    let activePostId = null; // for comments

    // ── LOAD API KEY ──
    async function loadKey() {
      try {
        await fetchAndActivate(remoteConfig);
        XAI_API_KEY = getValue(remoteConfig, 'xai_api_key').asString();
      } catch(e) { console.error("RC key error", e); }
    }

    // ── AUTH ──
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'signup.html'; return; }
      currentUser = user;
      await loadKey();
      const snap = await get(ref(db, `users/${user.uid}`));
      if (snap.exists()) {
        currentUsername = snap.val().username || snap.val().displayName || "you";
      }
      loadFeed();
    });

    // ── FEED RENDERING ──
    const feed = document.getElementById('feed');

    function loadFeed() {
      const postsRef = ref(db, 'ona_posts');
      onValue(postsRef, (snap) => {
        const data = snap.val();
        feed.innerHTML = '';

        if (!data) {
          feed.innerHTML = `
            <div class="empty-state">
              <div class="spark-icon">✦</div>
              <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;">Your feed is empty</h2>
              <p style="color:var(--muted);line-height:1.5;">Be the first to generate a vision. Tap + above to create.</p>
            </div>`;
          return;
        }

        // Sort by timestamp desc
        const posts = Object.entries(data)
          .map(([id, val]) => ({ id, ...val }))
          .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

        posts.forEach(post => {
          feed.appendChild(buildPostCard(post));
        });

        // "Generate more" card at the end
        const moreCard = buildGenMoreCard();
        feed.appendChild(moreCard);
      });
    }

    function buildPostCard(post) {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.dataset.postId = post.id;

      const likeCount = post.likes ? Object.keys(post.likes).length : 0;
      const commentCount = post.comments ? Object.keys(post.comments).length : 0;
      const isLiked = post.likes && currentUser && post.likes[currentUser.uid];
      const shortPrompt = post.prompt.length > 80 ? post.prompt.slice(0, 78) + '…' : post.prompt;

      card.innerHTML = `
        <div class="post-image-wrap">
          <div class="skeleton-shimmer" id="sk-${post.id}"></div>
          <img class="post-image" src="${post.imageUrl}" alt="${shortPrompt}"
            style="opacity:0;"
            onload="this.style.opacity='1'; document.getElementById('sk-${post.id}').style.display='none';" />
        </div>
        <div class="post-overlay"></div>

        <div class="post-content">
          <div class="post-info">
            <div class="post-prompt">${escHtml(shortPrompt)}</div>
            <div class="post-meta">
              <span class="ai-badge">✦ Ona AI</span>
              <span>@${escHtml(post.username || 'creator')}</span>
            </div>
          </div>
          <div class="action-panel">
            <div class="action-item">
              <button class="action-btn ${isLiked ? 'liked' : ''}" id="like-btn-${post.id}" onclick="toggleLike('${post.id}', this)">
                <span class="material-symbols-rounded" style="font-variation-settings:'FILL' ${isLiked ? 1 : 0};font-size:24px;color:${isLiked ? 'var(--primary)' : 'white'};">favorite</span>
              </button>
              <span class="action-count" id="like-count-${post.id}">${likeCount}</span>
            </div>
            <div class="action-item">
              <button class="action-btn" onclick="openComments('${post.id}')">
                <span class="material-symbols-rounded" style="font-size:22px;">chat_bubble</span>
              </button>
              <span class="action-count" id="comment-count-${post.id}">${commentCount}</span>
            </div>
            <div class="action-item">
              <button class="action-btn" onclick="sharePost('${post.id}', \`${escHtml(post.prompt)}\`)">
                <span class="material-symbols-rounded" style="font-size:22px;">share</span>
              </button>
            </div>
          </div>
        </div>`;

      // Double-tap to like
      let lastTap = 0;
      card.addEventListener('click', (e) => {
        if (e.target.closest('.action-panel') || e.target.closest('.post-info')) return;
        const now = Date.now();
        if (now - lastTap < 300) {
          triggerHeartPop(card);
          if (!document.getElementById('like-btn-' + post.id).classList.contains('liked')) {
            toggleLike(post.id, document.getElementById('like-btn-' + post.id));
          }
        }
        lastTap = now;
      });

      return card;
    }

    function buildGenMoreCard() {
      const card = document.createElement('div');
      card.className = 'gen-more-card';
      card.innerHTML = `
        <div class="gen-more-icon">✦</div>
        <h2 class="gen-more-title">Keep the Vision Flowing</h2>
        <p class="gen-more-sub">Generate another AI artwork and add it to the feed.</p>
        <button class="gen-btn" onclick="openGenerateSheet()">Create New Vision</button>
      `;
      return card;
    }

    function triggerHeartPop(card) {
      const heart = document.createElement('div');
      heart.className = 'heart-pop';
      heart.textContent = '❤️';
      card.querySelector('.post-image-wrap').appendChild(heart);
      setTimeout(() => heart.remove(), 700);
    }

    // ── LIKE TOGGLE ──
    window.toggleLike = async function(postId, btn) {
      if (!currentUser) return;
      const likeRef = ref(db, `ona_posts/${postId}/likes/${currentUser.uid}`);
      const snap = await get(likeRef);
      const countEl = document.getElementById('like-count-' + postId);
      const icon = btn.querySelector('.material-symbols-rounded');
      let count = parseInt(countEl.textContent) || 0;

      btn.classList.add('burst');
      setTimeout(() => btn.classList.remove('burst'), 400);

      if (snap.exists()) {
        await set(likeRef, null);
        btn.classList.remove('liked');
        icon.style.color = 'white';
        icon.style.fontVariationSettings = "'FILL' 0";
        countEl.textContent = Math.max(0, count - 1);
      } else {
        await set(likeRef, true);
        btn.classList.add('liked');
        icon.style.color = 'var(--primary)';
        icon.style.fontVariationSettings = "'FILL' 1";
        countEl.textContent = count + 1;
      }
    };

    // ── COMMENTS ──
    window.openComments = function(postId) {
      activePostId = postId;
      const sheet = document.getElementById('commentsSheet');
      sheet.classList.add('open');
      loadComments(postId);
    };

    window.closeComments = function() {
      document.getElementById('commentsSheet').classList.remove('open');
      activePostId = null;
    };

    window.closeCommentsSheet = function(e) {
      if (e.target === document.getElementById('commentsSheet')) closeComments();
    };

    function loadComments(postId) {
      const list = document.getElementById('commentsList');
      list.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;text-align:center;">Loading…</div>';
      get(ref(db, `ona_posts/${postId}/comments`)).then(snap => {
        list.innerHTML = '';
        if (!snap.exists()) {
          list.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;text-align:center;">Be the first to comment ✦</div>';
          return;
        }
        const comments = Object.values(snap.val()).sort((a, b) => (a.ts || 0) - (b.ts || 0));
        comments.forEach(c => {
          const initials = (c.username || 'U').slice(0, 1).toUpperCase();
          list.innerHTML += `
            <div class="comment-item">
              <div class="comment-avatar">${initials}</div>
              <div class="comment-body">
                <div class="comment-user">@${escHtml(c.username || 'user')}</div>
                <div class="comment-text">${escHtml(c.text)}</div>
              </div>
            </div>`;
        });
        list.scrollTop = list.scrollHeight;
      });
    }

    window.postComment = async function() {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!text || !activePostId || !currentUser) return;
      input.value = '';
      const commentRef = ref(db, `ona_posts/${activePostId}/comments`);
      await push(commentRef, { username: currentUsername, text, ts: Date.now() });
      // update count in UI
      const countEl = document.getElementById('comment-count-' + activePostId);
      if (countEl) countEl.textContent = parseInt(countEl.textContent || 0) + 1;
      loadComments(activePostId);
    };

    document.getElementById('commentInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') postComment();
    });

    // ── SHARE ──
    window.sharePost = async function(postId, prompt) {
      if (navigator.share) {
        try {
          await navigator.share({ title: 'Ona AI Vision', text: `Check this AI art: "${prompt}"`, url: window.location.href });
        } catch(e) {}
      } else {
        navigator.clipboard?.writeText(window.location.href);
        alert('Link copied!');
      }
    };

    // ── GENERATE SHEET ──
    window.openGenerateSheet = function() {
      document.getElementById('genSheet').classList.add('open');
      setTimeout(() => document.getElementById('customPrompt').focus(), 300);
    };

    window.closeGenSheet = function(e) {
      if (e.target === document.getElementById('genSheet')) {
        document.getElementById('genSheet').classList.remove('open');
      }
    };

    window.usePrompt = function(promptText) {
      document.getElementById('genSheet').classList.remove('open');
      generateImage(promptText);
    };

    window.submitCustomPrompt = function() {
      const val = document.getElementById('customPrompt').value.trim();
      if (!val) return;
      document.getElementById('customPrompt').value = '';
      document.getElementById('genSheet').classList.remove('open');
      generateImage(val);
    };

    // ── IMAGE GENERATION ──
    async function generateImage(prompt) {
      if (!XAI_API_KEY) { alert("API key not loaded yet. Try again."); return; }

      const spinner = document.getElementById('spinnerOverlay');
      spinner.classList.add('open');

      try {
        const res = await fetch(`${API_BASE}/images/generations`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${XAI_API_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: "grok-imagine-image", prompt })
        });

        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        const imageUrl = data.data?.[0]?.url;
        if (!imageUrl) throw new Error("No image returned");

        // Save to Firebase
        const postsRef = ref(db, 'ona_posts');
        await push(postsRef, {
          prompt,
          imageUrl,
          username: currentUsername,
          uid: currentUser.uid,
          createdAt: Date.now()
        });

        // Scroll to top of feed
        document.getElementById('feed').scrollTo({ top: 0, behavior: 'smooth' });

      } catch(err) {
        console.error(err);
        alert("Generation failed: " + err.message);
      } finally {
        spinner.classList.remove('open');
      }
    }

    // ── UTILS ──
    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    window.escHtml = escHtml;
  </script>
</body>
</html>

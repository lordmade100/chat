    <style>

const tabScrolls = { home: 0, search: 0, notifications: 0, profile: 0 };

window.setNavActive = (name) => {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const target = document.getElementById(`nav-${name}`);
    if (target) target.classList.add('active');
};

window.switchMainTab = (tabId, args = null) => {
    // Save scroll state of current tab
    tabScrolls[mainTabsList[currentMainTabIdx]] = window.scrollY;
    
    document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${tabId}`).classList.add('active');
    setNavActive(tabId);
    currentMainTabIdx = mainTabsList.indexOf(tabId);
    
    // Load specific tab data
    if (tabId === 'profile') loadProfile(args || currentUser?.uid);
    if (tabId === 'notifications') loadNotifications();
    if (tabId === 'search') {
        const searchInput = document.getElementById('main-search-input');
        if (!searchInput.value) showRecentSearchPosts();
    }

    // Restore scroll state
    window.scrollTo(0, tabScrolls[tabId] || 0);
};

window.goToHome = () => { 
    if(currentMainTabIdx === 0) window.scrollTo({top:0, behavior:'smooth'}); 
    else switchMainTab('home'); 
};
window.goToProfile = (uid) => {
    switchMainTab('profile', uid || currentUser?.uid);
};
window.goToPost = (id) => {
    switchMainTab('home');
    setTimeout(() => {
        const el = document.getElementById(`post-${id}`);
        if (el) {
            el.scrollIntoView({behavior:'smooth', block:'center'});
            el.style.background = 'rgba(var(--primary-rgb),0.1)';
            setTimeout(() => el.style.background = '', 2000);
        }
    }, 300);
};

// Swipe Detection Logic
let appTouchStartX = 0;
let appTouchStartY = 0;
document.addEventListener('touchstart', e => {
    if(e.target.closest('.stories-container') || e.target.closest('.carousel') || e.target.closest('.vynix-player') || e.target.closest('.vf-overlay') || e.target.closest('.story-viewer') || e.target.closest('.bottom-sheet')) return;
    appTouchStartX = e.touches[0].clientX;
    appTouchStartY = e.touches[0].clientY;
}, {passive: true});

document.addEventListener('touchend', e => {
    if(appTouchStartX === 0) return;
    const appTouchEndX = e.changedTouches[0].clientX;
    const appTouchEndY = e.changedTouches[0].clientY;
    const dx = appTouchEndX - appTouchStartX;
    const dy = appTouchEndY - appTouchStartY;

    if (Math.abs(dx) > 60 && Math.abs(dy) < 50) {
        if (dx < 0 && currentMainTabIdx < mainTabsList.length - 1) switchMainTab(mainTabsList[currentMainTabIdx + 1]);
        else if (dx > 0 && currentMainTabIdx > 0) switchMainTab(mainTabsList[currentMainTabIdx - 1]);
    }
    appTouchStartX = 0;
}, {passive: true});

let newProfilePicFile = null;

window.openEditProfile = () => {
    document.getElementById('edit-profile-username').value = currentUserData.username || '';
    document.getElementById('edit-profile-img-preview').src = currentUserData.photoURL || DEFAULT_AVATAR;
    newProfilePicFile = null; // Reset selection

    feather.replace(); // Render camera icon
};

    document.getElementById('edit-profile-overlay').classList.remove('active');
};

window.handleProfilePicSelect = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    newProfilePicFile = file;
    document.getElementById('edit-profile-img-preview').src = URL.createObjectURL(file);
};

window.saveProfile = async () => {
    const un = document.getElementById('edit-profile-username').value.trim();
    if(!un) return showToast('Username required');
    
    const btn = document.getElementById('save-profile-btn');
    btn.textContent = 'Saving...';
    btn.disabled = true;

    try {
        let photoURL = currentUserData.photoURL;

        // Upload new picture if one was selected
        if (newProfilePicFile) {
            const r = await uploadToCloudinary(newProfilePicFile, 'avatars');
            photoURL = r.secure_url;
        }

        // Save to Firebase (Display Name removed)
        await update(ref(db, `users/${currentUser.uid}`), { username: un, photoURL: photoURL });
        
        // Update local app state
        currentUserData.username = un;
        currentUserData.photoURL = photoURL;
        document.getElementById('compose-avatar').src = photoURL || DEFAULT_AVATAR;
        document.getElementById('my-story-img').src = photoURL || DEFAULT_AVATAR;
        document.getElementById('nav-profile-avatar').src = photoURL || DEFAULT_AVATAR;
        
        showToast('Profile updated');
        closeEditProfile();
        loadProfile(currentUser.uid);
        
        // Reflect new data instantly in local cache posts
        allPostsCache.forEach(p => {
            if(p.uid === currentUser.uid && p.user) { 
                p.user.username = un; 
                p.user.photoURL = photoURL;
            }
        });
        rerenderFeed();
        saveOfflineData();
    } catch(e) { 
        showToast('Error saving profile'); 
    }
    
    btn.textContent = 'Save';
    btn.disabled = false;
};

window.closePostDetail = (e) => {
    if (e && e.target !== document.getElementById('post-detail-overlay')) return;
    document.getElementById('post-detail-overlay').classList.remove('active');
    document.body.style.overflow = '';
    // Pause any video inside the sheet
    document.querySelectorAll('#post-detail-body video').forEach(v => { v.pause(); v.src = ''; });
    setTimeout(() => { document.getElementById('post-detail-body').innerHTML = ''; }, 350);
};

window.addEventListener('popstate', (e) => {
    if (window._postDetailBack && document.getElementById('post-detail-overlay').classList.contains('active')) {
        window._postDetailBack();
        window._postDetailBack = null;
    }
});

/* ══ SEARCH VIDEO STRIP ══ */
function renderSearchVideoStrip() {
    const videos = allPostsCache.filter(p =>
        p.mediaType === 'video' || (p.mediaUrls && p.mediaUrls.some(m => m.type === 'video'))
    ).slice(0, 20);

    const strip = document.getElementById('search-video-strip');
    const scroll = document.getElementById('search-video-scroll');
    if (!videos.length) { strip.style.display = 'none'; return; }

    strip.style.display = 'block';
    scroll.innerHTML = videos.map(post => {
        const user = post.user || {};
        const videoSrc = post.mediaType === 'video'
            ? post.mediaUrl
            : (post.mediaUrls?.find(m => m.type === 'video')?.url || '');
        const caption = (post.text || '').slice(0, 40);
        return `
            <div class="svs-item" onclick="openVideoFeed('${post.id}')">
                <video src="${videoSrc}" muted playsinline preload="metadata" loop></video>
                <div class="svs-item-overlay"></div>
                <div class="svs-play-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </div>
                <div class="svs-item-info">
                    <div class="svs-item-author">@${escapeHtml(user.username || 'user')}</div>
                    ${caption ? `<div class="svs-item-caption">${escapeHtml(caption)}</div>` : ''}
                </div>
            </div>`;
    }).join('');

    // Lazy-play on hover/intersection for thumbnails
    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            const v = entry.target.querySelector('video');
            if (!v) return;
            if (entry.isIntersecting) { v.play().catch(()=>{}); }
            else { v.pause(); }
        });
    }, { threshold: 0.5 });
    scroll.querySelectorAll('.svs-item').forEach(el => observer.observe(el));
}

                    <div style="font-weight:600;font-size:14px;">${escapeHtml(p.user?.username || 'User')}</div>

window.handleMainSearch = async (query) => {
    const container = document.getElementById('search-results-container');
    if(!query.trim()) { showRecentSearchPosts(); return; }
    
    // Hide video strip while searching
    document.getElementById('search-video-strip').style.display = 'none';
    
    const q = query.toLowerCase();
    const users = await getAllUsers();
    const userResults = users.filter(u => u.username?.toLowerCase().includes(q) || u.displayName?.toLowerCase().includes(q)).slice(0, 6);
    
    const postResults = allPostsCache.filter(p => (p.text || '').toLowerCase().includes(q) || (p.user?.username || '').toLowerCase().includes(q)).slice(0, 15);
    
    let html = '';
    
    if(userResults.length > 0) {
        html += `<div style="padding: 12px 16px 4px; font-weight: 600; font-size: 13px; color: var(--text-secondary);">Users</div>`;
        html += userResults.map(u => `
            <div class="search-result-item" onclick="goToProfile('${u.uid}')">
                <img src="${u.photoURL || DEFAULT_AVATAR}" class="avatar">
                <div style="flex:1;">
                    <div style="font-weight:600;font-size:15px;display:flex;align-items:center;gap:4px;">
                        ${escapeHtml(u.displayName || u.username)} ${u.verified ? VERIFIED_BADGE_SVG : ''}
                    </div>
                    <div style="font-size:13px;color:var(--text-secondary);">@${escapeHtml(u.username)}</div>
                </div>
            </div>
        `).join('');
    }
    
    if(postResults.length > 0) {
        html += `<div style="padding: 12px 16px 4px; font-weight: 600; font-size: 13px; color: var(--text-secondary);">Posts</div>`;
        html += postResults.map(p => `
            <div class="search-result-item" onclick="goToPost('${p.id}')" style="align-items: flex-start;">
                <img src="${p.user?.photoURL || DEFAULT_AVATAR}" class="avatar" style="width:36px;height:36px;">
                <div style="flex:1;">
                    <div style="font-weight:600;font-size:13px;">${escapeHtml(p.user?.username || 'User')}</div>
                    <div style="font-size:13px;color:var(--text-primary);margin-top:2px;">${escapeHtml((p.text||'').substring(0,80))}${p.text?.length>80?'...':''}</div>
                </div>
                ${p.mediaUrls ? `<img src="${p.mediaUrls[0].url}" style="width:48px;height:48px;object-fit:cover;border-radius:6px;">` : 
                 (p.mediaUrl ? `<img src="${p.mediaUrl}" style="width:48px;height:48px;object-fit:cover;border-radius:6px;">` : '')}
            </div>
        `).join('');
    }
    
    if(!html) html = '<div class="empty-state">No results found.</div>';
    container.innerHTML = html;
};

/* ══ NOTIFICATIONS LOGIC ══ */
window.loadNotifications = async () => {
    const list = document.getElementById('notifications-list');
    list.innerHTML = '<div class="loading-more active"><div class="vynix-spinner"></div></div>';
    
    try {
        const snap = await get(ref(db, `notifications/${currentUser.uid}`));
        if (!snap.exists()) {
            list.innerHTML = '<div class="empty-state">No notifications yet.</div>';
            return;
        }
        
        const notifs = [];
        snap.forEach(child => { notifs.push({ id: child.key, ...child.val() }); });
        notifs.sort((a, b) => b.timestamp - a.timestamp);
        
        // Use the user cache to avoid hundreds of fetch calls
        const usersCache = await getAllUsers();
        
        list.innerHTML = '';
        for (const n of notifs) {
            let actor = usersCache.find(u => u.uid === n.actorId) || { username: 'Someone', photoURL: DEFAULT_AVATAR };
            if (!actor.uid) { // Fallback if not in cache
                try { const asnap = await get(ref(db, `users/${n.actorId}`)); if(asnap.exists()) actor = asnap.val(); } catch(e) {}
            }
            
            let text = ''; let icon = '';
            if (n.type === 'like') { text = 'liked your post.'; icon = '<i data-feather="heart" style="color:var(--like);width:14px;height:14px;fill:var(--like);"></i>'; }
            else if (n.type === 'comment') { text = 'commented on your post.'; icon = '<i data-feather="message-circle" style="width:14px;height:14px;color:var(--primary);fill:var(--primary);"></i>'; }
            else if (n.type === 'follow') { text = 'started following you.'; icon = '<i data-feather="user-plus" style="color:var(--primary);width:14px;height:14px;"></i>'; }
            
            const el = document.createElement('div');
            el.className = `notification-item ${!n.read ? 'unread' : ''}`;
            el.innerHTML = `
                <div class="notif-icon-wrap">
                    <img src="${actor.photoURL || DEFAULT_AVATAR}" class="avatar">
                    <div class="notif-badge">${icon}</div>
                </div>
                <div class="notif-content">
                    <span style="font-weight:600;">${escapeHtml(actor.username)}</span> ${text}
                    <div class="notif-time">${formatTime(n.timestamp)}</div>
                </div>
            `;
            el.onclick = () => {
                update(ref(db, `notifications/${currentUser.uid}/${n.id}`), { read: true });
                el.classList.remove('unread');
                if(n.postId) goToPost(n.postId);
                else if(n.type === 'follow') goToProfile(n.actorId);
            };
            list.appendChild(el);
        }
        feather.replace();
    } catch (e) {
        list.innerHTML = '<div class="empty-state">Error loading notifications.</div>';
    }
};

/* ══ PROFILE LOGIC ══ */
window.loadProfile = async (uid) => {
    const content = document.getElementById('profile-content');
    content.innerHTML = '<div class="loading-more active"><div class="vynix-spinner"></div></div>';
    document.getElementById('profile-header-username').textContent = 'Loading...';
    
    try {
        const isOwn = uid === currentUser?.uid;
        let uData = isOwn ? currentUserData : null;
        if (!uData) {
            const snap = await get(ref(db, `users/${uid}`));
            if (!snap.exists()) throw new Error('User not found');
            uData = snap.val();
        }
        
        document.getElementById('profile-header-username').textContent = uData.username || 'User';
        
        const followersCount = Object.keys(uData.followers || {}).length;
        const followingCount = Object.keys(uData.following || {}).length;
        const isFollowing = !!currentUserData?.following?.[uid];
        
        let actionBtn = '';
        if (isOwn) {
            actionBtn = `<button class="profile-action-btn edit" onclick="openEditProfile()">Edit Profile</button>`;
        } else {
            actionBtn = `
            <div style="display:flex; gap:8px; width:100%; max-width:250px;">
                <button style="flex:1;" class="profile-action-btn ${isFollowing?'following':'primary'} follow-btn-${uid}" onclick="toggleFollow('${uid}', event)">${isFollowing?'Following':'Follow'}</button>
                <button style="flex:1;" class="profile-action-btn edit" onclick="window.location.href='messages.html?userid=${uid}'">Message</button>
            </div>`;
        }

        let html = `
            <div class="profile-header-card">
                <img src="${uData.photoURL || DEFAULT_AVATAR}" class="profile-avatar-large" onclick="openImageViewer(this.src)">
                <div style="font-weight:700;font-size:20px;display:flex;align-items:center;justify-content:center;gap:4px;">
                    @${escapeHtml(uData.username)} ${uData.verified ? VERIFIED_BADGE_SVG : ''}
                </div>
                
                <div class="profile-stats">
                    <div class="stat"><strong id="profile-post-count">0</strong> Posts</div>
                    <div class="stat"><strong>${followersCount}</strong> Followers</div>
                    <div class="stat"><strong>${followingCount}</strong> Following</div>
                </div>
                ${actionBtn}
            </div>
            <div class="profile-grid" id="profile-grid"></div>
        `;

// ── ALGORITHM ──
function scorePost(post) {
    const now = Date.now();
    const ageMs = now - (post.timestamp || now);
    const ageHours = ageMs / 3600000;
    const likeCount    = Object.keys(post.likes    || {}).length;
    const commentCount = Object.keys(post.comments || {}).length;
    const repostCount  = Object.keys(post.reposts  || {}).length;
    const rawEng = likeCount * 3 + commentCount * 6 + repostCount * 5;
    const velocity = rawEng / Math.max(ageHours, 0.5);
    const decay = Math.pow(0.5, ageHours / 10);
    const freshnessBoost = ageHours < 0.5 ? 25 : ageHours < 2 ? 14 : ageHours < 6 ? 5 : 0;
    const hasGallery = post.mediaUrls && post.mediaUrls.length > 1;
    const mediaBonus = hasGallery ? 18 : (post.mediaUrl ? 12 : 0);
    const verifiedBonus = post.isVerified ? 10 : 0;
    const ownBoost = post.uid === currentUser?.uid ? 20 : 0;
    const repostPenalty = post.isRepost ? -10 : 0;
    const textLen = (post.text || '').length;
    const textBonus = textLen > 200 ? 6 : textLen > 80 ? 3 : 0;
    const idNum = parseInt((post.id || '0').replace(/\D/g,'').slice(-6)) || 1;
    const nudge = Math.sin(idNum * 0.0137 + shuffleSeed * 0.001) * 8;
    const base = (rawEng + velocity * 1.5 + freshnessBoost + mediaBonus + verifiedBonus + ownBoost + textBonus) * decay;
    return base + repostPenalty + nudge;
}

function getSortedPosts(tab) {
    const posts = [...allPostsCache];
    if (tab === 'foryou') {
        const sorted = posts.sort((a, b) => scorePost(b) - scorePost(a));
        const result = [];
        const rising = posts.filter(p => {
            const likeCount    = Object.keys(p.likes    || {}).length;
            const commentCount = Object.keys(p.comments || {}).length;
            const ageHours = (Date.now() - (p.timestamp || Date.now())) / 3600000;
            return ageHours < 4 && (likeCount + commentCount) > 0;
        }).sort((a, b) => {
            const va = Object.keys(a.likes||{}).length * 3 + Object.keys(a.comments||{}).length * 6;
            const vb = Object.keys(b.likes||{}).length * 3 + Object.keys(b.comments||{}).length * 6;
            return vb - va;
        });
        let ri = 0;
        sorted.forEach((post, i) => {
            result.push(post);
            if ((i + 1) % 5 === 0 && ri < rising.length) {
                const rp = rising[ri++];
                if (!result.find(p => p.id === rp.id)) result.push(rp);
            }
        });
        return result;
    }
    if (tab === 'following') return posts.filter(p => !p.isRepost).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    if (tab === 'trending') {
        const cutoff = Date.now() - 48 * 3600 * 1000;
        return posts.filter(p => (p.timestamp || 0) > cutoff).sort((a, b) => {
            const ea = Object.keys(a.likes || {}).length * 3 + Object.keys(a.comments || {}).length * 6;
            const eb = Object.keys(b.likes || {}).length * 3 + Object.keys(b.comments || {}).length * 6;
            return eb - ea;
        });
    }
    return posts;
}

async function loadPosts() {
    const feed = document.getElementById('feed');
    // If we loaded offline, don't show skeletons
    if(allPostsCache.length === 0) {
        ['skel-1','skel-2'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'block'; });
    } else {
        ['skel-1','skel-2'].forEach(id => { const el = document.getElementById(id); if (el) el.remove(); });
    }
    
    try {
       const recentPostsQuery = query(ref(db, 'posts'), limitToLast(200));
        const snapshot = await get(recentPostsQuery);
        
        if (!snapshot.exists()) {
            if(allPostsCache.length === 0) feed.innerHTML = '<div class="empty-state">No posts yet. Be the first to post!</div>';
            setupPostsListeners(); return;
        }
        
        allPostsCache = [];
        const promises = [];
        
        snapshot.forEach(child => {
            promises.push((async () => {
                const post = { id: child.key, ...child.val() };
                try {
                    const us = await get(ref(db, `users/${post.uid}`));
                    post.user = us.val() || {}; 
                    post.isVerified = post.user.verified || false;
                    if (post.isRepost && post.originalUid) {
                        const os = await get(ref(db, `users/${post.originalUid}`));
                        post.originalUser = os.val() || {};
                    }
                } catch { post.user = {}; }
                allPostsCache.push(post);
            })());
        });
        
        await Promise.all(promises);
        saveOfflineData(); // Save fresh posts
        
        const cutoff = Date.now() - 48 * 3600 * 1000;
        document.getElementById('trending-count').textContent = allPostsCache.filter(p => (p.timestamp || 0) > cutoff).length;
        
        allPostKeys = getSortedPosts(currentTab).map(p => ({ id: p.id, timestamp: p.timestamp }));
        hasMorePages = allPostKeys.length > 0;
        
        feed.innerHTML = '';
        loadedPostIds.clear();
        pageIndex = 0;
        
        await loadNextPage(); 
        setupScrollObserver(); 
        setupPostsListeners();
        
    } catch (e) {
        console.error(e);
        if(allPostsCache.length === 0) feed.innerHTML = '<div class="empty-state">Error loading posts. Please refresh.</div>';
    }
}

async function loadNextPage() {
    if (isLoadingPage || !hasMorePages) return;
    isLoadingPage = true;
    document.getElementById('loading-more').classList.add('active');
    try {
        const slice = allPostKeys.slice(pageIndex * PAGE_SIZE, (pageIndex + 1) * PAGE_SIZE);
        if (!slice.length) { hasMorePages = false; return; }
        for (const { id } of slice) {
            if (loadedPostIds.has(id)) continue;
            loadedPostIds.add(id);
            let post = allPostsCache.find(p => p.id === id);
            if (!post) {
                try {
                    const s = await get(ref(db, `posts/${id}`));
                    if (!s.exists()) continue;
                    post = { id, ...s.val() };
                    const us = await get(ref(db, `users/${post.uid}`));
                    post.user = us.val() || {}; post.isVerified = post.user.verified || false;
                    if (post.isRepost && post.originalUid) {
                        const os = await get(ref(db, `users/${post.originalUid}`));
                        post.originalUser = os.val() || {};
                    }
                } catch { continue; }
            }
            renderPost(post);
            await new Promise(r => setTimeout(r, 10)); // Faster rendering
        }
        pageIndex++;
        hasMorePages = pageIndex * PAGE_SIZE < allPostKeys.length;
    } finally {
        isLoadingPage = false;
        document.getElementById('loading-more').classList.remove('active');
        if (!hasMorePages) { const s = document.getElementById('scroll-sentinel'); if (s) s.remove(); }
    }
}

function setupScrollObserver() {
    const old = document.getElementById('scroll-sentinel'); if (old) old.remove();
    if (!hasMorePages) return;
    const sentinel = document.createElement('div'); sentinel.id = 'scroll-sentinel'; sentinel.style.height = '1px';
    document.getElementById('loading-more').before(sentinel);
    if (scrollObserver) scrollObserver.disconnect();
    scrollObserver = new IntersectionObserver(entries => { if (entries[0].isIntersecting) loadNextPage(); }, { rootMargin: '300px' });
    scrollObserver.observe(sentinel);
}

function setupPostsListeners() {

    const postsRef = query(ref(db, 'posts'), limitToLast(10));
    
    onChildAdded(postsRef, async (snap) => {
        const postId = snap.key;
        if (loadedPostIds.has(postId) || allPostsCache.find(p => p.id === postId)) return;
        
        const post = { id: postId, ...snap.val() };
        try {
            const us = await get(ref(db, `users/${post.uid}`));
            post.user = us.val() || {}; post.isVerified = post.user.verified || false;
            if (post.isRepost && post.originalUid) {
                const os = await get(ref(db, `users/${post.originalUid}`));
                post.originalUser = os.val() || {};
            }
        } catch { post.user = {}; post.isVerified = false; }
        
        allPostsCache.unshift(post);
        if (!isUserAtTop) { 
            loadedPostIds.add(postId); 
            pendingNewPosts.unshift(post); 
            showPill(); 
        } else { 
            loadedPostIds.add(postId); 
            renderPost(post, true);

        allPostsCache    = allPostsCache.filter(p => p.id !== snap.key);
        allPostKeys      = allPostKeys.filter(p => p.id !== snap.key);
        pendingNewPosts  = pendingNewPosts.filter(p => p.id !== snap.key);
        if (!pendingNewPosts.length) hidePill();
        cleanupPostListeners(snap.key);
    });

window.triggerDoubleTapLike = async (postId) => {
    const heart = document.getElementById(`dt-heart-${postId}`);
    if (heart) {
        heart.classList.remove('animate');
        void heart.offsetWidth; 
        heart.classList.add('animate');
    }

    if (btn && !btn.classList.contains('liked')) {
        await toggleLike(postId);
    }
};

window.sharePost = async (postId, username, text) => {
    const shareData = {
        title: `Post by @${username} on Vynix`,
        text: text ? (text.length > 60 ? text.substring(0, 60) + '...' : text) : 'Check out this post on Vynix!',
        url: window.location.origin + window.location.pathname + `#post-${postId}`
    };

    try {
        if (navigator.share && navigator.canShare(shareData)) {
            await navigator.share(shareData);
        } else {
            await navigator.clipboard.writeText(shareData.url);
            showToast('Link copied to clipboard!');
        }
    } catch (err) {
        console.warn('Error sharing:', err);
    }
};

// ── EDIT AND REPORT LOGIC ──
window.openEditModal = (postId, event) => {
    if (event) event.stopPropagation();
    document.querySelectorAll('.post-dropdown').forEach(d => d.classList.remove('active'));
    
    const post = allPostsCache.find(p => p.id === postId);
    if (!post) return;
    
    currentEditPostId = postId;
    document.getElementById('edit-post-text').value = post.text || '';
    
    document.getElementById('edit-overlay').classList.add('active');
    document.getElementById('edit-modal').classList.add('active');
};

window.closeEditModal = () => {
    document.getElementById('edit-overlay').classList.remove('active');
    document.getElementById('edit-modal').classList.remove('active');
    currentEditPostId = null;
};

window.saveEdit = async () => {
    if (!currentEditPostId) return;
    
    const newText = document.getElementById('edit-post-text').value.trim();
    const btn = document.getElementById('save-edit-btn');
    
    btn.disabled = true;
    btn.textContent = 'Saving...';
    
    try {
        await update(ref(db, `posts/${currentEditPostId}`), { text: newText, editedAt: serverTimestamp() });
        
        const postIdx = allPostsCache.findIndex(p => p.id === currentEditPostId);
        if (postIdx > -1) allPostsCache[postIdx].text = newText;
        
        const oldTextNode = document.getElementById(`post-text-${currentEditPostId}`);
        if (oldTextNode) {
            const seeMoreBtn = document.getElementById(`see-more-${currentEditPostId}`);
            if (seeMoreBtn) seeMoreBtn.remove();
            
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = renderPostText(newText, currentEditPostId);
            oldTextNode.replaceWith(...tempDiv.childNodes);
        }
        
        showToast('Post updated');
        closeEditModal();
        saveOfflineData();
    } catch (e) {
        showToast('Failed to update post');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Done';
    }
};

window.reportPost = async (postId, event) => {
    if (event) event.stopPropagation();
    document.querySelectorAll('.post-dropdown').forEach(d => d.classList.remove('active'));
    
    if (!currentUser) return showToast("Please login to report.");
    
    try {
        await push(ref(db, 'reports'), {
            postId: postId,
            reporterUid: currentUser.uid,
            timestamp: serverTimestamp()
        });
        showToast('Post reported');
    } catch (e) {
        showToast('Failed to send report');
    }
};


// ── AUTOPLAY INTERSECTION OBSERVER ──
const feedVideoObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        const vid = entry.target;
        if (document.getElementById('vf-overlay')?.classList.contains('active')) return;

        if (entry.isIntersecting) {
            if (vid.paused) {
                const playPromise = vid.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {});
                }
            }
        } else {
            if (!vid.paused) {
                vid.pause();
            }
        }
    });
}, { threshold: 0.6 });

function initVynixPlayer(playerId) {
    const container = document.getElementById(playerId);
    if (!container || container._vInit) return;
    container._vInit = true;
    const video    = document.getElementById(`${playerId}-video`);
    const progress = document.getElementById(`${playerId}-progress`);
    const buffer   = document.getElementById(`${playerId}-buffer`);
    const timeEl   = document.getElementById(`${playerId}-time`);
    const progWrap = document.getElementById(`${playerId}-prog-wrap`);
    const tapIcon  = document.getElementById(`${playerId}-tap-icon`);
    const tapSvg   = document.getElementById(`${playerId}-tap-svg`);
    const playIcon = document.getElementById(`${playerId}-play-icon`);
    const loader   = document.getElementById(`${playerId}-loader`);
    let cTimer = null, scrubbing = false;

    feedVideoObserver.observe(video);

    const fmt = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    const showCtrls = () => { container.classList.add('controls-visible'); clearTimeout(cTimer); cTimer = setTimeout(() => { if (!video.paused) container.classList.remove('controls-visible'); }, 3000); };
    const flashIcon = (playing) => {
        tapSvg.innerHTML = playing ? '<polygon points="5 3 19 12 5 21 5 3"/>' : '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
        tapIcon.classList.remove('hide'); tapIcon.classList.add('show');
        clearTimeout(tapIcon._t); tapIcon._t = setTimeout(() => { tapIcon.classList.remove('show'); tapIcon.classList.add('hide'); setTimeout(() => tapIcon.classList.remove('hide'), 200); }, 600);
    };
    const updateIcon = () => { playIcon.innerHTML = video.paused ? '<polygon points="5 3 19 12 5 21 5 3"/>' : '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'; };
    container.addEventListener('click', e => {
        if (e.target.closest('.vynix-controls')) return;
        if (video.paused) { video.play().catch(()=>{}); flashIcon(true); } else { video.pause(); flashIcon(false); }
        showCtrls();
    });
    video.addEventListener('play',    () => { updateIcon(); container.classList.add('controls-visible'); setTimeout(() => { if (!video.paused) container.classList.remove('controls-visible'); }, 2000); });
    video.addEventListener('pause',   () => { updateIcon(); container.classList.add('controls-visible'); });
    video.addEventListener('ended',   () => { updateIcon(); container.classList.add('controls-visible'); });
    video.addEventListener('waiting', () => loader.classList.add('active'));
    video.addEventListener('canplay', () => loader.classList.remove('active'));
    video.addEventListener('playing', () => loader.classList.remove('active'));
    video.addEventListener('timeupdate', () => { if (scrubbing || !video.duration) return; progress.style.width = (video.currentTime/video.duration*100)+'%'; timeEl.textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`; });
    video.addEventListener('loadedmetadata', () => { timeEl.textContent = `0:00 / ${fmt(video.duration)}`; });
    video.addEventListener('progress', () => { if (!video.duration) return; try { buffer.style.width = (video.buffered.end(video.buffered.length-1)/video.duration*100)+'%'; } catch {} });
    const getScrub = e => { const r = progWrap.getBoundingClientRect(); const x = e.touches ? e.touches[0].clientX : e.clientX; return Math.max(0,Math.min(1,(x-r.left)/r.width)); };
    progWrap.addEventListener('mousedown', e => { scrubbing=true; video.currentTime=getScrub(e)*video.duration; e.stopPropagation(); });
    window.addEventListener('mousemove', e => { if (!scrubbing) return; if (video.duration) video.currentTime=getScrub(e)*video.duration; progress.style.width=(video.currentTime/video.duration*100)+'%'; });
    window.addEventListener('mouseup',   () => scrubbing=false);
    progWrap.addEventListener('touchstart', e => { scrubbing=true; if (video.duration) video.currentTime=getScrub(e)*video.duration; e.stopPropagation(); }, {passive:true});
    progWrap.addEventListener('touchmove',  e => { if (!scrubbing||!video.duration) return; video.currentTime=getScrub(e)*video.duration; progress.style.width=(video.currentTime/video.duration*100)+'%'; }, {passive:true});
    progWrap.addEventListener('touchend', () => scrubbing=false);
    container.addEventListener('mousemove',  showCtrls);
    container.addEventListener('touchstart', showCtrls, {passive:true});
}

window.vynixTogglePlay = id => { const v = document.getElementById(`${id}-video`); if (!v) return; v.paused ? v.play().catch(()=>{}) : v.pause(); };
window.vynixToggleMute = id => { const v = document.getElementById(`${id}-video`); const b = document.getElementById(`${id}-mute-btn`); if (!v) return; v.muted = !v.muted; b.classList.toggle('muted', v.muted); };
window.vynixToggleFullscreen = id => { const c = document.getElementById(id); if (!c) return; document.fullscreenElement ? document.exitFullscreen() : (c.requestFullscreen?.() || c.webkitRequestFullscreen?.()); };

new MutationObserver(mutations => {
    mutations.forEach(m => m.addedNodes.forEach(node => {
        if (node.nodeType !== 1) return;
        node.querySelectorAll?.('.vynix-player').forEach(p => requestAnimationFrame(() => initVynixPlayer(p.id)));
        if (node.classList?.contains('vynix-player')) requestAnimationFrame(() => initVynixPlayer(node.id));
    }));
}).observe(document.body, { childList: true, subtree: true });

function getVideoPosts() {
    return allPostsCache.filter(p =>
        p.mediaType === 'video' ||
        (p.mediaUrls && p.mediaUrls.some(m => m.type === 'video'))
    );
}

window.openVideoFeed = (postId) => {
    document.querySelectorAll('.vynix-player video').forEach(v => {
        if (!v.paused) v.pause();
    });

    vfVideoPosts = getVideoPosts();
    if (!vfVideoPosts.length) { showToast('No videos to show'); return; }
    const startIdx = Math.max(0, vfVideoPosts.findIndex(p => p.id === postId));
    vfCurrentIdx = startIdx;
    buildVideoSlides(startIdx);
    document.getElementById('vf-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    if (!vfScrollSetup) { vfScrollSetup = true; setupVfScroll(); }
};

window.closeVideoFeed = () => {
    document.getElementById('vf-overlay').classList.remove('active');
    document.body.style.overflow = '';
    document.querySelectorAll('#vf-scroller video').forEach(v => { v.pause(); v.src = ''; });
    if (vfProgTimer) { clearInterval(vfProgTimer); vfProgTimer = null; }
    
    document.querySelectorAll('.vynix-player video').forEach(vid => {
        const rect = vid.getBoundingClientRect();
        const inView = rect.top < window.innerHeight && rect.bottom > 0;
        if (inView) { 
            const p = vid.play();
            if(p !== undefined) p.catch(()=>{}); 
        }
    });
};

            const icon = document.getElementById(`vfti-${i}`);
            const ring = document.getElementById(`vftr-${i}`);
            if (!vid) return;
            if (vid.paused) {
                vid.play().catch(()=>{});
                icon.setAttribute('points','6 4 6 20 M14 4');
                icon.innerHTML = '';
                icon.outerHTML = `<polygon id="vfti-${i}" points="6 4 6 20"/>`;
                const parent = document.getElementById(`vftr-${i}`)?.querySelector('svg');
                if (parent) parent.innerHTML = `<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`;
            } else {
                vid.pause();
                const parent = document.getElementById(`vftr-${i}`)?.querySelector('svg');
                if (parent) parent.innerHTML = `<polygon points="5 3 19 12 5 21 5 3"/>`;
            }
            ring.classList.add('show');
            clearTimeout(ring._t);
            ring._t = setTimeout(() => ring.classList.remove('show'), 500);
        });

        const vid = slide.querySelector('video');
        vid.addEventListener('waiting', () => { document.getElementById(`vfl-${i}`).style.display = 'flex'; });
        vid.addEventListener('canplay', () => { document.getElementById(`vfl-${i}`).style.display = 'none'; });
        vid.addEventListener('playing', () => { document.getElementById(`vfl-${i}`).style.display = 'none'; });

        scroller.appendChild(slide);
    });

    requestAnimationFrame(() => {
        const target = document.getElementById(`vfs-${startIdx}`);
        if (target) target.scrollIntoView({ behavior: 'instant' });
        vfPlaySlide(startIdx);
    });
}

function vfPlaySlide(idx) {
    if (vfProgTimer) { clearInterval(vfProgTimer); vfProgTimer = null; }
    document.querySelectorAll('#vf-scroller video').forEach((v, i) => {
        if (i !== idx) {
            v.pause();
            if (Math.abs(i - idx) > 2) v.src = '';
        }
    });
    const vid = document.getElementById(`vfv-${idx}`);
    if (!vid) return;
    
    if (!vid.src || vid.src === window.location.href) {
        vid.src = vid.dataset.src || '';
        vid.load();
    } else if (vid.currentTime > 0 && vid.paused) {
        vid.currentTime = 0; 
    }
    
    if (vid.paused) {
        const p = vid.play();
        if(p !== undefined) p.catch(()=>{});
    }

    [-1, 1].forEach(d => {
        const nv = document.getElementById(`vfv-${idx + d}`);
        if (nv && (!nv.src || nv.src === window.location.href)) {
            nv.src = nv.dataset.src || '';
            nv.preload = 'auto';
        }
    });

    const fill = document.getElementById(`vfprog-${idx}`);
    if (fill) {
        fill.style.transition = 'none';
        fill.style.width = '0%';
        vfProgTimer = setInterval(() => {
            if (!vid.duration || vid.paused) return;
            const pct = (vid.currentTime / vid.duration) * 100;
            fill.style.transition = 'width 0.1s linear';
            fill.style.width = pct + '%';
        }, 80);
    }
}

function setupVfScroll() {
    const scroller = document.getElementById('vf-scroller');
    let ticking = false;
    scroller.addEventListener('scroll', () => {
        if (!ticking) {
            requestAnimationFrame(() => {
                const idx = Math.round(scroller.scrollTop / scroller.clientHeight);
                if (idx !== vfCurrentIdx && idx >= 0 && idx < vfVideoPosts.length) {
                    vfCurrentIdx = idx;
                    vfPlaySlide(idx);
                }
                ticking = false;
            });
            ticking = true;
        }
    }, { passive: true });

    document.addEventListener('keydown', e => {
        if (!document.getElementById('vf-overlay').classList.contains('active')) return;
        if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
            const next = Math.min(vfCurrentIdx + 1, vfVideoPosts.length - 1);
            document.getElementById(`vfs-${next}`)?.scrollIntoView({ behavior: 'smooth' });
        }
        if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
            const prev = Math.max(vfCurrentIdx - 1, 0);
            document.getElementById(`vfs-${prev}`)?.scrollIntoView({ behavior: 'smooth' });
        }
        if (e.key === 'Escape') closeVideoFeed();
        if (e.key === ' ') {
            e.preventDefault();
            const vid = document.getElementById(`vfv-${vfCurrentIdx}`);
            if (vid) vid.paused ? vid.play().catch(()=>{}) : vid.pause();
        }
    });
}

window.carouselGoTo = (id, idx) => {

    for (let i=0;i<dots.length;i++) dots[i].classList.toggle('active', i===idx);

// ── LONG PRESS ──
let lpTimer = null, lpStartX = 0, lpStartY = 0, lpProgressEl = null, lpFillEl = null, currentAIPost = null;
const LP_DURATION = 600;

function attachLongPress(el, post) {
    const start = (x, y) => {
        lpStartX = x; lpStartY = y;
        lpProgressEl = document.getElementById('lp-progress'); lpFillEl = document.getElementById('lp-fill');
        lpFillEl.style.transition = 'none'; lpFillEl.style.strokeDashoffset = '157';
        lpProgressEl.style.left = (x-28)+'px'; lpProgressEl.style.top = (y-28)+'px'; lpProgressEl.style.display = 'block';
        requestAnimationFrame(() => { lpFillEl.style.transition = `stroke-dashoffset ${LP_DURATION}ms linear`; lpFillEl.style.strokeDashoffset = '0'; });
        el.classList.add('press-active');
        lpTimer = setTimeout(() => {
            lpProgressEl.style.display = 'none'; el.classList.remove('press-active');
            const ripple = document.createElement('div'); ripple.className = 'long-press-ripple';
            ripple.style.left = x+'px'; ripple.style.top = y+'px';
            document.body.appendChild(ripple); setTimeout(() => ripple.remove(), 700);
            openAIModal(post);
        }, LP_DURATION);
    };
    const cancel = (x, y) => {
        if (!lpTimer) return;
        if (x===undefined || Math.abs(x-lpStartX)>8 || Math.abs(y-lpStartY)>8) {
            clearTimeout(lpTimer); lpTimer = null;
            if (lpProgressEl) lpProgressEl.style.display = 'none';
            el.classList.remove('press-active');
        }
    };
    const clear = () => { clearTimeout(lpTimer); lpTimer = null; if (lpProgressEl) lpProgressEl.style.display = 'none'; el.classList.remove('press-active'); };
    el.addEventListener('touchstart',   e => { const t = e.touches[0]; start(t.clientX, t.clientY); }, {passive:true});
    el.addEventListener('touchmove',    e => { const t = e.touches[0]; cancel(t.clientX, t.clientY); }, {passive:true});
    el.addEventListener('touchend',     clear);
    el.addEventListener('contextmenu',  e => { e.preventDefault(); });
    el.addEventListener('mousedown',    e => { if (e.button!==0) return; start(e.clientX, e.clientY); });
    el.addEventListener('mousemove',    e => cancel(e.clientX, e.clientY));
    el.addEventListener('mouseup',      clear);
    el.addEventListener('mouseleave',   clear);
}

function openAIModal(post) {
    currentAIPost = post;
    const ctxDiv = document.getElementById('ai-modal-context');
    if (post) {
        const du = post.isRepost && post.originalUser ? post.originalUser : (post.user || {});
        const imgSrc = post.mediaUrl && post.mediaType!=='video' ? post.mediaUrl : (du.photoURL || DEFAULT_AVATAR);
        document.getElementById('ai-ctx-img').src = imgSrc;
        document.getElementById('ai-ctx-text').textContent = post.text ? (post.text.length>60 ? post.text.slice(0,60)+'…' : post.text) : `@${du.username||'user'}'s post`;

/* ══ STORIES ══ */
const STORY_IMAGE_DURATION = 5000;
const STORY_MAX_VIDEO_DURATION = 30000;

function setupStoriesListeners() {
    onChildAdded  (ref(db,'stories'), snap => { const s={id:snap.key,...snap.val()}; if(Date.now()-s.timestamp<86400000) addStoryToGroup(s); });
    onChildChanged(ref(db,'stories'), snap => updateStoryInGroup({id:snap.key,...snap.val()}));
    onChildRemoved(ref(db,'stories'), snap => removeStoryFromGroup(snap.key));
}
function addStoryToGroup(story) {
    const uid = story.uid;
    if (!storyGroups.has(uid)) storyGroups.set(uid,{user:{uid,username:story.username,photoURL:story.userPhoto,verified:story.verified||false},stories:[]});
    const group = storyGroups.get(uid);
    if (!group.stories.find(s=>s.id===story.id)) { group.stories.push(story); group.stories.sort((a,b)=>a.timestamp-b.timestamp); renderStoryGroups(); }
}
function updateStoryInGroup(story) { const g=storyGroups.get(story.uid); if(g){const i=g.stories.findIndex(s=>s.id===story.id); if(i!==-1){g.stories[i]=story;renderStoryGroups();}}}
function removeStoryFromGroup(storyId) {
    for (const [uid,group] of storyGroups) {
        const i=group.stories.findIndex(s=>s.id===storyId);
        if(i!==-1){group.stories.splice(i,1); if(!group.stories.length)storyGroups.delete(uid); renderStoryGroups(); break;}
    }
}
function renderStoryGroups() {
    const container=document.getElementById('stories-container'); const addBtn=container.firstElementChild;
    container.innerHTML=''; container.appendChild(addBtn);
    const sortedEntries = Array.from(storyGroups.entries()).sort(([uidA,groupA],[uidB,groupB]) => {
        if (uidA===currentUser?.uid) return -1; if (uidB===currentUser?.uid) return 1;
        const hasUnseenA = groupA.stories.some(s=>!s.viewed?.[currentUser?.uid]);
        const hasUnseenB = groupB.stories.some(s=>!s.viewed?.[currentUser?.uid]);
        if (hasUnseenA&&!hasUnseenB) return -1; if (!hasUnseenA&&hasUnseenB) return 1;
        const latestA = Math.max(...groupA.stories.map(s=>s.timestamp||0));
        const latestB = Math.max(...groupB.stories.map(s=>s.timestamp||0));
        return latestB-latestA;
    });
    for (const [uid,group] of sortedEntries) {
        const hasUnseen = group.stories.some(s=>!s.viewed?.[currentUser?.uid]);
        const isOwn     = uid===currentUser?.uid;
        const el = document.createElement('div'); el.className='story-group'; el.onclick=()=>openStoryViewer(uid);
        el.innerHTML=`<div class="story-ring-group ${hasUnseen?'':'all-seen'}"><img src="${group.user.photoURL||DEFAULT_AVATAR}" onerror="this.src='${DEFAULT_AVATAR}'" class="story-img-group">${group.stories.length>1?`<div class="story-count">${group.stories.length}</div>`:''}</div><span class="story-label">${isOwn?'Your Story':group.user.username}</span>`;
        container.appendChild(el);
    }
}

window.validateAndUploadStory = async e => {
    const file = e.target.files[0]; if (!file) return;

        const v = document.createElement('video'); v.preload='metadata';
        v.onloadedmetadata = async () => {
            window.URL.revokeObjectURL(v.src);
            if (v.duration > MAX_STORY_VIDEO_DURATION) {
                showToast(`Story videos max 30 seconds.`);
                return;
            }
            await uploadStory(file);
        };
        v.src = URL.createObjectURL(file);
    } else await uploadStory(file);
    e.target.value = '';
};
async function uploadStory(file) {
    showToast('Uploading…');
    try {
        const r = await uploadToCloudinary(file,'stories');
        await push(ref(db,'stories'),{uid:currentUser.uid,username:currentUserData.username,userPhoto:currentUserData.photoURL,verified:currentUserData.verified||false,mediaUrl:r.secure_url,mediaType:r.resource_type,timestamp:serverTimestamp(),viewed:{[currentUser.uid]:true}});

window.openStoryViewer = uid => {
    const group = storyGroups.get(uid); if (!group||!group.stories.length) return;
    const ids = Array.from(storyGroups.keys()).sort((a,b)=>{if(a===currentUser?.uid)return -1;if(b===currentUser?.uid)return 1;return 0;});
    currentStoryGroupIndex = ids.indexOf(uid); currentStoryIndex=0;
    const first = group.stories.findIndex(s=>!s.viewed?.[currentUser?.uid]); if(first!==-1) currentStoryIndex=first;
    displayCurrentStory();
};

function getStoryDuration(story, videoEl) {
    if (story.mediaType === 'video' && videoEl && videoEl.duration && !isNaN(videoEl.duration)) {
        return Math.min(videoEl.duration * 1000, STORY_MAX_VIDEO_DURATION);
    }
    return STORY_IMAGE_DURATION;
}

function displayCurrentStory() {
    const ids = Array.from(storyGroups.keys()).sort((a,b)=>{if(a===currentUser?.uid)return -1;if(b===currentUser?.uid)return 1;return 0;});
    const group = storyGroups.get(ids[currentStoryGroupIndex]);
    const story = group?.stories[currentStoryIndex]; if (!story) { closeStoryViewer(); return; }
    document.getElementById('story-viewer-avatar').src      = group.user.photoURL||DEFAULT_AVATAR;
    document.getElementById('story-viewer-name').textContent = group.user.username;
    document.getElementById('story-viewer-verified').innerHTML = group.user.verified ? VERIFIED_BADGE_SVG : '';
    document.getElementById('story-viewer-time').textContent = formatTime(story.timestamp);
    document.getElementById('delete-story-btn').style.display = story.uid===currentUser?.uid?'block':'none';
    if (story.uid!==currentUser?.uid) update(ref(db,`stories/${story.id}/viewed`),{[currentUser.uid]:true});
    updateStoryLikeUI(story);

    const pc = document.getElementById('story-progress-container'); pc.innerHTML='';
    group.stories.forEach((_,idx)=>{
        const bar  = document.createElement('div'); bar.className='story-progress-bar';
        const fill = document.createElement('div'); fill.className='story-progress-fill';
        if (idx < currentStoryIndex) fill.style.width = '100%';
        if (idx === currentStoryIndex) fill.id = 'current-progress';
        bar.appendChild(fill); pc.appendChild(bar);
    });

    const mc = document.getElementById('story-media-container'); mc.innerHTML='';
    if (currentVideoElement){currentVideoElement.pause();currentVideoElement=null;}
    if (storyTimeout) clearTimeout(storyTimeout);

    if (story.mediaType==='video') {
        const v = document.createElement('video');
        v.className = 'story-video';
        v.src = story.mediaUrl;
        v.autoplay = true;
        v.playsInline = true;
        v.ontimeupdate = () => {
            if (v.currentTime >= 30) {
                v.pause();
                navigateStory(1);
            }
        };
        v.onloadedmetadata = () => {
            const dur = Math.min(v.duration * 1000, STORY_MAX_VIDEO_DURATION);
            startStoryProgress(dur, v);
            if (storyTimeout) clearTimeout(storyTimeout);
            storyTimeout = setTimeout(() => navigateStory(1), dur);
        };
        v.onended = () => navigateStory(1);
        mc.appendChild(v);
        currentVideoElement = v;
    } else {
        const img = document.createElement('img');
        img.className='story-media'; img.src=story.mediaUrl;
        mc.appendChild(img);
        startStoryProgress(STORY_IMAGE_DURATION, null);
        storyTimeout = setTimeout(() => navigateStory(1), STORY_IMAGE_DURATION);
    }

    document.getElementById('story-viewer').classList.add('active');
}

function startStoryProgress(durationMs, videoEl) {
    const fill = document.getElementById('current-progress');
    if (!fill) return;
    fill.style.transition = 'none';
    fill.style.width = '0%';
    requestAnimationFrame(() => {
        fill.style.transition = `width ${durationMs}ms linear`;
        fill.style.width = '100%';
    });
}

window.navigateStory = dir => {

    if (!selectedMediaFiles.length) { grid.style.display='none'; return; }
    grid.style.display='grid';
    grid.innerHTML = selectedMediaFiles.map((m,i)=>`<div class="compose-thumb">${m.type==='video'?`<video src="${m.url}" muted playsinline style="pointer-events:none;"></video>`:`<img src="${m.url}" alt="">`}<button class="compose-thumb-remove" onclick="removeComposeMedia(${i})"><i data-feather="x" style="width:12px;height:12px;"></i></button></div>`).join('');
    if (selectedMediaFiles.length<10) { grid.innerHTML+=`<button class="compose-add-more" onclick="document.getElementById('media-input').click()"><i data-feather="plus" style="width:20px;height:20px;"></i></button>`; feather.replace(); }
    feather.replace();
}
window.removeComposeMedia = idx => { URL.revokeObjectURL(selectedMediaFiles[idx].url); selectedMediaFiles.splice(idx,1); renderComposeGrid(); updatePostButton(); };
window.clearMedia = () => { 
    selectedMediaFiles.forEach(m=>URL.revokeObjectURL(m.url)); 
    selectedMediaFiles=[]; selectedMedia=null; 
    document.getElementById('media-input').value=''; 
    document.getElementById('spotify-url-input').value='';
    renderComposeGrid(); updatePostButton(); 
};
window.createPost = async () => {
    const text = document.getElementById('compose-text').value.trim(); 
    const spotifyUrl = document.getElementById('spotify-url-input').value.trim();
    if (!text && !selectedMediaFiles.length && !spotifyUrl) return;
    
    const btn  = document.getElementById('post-btn'); btn.disabled=true; btn.textContent='Posting…';
    try {
        let spotifyTrackId = null;
        if (spotifyUrl) {
            const match = spotifyUrl.match(/track\/([a-zA-Z0-9]+)/);
            if (match && match[1]) {
                spotifyTrackId = match[1];
            } else {
                showToast('Invalid Spotify URL');
                btn.textContent='Post'; btn.disabled=false;
                return;
            }
        }

        let mediaUrls = [];
        if (selectedMediaFiles.length>0) {
            const prog=document.getElementById('upload-progress'); const fill=document.getElementById('progress-fill'); prog.classList.add('active');
            for (let i=0;i<selectedMediaFiles.length;i++) {
                fill.style.width=Math.round(i/selectedMediaFiles.length*100)+'%';
                const r=await uploadToCloudinary(selectedMediaFiles[i].file,'posts'); mediaUrls.push({url:r.secure_url,type:r.resource_type});
                fill.style.width=Math.round((i+1)/selectedMediaFiles.length*100)+'%';
            }
            prog.classList.remove('active'); fill.style.width='0%';
        }
        
        const pd = {uid:currentUser.uid,text,timestamp:serverTimestamp(),likes:{},comments:{}};
        if (spotifyTrackId) pd.spotifyTrackId = spotifyTrackId;

        if (mediaUrls.length===1) { pd.mediaUrl=mediaUrls[0].url; pd.mediaType=mediaUrls[0].type; }
        else if (mediaUrls.length>1) { pd.mediaUrls=mediaUrls; pd.mediaType='gallery'; }
        
        await push(ref(db,'posts'),pd); clearMedia(); closeCompose(); showToast('Posted!');
        window.scrollTo({top:0,behavior:'smooth'});
    } catch(e) { console.error(e); showToast('Upload failed'); }
    finally    { btn.textContent='Post'; btn.disabled=false; }
};

// ── POST TEXT ──
const TRUNCATE = 280;
function renderPostText(rawText, postId) {
    const escaped = escapeHtml(rawText); const rich = enrichText(escaped); const isLong = rawText.length>TRUNCATE;
    if (!isLong) return `<div class="post-text" id="post-text-${postId}">${rich}</div>`;
    return `<div class="post-text collapsed" id="post-text-${postId}">${truncateRich(rich,TRUNCATE)}</div><button class="see-more-btn" id="see-more-${postId}" onclick="toggleSeeMore('${postId}',${JSON.stringify(rich).replace(/'/g,"\\'")})">more</button>`;
}
window.toggleSeeMore = (postId, fullRich) => {
    const el=document.getElementById(`post-text-${postId}`); const btn=document.getElementById(`see-more-${postId}`);
    if (!el||!btn) return;
    if (el.classList.contains('collapsed')) { el.innerHTML=fullRich; el.classList.remove('collapsed'); btn.textContent='less'; }
    else { el.innerHTML=truncateRich(fullRich,TRUNCATE); el.classList.add('collapsed'); btn.textContent='more'; }
};
function truncateRich(rich, limit) {
    const stripped = rich.replace(/<[^>]+>/g,''); if (stripped.length<=limit) return rich;
    let rc=0, i=0;
    while (i<rich.length&&rc<limit) { if(rich[i]==='<'){while(i<rich.length&&rich[i]!=='>')i++;}else rc++; i++; }
    let cut=i; while(cut>0&&rich[cut]!==' '&&rich[cut]!=='\n')cut--;
    return rich.slice(0,cut)+'…';
}
function enrichText(esc) {
    return esc
        .replace(/(https?:\/\/[^\s<]+)/g,'<a class="post-link" href="$1" target="_blank" rel="noopener">$1</a>')
        .replace(/@([a-zA-Z0-9_]+)/g,'<span class="mention" onclick="goToProfileByUsername(\'$1\')">@$1</span>')
        .replace(/#([a-zA-Z0-9_]+)/g,'<span class="hashtag" onclick="switchMainTab(\'search\')">#$1</span>');
}
window.goToProfileByUsername = async username => {
    try { const s=await get(ref(db,'users')); if(s.exists()) s.forEach(c=>{if(c.val().username===username)window.goToProfile(c.key);}); }
    catch { showToast('Could not find user'); }
};

// ── MENTION AUTOCOMPLETE ──
let mentionQuery='', mentionStart=-1, mentionResults=[], mentionSelected=0, allUsersCacheMention=null;
async function getAllUsers() {
    if (allUsersCacheMention) return allUsersCacheMention;
    try { const s=await get(ref(db,'users')); allUsersCacheMention=[]; if(s.exists()) s.forEach(c=>{const u=c.val();if(c.key!==currentUser.uid)allUsersCacheMention.push({uid:c.key,...u});}); }
    catch { allUsersCacheMention=[]; }
    return allUsersCacheMention;
}
window.handleMentionInput = async e => {
    const ta=e.target, val=ta.value, pos=ta.selectionStart;
    let start=pos-1;
    while (start>=0&&val[start]!=='@'&&val[start]!==' '&&val[start]!=='\n') start--;
    if (start>=0&&val[start]==='@') {
        mentionStart=start; mentionQuery=val.slice(start+1,pos).toLowerCase();
        const users=await getAllUsers();
        mentionResults=users.filter(u=>u.username?.toLowerCase().includes(mentionQuery)||u.displayName?.toLowerCase().includes(mentionQuery)).slice(0,6);
        mentionSelected=0; renderMentionDropdown();
    } else closeMentionDropdown();
};
window.handleMentionKeydown = e => {
    const dd=document.getElementById('mention-dropdown'); if (!dd.classList.contains('active')) return;
    if (e.key==='ArrowDown') { e.preventDefault(); mentionSelected=Math.min(mentionSelected+1,mentionResults.length-1); renderMentionDropdown(); }
    else if (e.key==='ArrowUp') { e.preventDefault(); mentionSelected=Math.max(mentionSelected-1,0); renderMentionDropdown(); }
    else if (e.key==='Enter'||e.key==='Tab') { if(mentionResults.length>0){e.preventDefault();insertMention(mentionResults[mentionSelected]);} }
    else if (e.key==='Escape') closeMentionDropdown();
};
function renderMentionDropdown() {
    const dd=document.getElementById('mention-dropdown'); if (!mentionResults.length){closeMentionDropdown();return;}
    dd.innerHTML=mentionResults.map((u,i)=>`<div class="mention-item ${i===mentionSelected?'selected':''}" onclick="insertMentionByIndex(${i})"><img src="${u.photoURL||DEFAULT_AVATAR}" onerror="this.src='${DEFAULT_AVATAR}'" alt=""><div class="mention-item-info"><span class="mention-item-name">${escapeHtml(u.displayName||u.username)}</span><span class="mention-item-handle">@${escapeHtml(u.username||'')}</span></div></div>`).join('');
    dd.classList.add('active');
}
window.insertMentionByIndex = i => insertMention(mentionResults[i]);
function insertMention(user) {
    const ta=document.getElementById('compose-text'), val=ta.value, pos=ta.selectionStart;
    const before=val.slice(0,mentionStart), after=val.slice(pos), insert=`@${user.username} `;
    ta.value=before+insert+after; const np=mentionStart+insert.length; ta.setSelectionRange(np,np); ta.focus();
    closeMentionDropdown(); updatePostButton();
}
function closeMentionDropdown() { const dd=document.getElementById('mention-dropdown'); if(dd)dd.classList.remove('active'); mentionResults=[]; mentionStart=-1; }

// ── GLOBAL CLICK HANDLERS ──
document.addEventListener('click', e => {
    if (!e.target.closest('.compose-input-wrapper')) closeMentionDropdown();
    if (!e.target.closest('.post-menu')) document.querySelectorAll('.post-dropdown').forEach(d=>d.classList.remove('active'));
});

document.addEventListener('click', e => {
    const avatar = e.target.closest('.post-avatar'); if (!avatar) return;
    e.stopPropagation();
    const uid = avatar.dataset.uid;
    
    if (uid && storyGroups.has(uid)) {
        openStoryViewer(uid);
    } else {
        window.goToProfile(uid || currentUser?.uid);
    }
}, true);

// ── CAROUSEL SWIPE ──
(()=>{
    let tX=0, tEl=null;
    document.addEventListener('touchstart', e=>{const c=e.target.closest('.carousel');if(!c)return;tX=e.touches[0].clientX;tEl=c;},{passive:true});
    document.addEventListener('touchend',   e=>{if(!tEl)return;const dx=e.changedTouches[0].clientX-tX;if(Math.abs(dx)>40)carouselMove(tEl.id,dx<0?1:-1);tEl=null;},{passive:true});
})();

// ── HELPERS ──
function formatTime(ts) {
    if (!ts) return 'now'; const secs=Math.floor((Date.now()-ts)/1000);
    if (secs<60) return 'now'; if (secs<3600) return Math.floor(secs/60)+'m';
    if (secs<86400) return Math.floor(secs/3600)+'h'; return Math.floor(secs/86400)+'d';
}
function escapeHtml(text) { const d=document.createElement('div'); d.textContent=text; return d.innerHTML; }
window.showToast        = msg => { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); };

window.goToMessages     = ()  => window.location.href='messages.html';
window.goToReels        = ()  => window.location.href='reels.html';
window.goToSettings     = ()  => window.location.href='settings.html';
window.togglePostMenu   = (postId,e) => { e.stopPropagation(); document.getElementById(`dropdown-${postId}`).classList.toggle('active'); };

const hash = window.location.hash;
if (hash.startsWith('#post-')) {
    setTimeout(()=>{
        const el=document.getElementById(`post-${hash.slice(6)}`);
        if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='rgba(var(--primary-rgb),0.06)';setTimeout(()=>el.style.background='',2000);}
    },1500);
}

const params = new URLSearchParams(window.location.search);
if (params.get('compose') === 'true') {
    setTimeout(openCompose, 500);
}

feather.replace();
</script>

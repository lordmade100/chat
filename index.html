<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vynix</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script defer src="https://unpkg.com/feather-icons"></script>

<style>

:root{
  --bg:#0b1120;
  --surface:#111827;
  --surface-light:#1f2937;
  --hover:#2b3648;
  --primary:#6366f1;
  --text:#f8fafc;
  --muted:#94a3b8;
  --border:rgba(255,255,255,.06);
  --shadow:0 10px 30px rgba(0,0,0,.18);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

img{
  display:block;
  max-width:100%;
}

button{
  font-family:inherit;
}

.app{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */

.sidebar{
  width:90px;
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  background:rgba(17,24,39,.92);
  backdrop-filter:blur(12px);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 0;
  z-index:999;
}

.logo{
  width:58px;
  height:58px;
  border-radius:20px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:30px;
  box-shadow:var(--shadow);
}

.logo img{
  width:40px;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.nav-btn{
  width:56px;
  height:56px;
  border:none;
  border-radius:18px;
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  transition:.2s;
  display:flex;
  align-items:center;
  justify-content:center;
}

.nav-btn:hover{
  background:var(--surface-light);
  color:white;
}

.nav-btn.active{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
}

/* MAIN */

.main{
  flex:1;
  margin-left:90px;
  display:flex;
  justify-content:center;
  padding:24px;
}

.feed-wrap{
  width:100%;
  max-width:650px;
}

/* HEADER */

.topbar{
  position:sticky;
  top:18px;
  z-index:100;
  height:72px;
  border-radius:24px;
  background:rgba(17,24,39,.85);
  border:1px solid var(--border);
  backdrop-filter:blur(14px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  margin-bottom:22px;
  box-shadow:var(--shadow);
}

.topbar h1{
  font-size:24px;
  font-weight:800;
}

.top-actions{
  display:flex;
  gap:10px;
}

.icon-btn{
  width:46px;
  height:46px;
  border-radius:16px;
  border:none;
  background:var(--surface-light);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* TABS */

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:22px;
}

.tab{
  flex:1;
  height:48px;
  border:none;
  border-radius:999px;
  background:var(--surface);
  color:var(--muted);
  cursor:pointer;
  font-weight:700;
  transition:.2s;
}

.tab.active{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
}

/* COMPOSER */

.composer{
  background:rgba(17,24,39,.92);
  border:1px solid var(--border);
  border-radius:28px;
  padding:18px;
  margin-bottom:22px;
  box-shadow:var(--shadow);
}

.composer-top{
  display:flex;
  gap:14px;
}

.avatar{
  width:52px;
  height:52px;
  border-radius:50%;
  object-fit:cover;
}

textarea{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  resize:none;
  min-height:70px;
  color:white;
  font-size:15px;
}

textarea::placeholder{
  color:var(--muted);
}

.composer-bottom{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:16px;
  padding-top:16px;
  border-top:1px solid var(--border);
}

.composer-tools{
  display:flex;
  gap:10px;
}

.tool-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  background:var(--surface-light);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.post-btn{
  border:none;
  height:46px;
  padding:0 24px;
  border-radius:999px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  font-weight:700;
  cursor:pointer;
}

/* FEED */

.feed{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.post{
  background:rgba(17,24,39,.92);
  border:1px solid var(--border);
  border-radius:28px;
  overflow:hidden;
  box-shadow:var(--shadow);
}

.post-header{
  display:flex;
  align-items:center;
  gap:14px;
  padding:18px;
}

.post-meta{
  flex:1;
}

.name{
  font-size:15px;
  font-weight:700;
}

.handle{
  color:var(--muted);
  font-size:13px;
}

.follow-btn{
  height:38px;
  padding:0 18px;
  border:none;
  border-radius:999px;
  background:var(--surface-light);
  color:white;
  cursor:pointer;
  font-weight:700;
}

.post-content{
  padding:0 18px 18px;
}

.post-text{
  line-height:1.7;
  margin-bottom:16px;
}

.post-image{
  width:100%;
  border-radius:22px;
  aspect-ratio:4/5;
  object-fit:cover;
}

.post-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 18px;
  border-top:1px solid var(--border);
}

.left-actions{
  display:flex;
  gap:10px;
}

.action-btn{
  height:42px;
  padding:0 14px;
  border:none;
  border-radius:14px;
  background:var(--surface-light);
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
}

.action-btn.active{
  color:#ff4d6d;
}

/* RIGHT */

.right-panel{
  width:340px;
  padding:24px 24px 24px 0;
}

.search-box{
  height:60px;
  border-radius:20px;
  background:rgba(17,24,39,.92);
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:12px;
  padding:0 18px;
  margin-bottom:22px;
}

.search-box input{
  flex:1;
  border:none;
  background:transparent;
  color:white;
  outline:none;
}

.card{
  background:rgba(17,24,39,.92);
  border:1px solid var(--border);
  border-radius:28px;
  padding:20px;
  margin-bottom:22px;
}

.card h3{
  margin-bottom:18px;
}

.trend{
  padding:14px 0;
  border-bottom:1px solid var(--border);
}

.trend:last-child{
  border-bottom:none;
}

.trend small{
  color:var(--muted);
  display:block;
  margin-bottom:4px;
}

@media(max-width:1200px){
  .right-panel{
    display:none;
  }
}

@media(max-width:768px){

  .sidebar{
    width:100%;
    height:84px;
    bottom:0;
    top:auto;
    flex-direction:row;
    justify-content:center;
    border-right:none;
    border-top:1px solid var(--border);
  }

  .logo{
    display:none;
  }

  .nav{
    flex-direction:row;
  }

  .main{
    margin-left:0;
    padding-bottom:110px;
  }

}

</style>
</head>
<body>

<div class="app">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">
<img src="https://i.postimg.cc/T3Nv0Szn/Gemini-Generated-Image-g7omg8g7omg8g7om-removebg-preview.png">
</div>

<div class="nav">

<button class="nav-btn active">
<i data-feather="home"></i>
</button>

<button class="nav-btn">
<i data-feather="search"></i>
</button>

<button class="nav-btn">
<i data-feather="video"></i>
</button>

<button class="nav-btn">
<i data-feather="bell"></i>
</button>

<button class="nav-btn">
<i data-feather="message-circle"></i>
</button>

<button class="nav-btn">
<i data-feather="user"></i>
</button>

</div>

</aside>

<!-- MAIN -->

<main class="main">

<div class="feed-wrap">

<header class="topbar">

<h1>Vynix</h1>

<div class="top-actions">

<button class="icon-btn">
<i data-feather="settings"></i>
</button>

</div>

</header>

<div class="tabs">

<button class="tab active">For You</button>
<button class="tab">Following</button>
<button class="tab">Trending</button>

</div>

<!-- COMPOSER -->

<div class="composer">

<div class="composer-top">

<img
class="avatar"
src="https://i.pravatar.cc/300"
>

<textarea placeholder="What's happening on Vynix?"></textarea>

</div>

<div class="composer-bottom">

<input type="file" id="imageUpload" accept="image/*" hidden>

<div class="composer-tools">

<button class="tool-btn" id="uploadImageBtn">
<i data-feather="image"></i>
</button>

<button class="tool-btn">
<i data-feather="video"></i>
</button>

<button class="tool-btn">
<i data-feather="smile"></i>
</button>

</div>

<button class="post-btn">Post</button>

</div>

</div>

<!-- FEED -->

<div class="feed"></div>

</div>

</main>

<!-- RIGHT -->

<aside class="right-panel">

<div class="search-box">

<i data-feather="search"></i>

<input placeholder="Search Vynix">

</div>

<div class="card">

<h3>Trending</h3>

<div class="trend">
<small>Technology · Trending</small>
<strong>#Vynix</strong>
</div>

<div class="trend">
<small>Frontend · Trending</small>
<strong>#Firebase</strong>
</div>

<div class="trend">
<small>Design · Trending</small>
<strong>#Glassmorphism</strong>
</div>

</div>

</aside>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
  authDomain: "fire-b-a8878.firebaseapp.com",
  databaseURL: "https://fire-b-a8878.firebaseio.com",
  projectId: "fire-b-a8878",
  storageBucket: "fire-b-a8878.appspot.com",
  messagingSenderId: "658673187627",
  appId: "1:658673187627:web:6e4c29af661785f0afa36e"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

/* CLOUDINARY */

const CLOUDINARY_CLOUD_NAME = "YOUR_CLOUDINARY_NAME";
const CLOUDINARY_UPLOAD_PRESET = "YOUR_UPLOAD_PRESET";

/* INIT */

feather.replace();

/* DOM */

const textarea = document.querySelector("textarea");
const postBtn = document.querySelector(".post-btn");
const feed = document.querySelector(".feed");

const imageUpload = document.getElementById("imageUpload");
const uploadImageBtn = document.getElementById("uploadImageBtn");

let uploadedImage = "";

/* AUTH */

auth.signInAnonymously()
.then(async(res)=>{

  const uid = res.user.uid;

  await db.ref("users/" + uid).update({
    username:"Vynix User",
    handle:"@vynixuser",
    avatar:"https://i.pravatar.cc/300",
    online:true,
    createdAt:Date.now()
  });

})
.catch(console.error);

/* IMAGE UPLOAD */

uploadImageBtn.onclick = ()=>{
  imageUpload.click();
};

imageUpload.addEventListener("change", async(e)=>{

  const file = e.target.files[0];

  if(!file) return;

  const fd = new FormData();

  fd.append("file", file);
  fd.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

  uploadImageBtn.innerHTML = "...";

  try{

    const res = await fetch(
      `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
      {
        method:"POST",
        body:fd
      }
    );

    const data = await res.json();

    uploadedImage = data.secure_url;

    uploadImageBtn.innerHTML =
    `<i data-feather="check"></i>`;

    feather.replace();

  }catch(err){

    console.error(err);

    alert("Upload failed");

  }

});

/* CREATE POST */

postBtn.addEventListener("click", async()=>{

  const text = textarea.value.trim();

  if(!text && !uploadedImage) return;

  const user = auth.currentUser;

  if(!user) return;

  const postData = {
    uid:user.uid,
    username:"Vynix User",
    handle:"@vynixuser",
    avatar:"https://i.pravatar.cc/300",
    text,
    image:uploadedImage,
    likes:0,
    comments:0,
    reposts:0,
    createdAt:Date.now()
  };

  await db.ref("posts").push(postData);

  textarea.value = "";
  uploadedImage = "";

  uploadImageBtn.innerHTML =
  `<i data-feather="image"></i>`;

  feather.replace();

});

/* REALTIME POSTS */

db.ref("posts").on("value", snapshot=>{

  const posts = [];

  snapshot.forEach(child=>{

    posts.push({
      id:child.key,
      ...child.val()
    });

  });

  posts.reverse();

  renderPosts(posts);

});

/* RENDER POSTS */

function renderPosts(posts){

  feed.innerHTML = "";

  posts.forEach(post=>{

    const div = document.createElement("article");

    div.className = "post";

    div.innerHTML = `

      <div class="post-header">

        <img
        class="avatar"
        src="${post.avatar}">

        <div class="post-meta">

          <div class="name">
            ${post.username}
          </div>

          <div class="handle">
            ${post.handle}
          </div>

        </div>

        <button class="follow-btn">
          Follow
        </button>

      </div>

      <div class="post-content">

        <div class="post-text">
          ${post.text || ""}
        </div>

        ${
          post.image
          ?
          `
          <img
          loading="lazy"
          decoding="async"
          class="post-image"
          src="${post.image}">
          `
          :
          ""
        }

      </div>

      <div class="post-actions">

        <div class="left-actions">

          <button
          class="action-btn like-btn"
          data-id="${post.id}">

            <i data-feather="heart"></i>

            ${post.likes || 0}

          </button>

          <button class="action-btn">

            <i data-feather="message-circle"></i>

            ${post.comments || 0}

          </button>

          <button class="action-btn">

            <i data-feather="repeat"></i>

            ${post.reposts || 0}

          </button>

        </div>

        <button class="action-btn share-btn">

          <i data-feather="share"></i>

        </button>

      </div>

    `;

    feed.appendChild(div);

  });

  feather.replace();

  attachLikeEvents();

}

/* LIKE SYSTEM */

function attachLikeEvents(){

  document.querySelectorAll(".like-btn")
  .forEach(btn=>{

    btn.onclick = async()=>{

      const id = btn.dataset.id;

      const ref = db.ref("posts/" + id + "/likes");

      const snap = await ref.get();

      const current = snap.val() || 0;

      await ref.set(current + 1);

    };

  });

}

/* ONLINE STATUS */

auth.onAuthStateChanged(user=>{

  if(!user) return;

  const ref = db.ref("status/" + user.uid);

  ref.set({
    online:true,
    lastSeen:Date.now()
  });

  window.addEventListener("beforeunload", ()=>{

    ref.set({
      online:false,
      lastSeen:Date.now()
    });

  });

});

/* NAV ACTIVE */

document.querySelectorAll(".nav-btn")
.forEach(btn=>{

  btn.onclick = ()=>{

    document.querySelectorAll(".nav-btn")
    .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

  };

});

/* TAB ACTIVE */

document.querySelectorAll(".tab")
.forEach(tab=>{

  tab.onclick = ()=>{

    document.querySelectorAll(".tab")
    .forEach(t=>t.classList.remove("active"));

    tab.classList.add("active");

  };

});

</script>

</body>
</html>

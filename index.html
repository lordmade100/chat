<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix Chat</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0095F6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root,[data-theme="light"]{--primary:#0095F6;--primary-rgb:0,149,246;--background:#FFFFFF;--surface:#FFFFFF;--surface2:#EFEFEF;--border:#DBDBDB;--text-primary:#000000;--text-secondary:#737373;--text-muted:#A8A8A8;}
        [data-theme="dark"]{--primary:#0095F6;--primary-rgb:0,149,246;--background:#000000;--surface:#000000;--surface2:#262626;--border:#363636;--text-primary:#F5F5F5;--text-secondary:#A8A8A8;--text-muted:#737373;}
        [data-theme="midnight"]{--primary:#C084FC;--background:#09090B;--surface:#09090B;--surface2:#27272A;--border:#3F3F46;--text-primary:#FAFAFA;--text-secondary:#A1A1AA;--text-muted:#71717A;}
        [data-theme="ocean"]{--primary:#06B6D4;--background:#F0F9FF;--surface:#F0F9FF;--surface2:#E0F2FE;--border:#BAE6FD;--text-primary:#0C4A6E;--text-secondary:#0369A1;--text-muted:#7DD3FC;}
        [data-theme="rose"]{--primary:#E11D48;--background:#FFF1F2;--surface:#FFF1F2;--surface2:#FFE4E6;--border:#FECDD3;--text-primary:#881337;--text-secondary:#9F1239;--text-muted:#FDA4AF;}

        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--background);color:var(--text-primary);-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-bottom:calc(60px + env(safe-area-inset-bottom));transition:background 0.3s,color 0.3s;}

        .app-container{max-width:100%;margin:0 auto;}
        @media(min-width:768px){.app-container{max-width:600px;border-left:1px solid var(--border);border-right:1px solid var(--border);min-height:100vh;}}

        .view-container{display:none;width:100%;animation:fadeIn 0.3s ease;}
        .view-container.active{display:block;}

        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        @keyframes spin{to{transform:rotate(360deg);}}

        .header{position:sticky;top:0;z-index:50;background:var(--background);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
        .header h2{font-size:20px;font-weight:700;}

        /* Bottom Nav */
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;width:100%;background:var(--background);border-top:1px solid var(--border);padding:8px 16px calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:space-around;align-items:center;z-index:100;}
        .nav-item{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;background:none;border:none;cursor:pointer;color:var(--text-secondary);transition:transform 0.15s,color 0.2s;}
        .nav-item.active{color:var(--primary);}
        .nav-item:active{transform:scale(0.85);}
        .nav-badge{position:absolute;top:6px;right:calc(50% - 14px);width:8px;height:8px;border-radius:50%;background:#FF3040;border:2px solid var(--background);display:none;}
        .nav-badge.show{display:block;}

        /* Chat List & Search */
        .chat-list-item{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.2s;}
        .chat-list-item:active{background:var(--surface2);}
        .avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--border);}
        .chat-info{flex:1;min-width:0;}
        .chat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
        .chat-name{font-weight:700;font-size:16px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .chat-time{font-size:12px;color:var(--text-muted);}
        .chat-preview{font-size:14px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .chat-preview.unread{font-weight:600;color:var(--text-primary);}
        .unread-badge{background:var(--primary);color:white;border-radius:50%;min-width:20px;height:20px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 6px;}

        .search-bar{display:flex;align-items:center;background:var(--surface2);border-radius:9999px;padding:10px 16px;gap:10px;margin:12px 16px;}
        .search-bar input{flex:1;border:none;background:transparent;outline:none;font-size:15px;color:var(--text-primary);font-family:inherit;}

        /* Chat Window Overlay */
        .chat-window{position:fixed;inset:0;background:var(--background);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.34,1.1,0.64,1);visibility:hidden;}
        .chat-window.active{transform:translateX(0);visibility:visible;}
        @media(min-width:768px){.chat-window{left:calc(50% - 300px);right:calc(50% - 300px);border-left:1px solid var(--border);border-right:1px solid var(--border);}}
        
        .chat-topbar{display:flex;align-items:center;gap:12px;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
        .back-btn{background:none;border:none;color:var(--primary);padding:4px 8px 4px 0;display:flex;align-items:center;cursor:pointer;}
        .messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px;}
        
        .message-wrapper{display:flex;flex-direction:column;margin-bottom:4px;max-width:80%;}
        .message-wrapper.me{align-self:flex-end;align-items:flex-end;}
        .message-wrapper.other{align-self:flex-start;align-items:flex-start;}
        .message-bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.4;word-break:break-word;}
        .message-wrapper.me .message-bubble{background:var(--primary);color:white;border-bottom-right-radius:4px;}
        .message-wrapper.other .message-bubble{background:var(--surface2);color:var(--text-primary);border-bottom-left-radius:4px;}
        .message-time{font-size:10px;color:var(--text-muted);margin-top:2px;padding:0 4px;}

        .input-bar{padding:10px 16px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--surface);display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
        .chat-input-wrapper{flex:1;background:var(--surface2);border-radius:20px;padding:10px 16px;display:flex;align-items:center;min-height:40px;}
        .chat-input-wrapper textarea{flex:1;border:none;background:transparent;outline:none;font-size:15px;color:var(--text-primary);font-family:inherit;resize:none;max-height:100px;line-height:1.4;}
        .send-btn{background:var(--primary);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:white;transition:transform 0.15s;}
        .send-btn:active{transform:scale(0.9);}
        .send-btn:disabled{opacity:0.5;pointer-events:none;}

        /* Profile */
        .profile-header{padding:32px 16px;display:flex;flex-direction:column;align-items:center;text-align:center;}
        .profile-avatar-large{width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid var(--border);margin-bottom:16px;}
        .profile-name{font-size:22px;font-weight:700;margin-bottom:4px;}
        .profile-handle{font-size:14px;color:var(--text-secondary);margin-bottom:24px;}
        .profile-btn{width:100%;max-width:200px;padding:10px;border-radius:9999px;font-weight:600;font-size:15px;cursor:pointer;border:none;background:var(--surface2);color:var(--text-primary);margin-bottom:12px;transition:opacity 0.2s;}
        .profile-btn:active{opacity:0.7;}
        .profile-btn.logout{background:rgba(255,48,64,0.1);color:#FF3040;}

        .empty-state{padding:64px 24px;text-align:center;color:var(--text-secondary);font-size:15px;}
        .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto;}
    </style>
</head>
<body>

<div class="app-container">

    <div id="view-chats" class="view-container active">
        <header class="header">
            <h2>Chats</h2>
        </header>
        <div id="chats-list">
            <div class="spinner"></div>
        </div>
    </div>

    <div id="view-search" class="view-container">
        <header class="header">
            <h2>New Message</h2>
        </header>
        <div class="search-bar">
            <i data-feather="search" style="color:var(--text-secondary);width:18px;height:18px;"></i>
            <input type="text" id="user-search-input" placeholder="Search by username..." oninput="handleSearch(this.value)">
        </div>
        <div id="search-results"></div>
    </div>

    <div id="view-profile" class="view-container">
        <header class="header">
            <h2>Profile</h2>
        </header>
        <div id="profile-content">
            <div class="spinner"></div>
        </div>
    </div>

</div>

<nav class="bottom-nav" id="bottom-nav">
    <button class="nav-item active" data-nav="chats" onclick="switchTab('chats')">
        <i data-feather="message-circle"></i>
        <span class="nav-badge" id="badge-messages"></span>
    </button>
    <button class="nav-item" data-nav="search" onclick="switchTab('search')">
        <i data-feather="search"></i>
    </button>
    <button class="nav-item" data-nav="profile" onclick="switchTab('profile')">
        <i data-feather="user"></i>
    </button>
</nav>

<div class="chat-window" id="chat-window">
    <div class="chat-topbar">
        <button class="back-btn" onclick="closeChat()">
            <i data-feather="chevron-left" style="width:28px;height:28px;"></i>
        </button>
        <img src="" id="chat-header-avatar" class="avatar" style="width:36px;height:36px;">
        <div style="flex:1;">
            <div style="font-weight:700;font-size:16px;" id="chat-header-name">User</div>
            <div style="font-size:12px;color:var(--text-secondary);" id="chat-header-status"></div>
        </div>
    </div>
    
    <div class="messages-area" id="messages-area"></div>
    
    <div class="input-bar">
        <div class="chat-input-wrapper">
            <textarea id="chat-input" placeholder="Message..." rows="1" oninput="resizeTextarea(this)" onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendChatMessage(); }"></textarea>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendChatMessage()" disabled>
            <i data-feather="send" style="width:18px;height:18px;margin-left:-2px;"></i>
        </button>
    </div>
</div>

<script type="module">
import {
    getDatabase, ref, onValue, onChildAdded, push, set, get, update, serverTimestamp, off
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// Uses the existing Firebase configuration from your original file
const firebaseConfig={
    apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
    authDomain:"fire-b-a8878.firebaseapp.com",
    databaseURL:"https://fire-b-a8878.firebaseio.com",
    projectId:"fire-b-a8878",
    storageBucket:"fire-b-a8878.appspot.com",
    messagingSenderId:"658673187627",
    appId:"1:658673187627:web:6e4c29af661785f0afa36e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23A8A8A8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' style='background-color:%23EFEFEF'%3E%3Cpath d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'/%3E%3Ccircle cx='12' cy='7' r='4'/%3E%3C/svg%3E";

let currentUser = null;
let currentUserData = null;
let allUsersCache = {};
let activeChatUid = null;
let activeChatConvId = null;
let activeChatListener = null;

feather.replace();

// --- Initialization & Auth ---
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = 'signup.html'; // Relies on your existing auth flow
        return;
    }
    currentUser = user;
    await loadUserData();
    loadChatsTab();
    setupPresence();
});

async function loadUserData() {
    const snap = await get(ref(db, `users/${currentUser.uid}`));
    if (snap.exists()) {
        currentUserData = snap.val();
    } else {
        currentUserData = { uid: currentUser.uid, email: currentUser.email, username: currentUser.email.split('@')[0], photoURL: DEFAULT_AVATAR };
        await set(ref(db, `users/${currentUser.uid}`), currentUserData);
    }
    renderProfile();
}

// --- Navigation ---
window.switchTab = (tabId) => {
    document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`view-${tabId}`).classList.add('active');
    document.querySelector(`.nav-item[data-nav="${tabId}"]`).classList.add('active');
    
    if (tabId === 'search') document.getElementById('user-search-input').focus();
};

// --- Chats Tab (Home) ---
async function loadChatsTab() {
    const listEl = document.getElementById('chats-list');
    
    // Cache all users quickly for rendering chats
    const usersSnap = await get(ref(db, 'users'));
    if (usersSnap.exists()) {
        usersSnap.forEach(c => { allUsersCache[c.key] = c.val(); });
    }

    // Listen to conversations in real-time
    onValue(ref(db, 'conversations'), (snap) => {
        let convList = [];
        let totalUnread = 0;
        
        if (snap.exists()) {
            snap.forEach(child => {
                const conv = child.val();
                const members = Object.keys(conv.members || {});
                if (!members.includes(currentUser.uid)) return;
                
                const otherId = members.find(m => m !== currentUser.uid);
                if (!otherId) return;
                
                const other = allUsersCache[otherId] || { username: 'Unknown User' };
                const unread = conv.unread?.[currentUser.uid] || 0;
                totalUnread += unread;
                
                convList.push({
                    id: child.key,
                    otherId,
                    other,
                    lastMessage: conv.lastMessage || 'Sent an attachment',
                    lastTimestamp: conv.lastTimestamp || 0,
                    unread
                });
            });
        }
        
        // Update badge
        const badge = document.getElementById('badge-messages');
        if(totalUnread > 0) {
            badge.classList.add('show');
        } else {
            badge.classList.remove('show');
        }

        convList.sort((a, b) => b.lastTimestamp - a.lastTimestamp);
        
        if (!convList.length) {
            listEl.innerHTML = `<div class="empty-state"><i data-feather="message-square" style="width:40px;height:40px;margin-bottom:12px;opacity:0.5;"></i><br>No messages yet.<br>Go to Search to start chatting.</div>`;
            feather.replace();
            return;
        }

        listEl.innerHTML = convList.map(c => `
            <div class="chat-list-item" onclick="openChat('${c.otherId}')">
                <img src="${c.other.photoURL || DEFAULT_AVATAR}" onerror="this.src='${DEFAULT_AVATAR}'" class="avatar">
                <div class="chat-info">
                    <div class="chat-header">
                        <span class="chat-name">${escapeHtml(c.other.username || 'User')}</span>
                        <span class="chat-time">${formatChatTime(c.lastTimestamp)}</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <span class="chat-preview ${c.unread > 0 ? 'unread' : ''}">${escapeHtml(c.lastMessage)}</span>
                        ${c.unread > 0 ? `<span class="unread-badge">${c.unread}</span>` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    });
}

// --- Search / Contacts ---
window.handleSearch = (query) => {
    const q = query.toLowerCase().trim();
    const resultsContainer = document.getElementById('search-results');
    
    if (!q) {
        resultsContainer.innerHTML = '<div class="empty-state">Type a username to find people.</div>';
        return;
    }
    
    const results = Object.keys(allUsersCache)
        .filter(uid => uid !== currentUser.uid && (allUsersCache[uid].username || '').toLowerCase().includes(q))
        .map(uid => ({ uid, ...allUsersCache[uid] }))
        .slice(0, 15);

    if (!results.length) {
        resultsContainer.innerHTML = '<div class="empty-state">No users found.</div>';
        return;
    }

    resultsContainer.innerHTML = results.map(u => `
        <div class="chat-list-item" onclick="openChat('${u.uid}')">
            <img src="${u.photoURL || DEFAULT_AVATAR}" class="avatar">
            <div class="chat-info">
                <div class="chat-name">${escapeHtml(u.username || 'User')}</div>
            </div>
        </div>
    `).join('');
};

// --- Active Chat Window ---
window.openChat = async (targetUid) => {
    const otherUser = allUsersCache[targetUid] || { username: 'User' };
    activeChatUid = targetUid;
    activeChatConvId = [currentUser.uid, targetUid].sort().join('_');
    
    // UI Update
    document.getElementById('chat-header-name').textContent = otherUser.username;
    document.getElementById('chat-header-avatar').src = otherUser.photoURL || DEFAULT_AVATAR;
    document.getElementById('messages-area').innerHTML = '';
    document.getElementById('chat-input').value = '';
    document.getElementById('send-btn').disabled = true;
    
    document.getElementById('chat-window').classList.add('active');
    
    // Listen for new messages
    if (activeChatListener) off(ref(db, `directMessages/${activeChatConvId}/messages`));
    
    const chatRef = ref(db, `directMessages/${activeChatConvId}/messages`);
    const msgsEl = document.getElementById('messages-area');
    
    let lastDateLabel = '';

    activeChatListener = onChildAdded(chatRef, (snap) => {
        const msg = snap.val();
        if(!msg) return;
        
        const isMe = msg.senderId === currentUser.uid;
        const msgTime = msg.timestamp || Date.now();
        const dateLabel = new Date(msgTime).toDateString();

        // Date Separator
        if (dateLabel !== lastDateLabel) {
            lastDateLabel = dateLabel;
            const sep = document.createElement('div');
            sep.style.cssText = 'text-align:center;font-size:11px;color:var(--text-muted);font-weight:600;padding:12px 0 4px;text-transform:uppercase;';
            sep.textContent = getDayLabel(msgTime);
            msgsEl.appendChild(sep);
        }

        const hh = String(new Date(msgTime).getHours()).padStart(2, '0');
        const mm = String(new Date(msgTime).getMinutes()).padStart(2, '0');
        
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${isMe ? 'me' : 'other'}`;
        wrapper.innerHTML = `
            <div class="message-bubble">${escapeHtml(msg.text || '')}</div>
            <div class="message-time">${hh}:${mm}</div>
        `;
        msgsEl.appendChild(wrapper);
        msgsEl.scrollTop = msgsEl.scrollHeight;
    });

    // Mark as read
    update(ref(db, `conversations/${activeChatConvId}/unread`), { [currentUser.uid]: 0 }).catch(()=>{});

    // Listen to their online status
    onValue(ref(db, `users/${targetUid}/online`), s => {
        const statusEl = document.getElementById('chat-header-status');
        statusEl.textContent = s.val() === true ? 'Online' : 'Offline';
    });
};

window.closeChat = () => {
    document.getElementById('chat-window').classList.remove('active');
    if (activeChatListener && activeChatConvId) {
        off(ref(db, `directMessages/${activeChatConvId}/messages`));
        activeChatListener = null;
    }
    activeChatUid = null;
    activeChatConvId = null;
};

window.sendChatMessage = async () => {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !activeChatUid || !activeChatConvId) return;
    
    input.value = '';
    input.style.height = 'auto'; // reset resize
    document.getElementById('send-btn').disabled = true;
    
    try {
        await push(ref(db, `directMessages/${activeChatConvId}/messages`), {
            senderId: currentUser.uid,
            text,
            timestamp: serverTimestamp()
        });
        
        // Fetch current unread count of the OTHER user to increment it
        const convSnap = await get(ref(db, `conversations/${activeChatConvId}/unread/${activeChatUid}`));
        const currentUnread = convSnap.exists() ? convSnap.val() : 0;

        await update(ref(db, `conversations/${activeChatConvId}`), {
            members: { [currentUser.uid]: true, [activeChatUid]: true },
            lastMessage: text,
            lastTimestamp: Date.now(),
            [`unread/${activeChatUid}`]: currentUnread + 1
        });
        
    } catch(e) {
        alert('Failed to send message.');
    }
};

window.resizeTextarea = (el) => {
    el.style.height = 'auto';
    el.style.height = (el.scrollHeight) + 'px';
    document.getElementById('send-btn').disabled = el.value.trim().length === 0;
};

// --- Profile ---
function renderProfile() {
    const container = document.getElementById('profile-content');
    if(!currentUserData) return;
    
    container.innerHTML = `
        <div class="profile-header">
            <img src="${currentUserData.photoURL || DEFAULT_AVATAR}" class="profile-avatar-large">
            <div class="profile-name">${escapeHtml(currentUserData.username)}</div>
            <div class="profile-handle">${escapeHtml(currentUserData.email)}</div>
            
            <button class="profile-btn logout" onclick="handleLogout()">Log Out</button>
        </div>
    `;
}

window.handleLogout = () => {
    update(ref(db, `users/${currentUser.uid}`), { online: false, lastSeen: serverTimestamp() })
    .finally(() => {
        signOut(auth).then(() => { window.location.reload(); });
    });
};

// --- Presence & Utilities ---
function setupPresence(){
    if(!currentUser) return;
    const presRef = ref(db, `users/${currentUser.uid}`);
    update(presRef, { online: true, lastSeen: serverTimestamp() }).catch(()=>{});
    
    window.addEventListener('beforeunload', () => {
        update(presRef, { online: false, lastSeen: Date.now() }).catch(()=>{});
    });
}

function formatChatTime(ts) {
    if(!ts) return '';
    const d = new Date(ts), now = new Date();
    if(d.toDateString() === now.toDateString()) {
        return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
    if(d.toDateString() === yesterday.toDateString()) return 'Yesterday';
    return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
}

function getDayLabel(ts) {
    const d = new Date(ts), now = new Date();
    if(d.toDateString() === now.toDateString()) return 'Today';
    const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
    if(d.toDateString() === yesterday.toDateString()) return 'Yesterday';
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Initial state
switchTab('chats');
</script>

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix Messenger</title>
    <meta name="theme-color" content="#7C3AED">
    <meta name="color-scheme" content="light">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://unpkg.com/feather-icons"></script>
    <script>
    const EMOJI_DATA = {
      '😀': 'smileys', '😂': 'smileys', '🤣': 'smileys', '😊': 'smileys', '😍': 'smileys',
      '🥰': 'smileys', '😘': 'smileys', '😎': 'smileys', '🤩': 'smileys', '😜': 'smileys',
      '😭': 'smileys', '😢': 'smileys', '😡': 'smileys', '🤔': 'smileys', '😴': 'smileys',
      '👍': 'people', '👎': 'people', '👏': 'people', '🙌': 'people', '🤝': 'people',
      '🔥': 'smileys', '💯': 'smileys', '✨': 'smileys', '❤️': 'symbols', '💔': 'symbols'
    };
    const EMOJI_CATS = [
      { key:'all',      icon:'🙂', label:'All'       },
      { key:'smileys',  icon:'😀', label:'Smileys'   },
      { key:'people',   icon:'👍', label:'People'    },
      { key:'symbols',  icon:'❤️', label:'Symbols'   }
    ];
    const QUICK_REACTIONS = ['❤️','😂','😮','😢','😡','👍'];
    </script>
    <style>
        :root, [data-theme="light"] {
            --primary: #7C3AED;
            --primary-rgb: 124,58,237;
            --primary-gradient: linear-gradient(135deg, #7C3AED 0%, #4F46E5 100%);
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --surface2: #F1F5F9;
            --border: #E2E8F0;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --shadow-sm: 0 2px 8px rgba(148,163,184,0.08);
            --shadow-md: 0 12px 32px rgba(124,58,237,0.06);
            --danger: #EF4444;
            --success: #22C55E;
        }
        [data-theme="dark"] {
            --primary: #A78BFA;
            --primary-rgb: 167,139,250;
            --primary-gradient: linear-gradient(135deg, #A78BFA 0%, #818CF8 100%);
            --background: #09090B;
            --surface: #18181B;
            --surface2: #27272A;
            --border: #3F3F46;
            --text-primary: #F4F4F5;
            --text-secondary: #A1A1AA;
            --text-muted: #71717A;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
            --shadow-md: 0 12px 32px rgba(0,0,0,0.45);
            --danger: #F87171;
            --success: #4ADE80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        input, textarea { user-select: text; -webkit-user-select: text; }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--background); color: var(--text-primary); -webkit-font-smoothing: antialiased; overflow-x: hidden; padding-bottom: calc(90px + env(safe-area-inset-bottom)); transition: background 0.3s, color 0.3s; }

        .app-container { max-width: 100%; margin: 0 auto; padding: 16px; }
        @media(min-width: 768px) { .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 24px 0; } }

        /* Two Panel Responsive Grid Override */
        @media(min-width: 900px) {
            body { padding-bottom: 0; overflow: hidden; height: 100vh; }
            .desktop-layout { display: flex; height: 100vh; overflow: hidden; }
            .sidebar { width: 380px; min-width: 340px; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--surface); height: 100vh; }
            .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
            .sidebar-tab { flex: 1; padding: 14px 0; border: none; background: transparent; color: var(--text-muted); font-size: 12px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; }
            .sidebar-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
            .sidebar-content { flex: 1; overflow-y: auto; padding: 16px; }
            .main-panel { flex: 1; display: flex; flex-direction: column; background: var(--background); height: 100vh; overflow: hidden; position: relative; }
            .chat-window { position: static !important; transform: none !important; visibility: visible !important; flex: 1; display: flex; flex-direction: column; height: 100%; }
            .chat-window.desktop-hidden { display: none; }
            .bottom-nav-container { display: none; }
            .app-container { display: none; }
            .desktop-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; color: var(--text-muted); }
            .desktop-empty-icon { width: 80px; height: 80px; border-radius: 24px; background: rgba(var(--primary-rgb), 0.08); display: flex; align-items: center; justify-content: center; color: var(--primary); }
        }
        @media(max-width: 899px) {
            .desktop-layout, .sidebar, .main-panel { display: contents; }
            .desktop-empty { display: none; }
        }

        /* View Setup */
        .view-container { display: none; width: 100%; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .view-container.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* Shared Header Elements */
        .header { margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; padding: 4px; }
        .header h2 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
        .header-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-primary); width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-sm); }

        /* Input Controls */
        .search-box { display: flex; align-items: center; background: var(--surface); border-radius: 14px; padding: 10px 14px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); margin-bottom: 16px; }
        .search-box i { color: var(--text-muted); margin-right: 10px; }
        .search-box input { border: none; background: transparent; outline: none; width: 100%; font-size: 15px; color: var(--text-primary); }

        /* Global Cards Setup */
        .item-card { display: flex; align-items: center; gap: 14px; padding: 14px; background: var(--surface); border-radius: 18px; margin-bottom: 10px; box-shadow: var(--shadow-sm); border: 1px solid transparent; cursor: pointer; transition: background 0.2s; }
        .item-card:hover { background: var(--surface2); }
        .card-avatar { width: 48px; height: 48px; border-radius: 14px; object-fit: cover; background: var(--surface2); position: relative; }
        .status-dot { position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px; border-radius: 50%; border: 2.5px solid var(--surface); background: var(--text-muted); }
        .status-dot.online { background: var(--success); }
        .card-body { flex: 1; min-width: 0; }
        .card-title { font-weight: 700; font-size: 15px; color: var(--text-primary); display: flex; justify-content: space-between; align-items: center; }
        .card-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        /* Bottom Nav Overlay (Mobile) */
        .bottom-nav-container { position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); left: 0; right: 0; display: flex; justify-content: center; z-index: 100; padding: 0 20px; }
        .bottom-nav { background: var(--surface); border: 1px solid var(--border); padding: 8px 18px; display: flex; justify-content: space-between; align-items: center; border-radius: 28px; width: 100%; max-width: 360px; box-shadow: var(--shadow-md); }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 52px; height: 52px; background: none; border: none; cursor: pointer; color: var(--text-muted); border-radius: 50%; position: relative; transition: all 0.2s; }
        .nav-item.active { color: var(--primary); background: rgba(var(--primary-rgb), 0.08); transform: translateY(-2px); }
        .nav-item span { font-size: 10px; font-weight: 700; margin-top: 2px; display: none; }
        .nav-badge { position: absolute; top: 4px; right: 4px; background: var(--danger); color: white; font-size: 9px; font-weight: 800; border-radius: 10px; padding: 2px 5px; }

        /* Discover Feed Elements */
        .discover-grid { display: flex; flex-direction: column; gap: 14px; }
        .discover-post { background: var(--surface); border-radius: 20px; padding: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .post-author { font-weight: 700; font-size: 14px; }
        .post-tag { background: rgba(var(--primary-rgb), 0.1); color: var(--primary); font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
        .post-content { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; }
        .post-media { width: 100%; height: 180px; border-radius: 14px; object-fit: cover; background: var(--surface2); margin-bottom: 12px; }
        .post-actions { display: flex; gap: 16px; border-top: 1px solid var(--border); padding-top: 12px; }
        .action-btn { background: transparent; border: none; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .action-btn:hover { color: var(--primary); }

        /* Twitter-Style Profile Card Setup */
        .profile-card { background: var(--surface); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow-sm); }
        .profile-banner { height: 120px; background: var(--primary-gradient); position: relative; }
        .profile-avatar-row { display: flex; align-items: flex-end; justify-content: space-between; padding: 0 16px; margin-top: -40px; margin-bottom: 12px; }
        .profile-avatar-big { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--surface); object-fit: cover; background: var(--surface2); }
        .profile-meta { padding: 0 16px 16px; }
        .profile-name { font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 6px; }
        .profile-handle { font-size: 14px; color: var(--text-muted); }
        .profile-bio { font-size: 14px; color: var(--text-secondary); margin-top: 10px; line-height: 1.45; }
        .profile-stats { display: flex; gap: 20px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .stat-block { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-secondary); }
        .stat-block strong { color: var(--text-primary); font-weight: 700; }

        /* Native Dialogue replacements */
        .custom-dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.2s ease; }
        .custom-dialog { background: var(--surface); border-radius: 24px; width: 100%; max-width: 360px; padding: 24px; box-shadow: var(--shadow-md); border: 1px solid var(--border); transform: scale(0.95); animation: zoomIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .dialog-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.3px; }
        .dialog-text { font-size: 14.5px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 20px; }
        .dialog-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text-primary); font-size: 15px; outline: none; margin-bottom: 20px; }
        .dialog-input:focus { border-color: var(--primary); }
        .dialog-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        .dialog-btn { padding: 10px 18px; border-radius: 12px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; }
        .dialog-btn.cancel { background: var(--surface2); color: var(--text-secondary); }
        .dialog-btn.confirm { background: var(--primary-gradient); color: white; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { to { transform: scale(1); } }

        /* Window / Messenger Layouts */
        .chat-window { position: fixed; inset: 0; background: var(--background); z-index: 200; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1); visibility: hidden; }
        .chat-window.active { transform: translateX(0); visibility: visible; }
        .chat-topbar { display: flex; align-items: center; gap: 12px; padding: calc(12px + env(safe-area-inset-top)) 16px 12px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble-wrap { display: flex; flex-direction: column; max-width: 75%; }
        .msg-bubble-wrap.me { align-self: flex-end; align-items: flex-end; }
        .msg-bubble-wrap.other { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 12px 16px; font-size: 14.5px; line-height: 1.4; border-radius: 18px; word-break: break-word; }
        .msg-bubble-wrap.me .bubble { background: var(--primary-gradient); color: white; border-bottom-right-radius: 4px; }
        .msg-bubble-wrap.other .bubble { background: var(--surface); color: var(--text-primary); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .input-bar { padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); display: flex; gap: 10px; background: var(--surface); border-top: 1px solid var(--border); align-items: center; }
        .chat-input { flex: 1; background: var(--surface2); border: none; border-radius: 20px; padding: 12px 16px; outline: none; font-size: 15px; color: var(--text-primary); font-family: inherit; }
        .send-btn { background: var(--primary-gradient); color: white; width: 44px; height: 44px; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Configuration Row */
        .config-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border-radius: 14px; border: 1px solid var(--border); margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="desktop-layout">
        
        <div class="sidebar">
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" onclick="switchView('chats')"><i data-feather="message-square"></i>Chats<div class="nav-badge" id="badge-chats-d">2</div></button>
                <button class="sidebar-tab" onclick="switchView('friends')"><i data-feather="users"></i>Friends</button>
                <button class="sidebar-tab" onclick="switchView('discover')"><i data-feather="compass"></i>Discover</button>
                <button class="sidebar-tab" onclick="switchView('profile')"><i data-feather="user"></i>Profile</button>
            </div>
            
            <div class="sidebar-content" id="sidebar-dynamic-content">
                </div>
        </div>

        <div class="main-panel">
            <div class="desktop-empty" id="desktop-placeholder">
                <div class="desktop-empty-icon"><i data-feather="message-circle" style="width: 36px; height: 36px;"></i></div>
                <h3>Select a Conversation</h3>
                <p>Choose an ongoing discussion or check out your friend list to start messaging instantly.</p>
            </div>
            
            <div id="desktop-chat-container" style="display:none; height:100%;"></div>
        </div>
    </div>

    <div class="app-container">
        
        <div id="view-chats" class="view-container active">
            <div class="header">
                <h2>Chats</h2>
                <button class="header-btn" onclick="openNewChatWindow()"><i data-feather="plus"></i></button>
            </div>
            <div class="search-box">
                <i data-feather="search" style="width:18px;"></i>
                <input type="text" placeholder="Search conversations..." oninput="filterList(this.value, 'chats-list-m')">
            </div>
            <div id="chats-list-m"></div>
        </div>

        <div id="view-friends" class="view-container">
            <div class="header">
                <h2>Friends</h2>
                <button class="header-btn" onclick="inviteNewFriend()"><i data-feather="user-plus"></i></button>
            </div>
            <div class="search-box">
                <i data-feather="search" style="width:18px;"></i>
                <input type="text" placeholder="Search friends list..." oninput="filterList(this.value, 'friends-list-m')">
            </div>
            <div id="friends-list-m"></div>
        </div>

        <div id="view-discover" class="view-container">
            <div class="header">
                <h2>Discover</h2>
                <button class="header-btn" onclick="triggerCustomAlert('Discovery Filter', 'Global community standard lists are up to date.')"><i data-feather="sliders"></i></button>
            </div>
            <div class="discover-grid" id="discover-feed-m"></div>
        </div>

        <div id="view-profile" class="view-container">
            <div class="header">
                <h2>Profile</h2>
                <button class="header-btn" onclick="toggleInterfaceTheme()"><i data-feather="moon"></i></button>
            </div>
            <div id="profile-container-m"></div>
        </div>

        <div class="bottom-nav-container">
            <div class="bottom-nav">
                <button class="nav-item active" id="m-btn-chats" onclick="switchView('chats')">
                    <i data-feather="message-square"></i><div class="nav-badge" id="badge-chats-m">2</div>
                </button>
                <button class="nav-item" id="m-btn-friends" onclick="switchView('friends')">
                    <i data-feather="users"></i>
                </button>
                <button class="nav-item" id="m-btn-discover" onclick="switchView('discover')">
                    <i data-feather="compass"></i>
                </button>
                <button class="nav-item" id="m-btn-profile" onclick="switchView('profile')">
                    <i data-feather="user"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="mobile-chat-window" class="chat-window"></div>

    <div id="dialog-overlay" class="custom-dialog-overlay">
        <div class="custom-dialog" id="dialog-box">
            <h3 class="dialog-title" id="dialog-title">Alert</h3>
            <p class="dialog-text" id="dialog-text"></p>
            <input type="text" id="dialog-input-field" class="dialog-input" style="display: none;">
            <div class="dialog-buttons" id="dialog-buttons-container"></div>
        </div>
    </div>

    <script>
    // System Mock Datastores
    let mockUser = {
        name: "Katlego",
        handle: "katlego_vynix",
        bio: "Building spatial web modules & lightning fast interactive frameworks. ✨ Let's link up!",
        following: 142,
        followers: 983
    };

    let conversations = [
        { id: "conv_1", name: "Sarah Jenkins", avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150", text: "Are we still jumping on the review sync today?", time: "10:24 AM", unread: 2, online: true, messages: [
            { me: false, text: "Hey! Did you look over the Vynix layout designs?" },
            { me: true, text: "Yeah, they look absolutely outstanding! Clean components." },
            { me: false, text: "Are we still jumping on the review sync today?" }
        ]},
        { id: "conv_2", name: "David Chen", avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150", text: "The production server assets are successfully updated.", time: "Yesterday", unread: 0, online: false, messages: [
            { me: false, text: "The production server assets are successfully updated." }
        ]}
    ];

    let friendsList = [
        { name: "Sarah Jenkins", avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150", online: true, status: "Writing documentation..." },
        { name: "David Chen", avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150", online: false, status: "Away from keyboard" },
        { name: "Amara Okafor", avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150", online: true, status: "Designing live assets 🎨" },
        { name: "Marcus Sterling", avatar: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150", online: true, status: "In a meeting" }
    ];

    let discoverPosts = [
        { id: "post_1", author: "UI/UX Collective", tag: "Design Trend", content: "Switching back to standard high contrast Light Modes significantly lowers strain when interacting under bright sunlight setups. Modern interfaces use subtle slate tones.", likes: 432, shared: false },
        { id: "post_2", author: "Tech Node Group", tag: "Frameworks", content: "Native Dialog elements are simple, but custom inline layouts provide perfect UI continuity and fluid transitions. Check out this workspace mock!", likes: 891, shared: true }
    ];

    let activeConversationId = null;
    let currentActiveTab = "chats";

    // Standard DOM Load Initialization
    document.addEventListener("DOMContentLoaded", () => {
        feather.replace();
        renderCompleteApplication();
        
        // Listen to window changes to adapt multi-panel layouts seamlessly
        window.addEventListener('resize', renderCompleteApplication);
    });

    // Master Render Router
    function renderCompleteApplication() {
        const isDesktop = window.innerWidth >= 900;
        
        if (isDesktop) {
            renderSidebarContent();
            if (activeConversationId) {
                renderDesktopChatWindow();
            } else {
                document.getElementById('desktop-placeholder').style.display = 'flex';
                document.getElementById('desktop-chat-container').style.display = 'none';
            }
        } else {
            renderMobileViewContent();
        }
        updateBadgeCounters();
    }

    // Tab Switch Controller
    function switchView(targetTabId) {
        currentActiveTab = targetTabId;
        
        // Sync desktop sidebar tabs status
        document.querySelectorAll('.sidebar-tab').forEach(btn => {
            if(btn.removeAttribute) btn.classList.remove('active');
        });
        const activeSidebarIndex = ['chats','friends','discover','profile'].indexOf(targetTabId);
        if(activeSidebarIndex !== -1) {
            document.querySelectorAll('.sidebar-tab')[activeSidebarIndex].classList.add('active');
        }

        // Sync mobile navigation elements status
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        const mobileTargetBtn = document.getElementById(`m-btn-${targetTabId}`);
        if(mobileTargetBtn) mobileTargetBtn.classList.add('active');

        // Toggle visibility containers for mobile
        document.querySelectorAll('.view-container').forEach(view => view.classList.remove('active'));
        const mobileViewContainer = document.getElementById(`view-${targetTabId}`);
        if(mobileViewContainer) mobileViewContainer.classList.add('active');

        renderCompleteApplication();
    }

    // Badges Synchronizer
    function updateBadgeCounters() {
        let globalUnread = conversations.reduce((acc, current) => acc + current.unread, 0);
        
        const mobileBadge = document.getElementById('badge-chats-m');
        const desktopBadge = document.getElementById('badge-chats-d');
        
        if(globalUnread > 0) {
            if(mobileBadge) { mobileBadge.innerText = globalUnread; mobileBadge.style.display = 'block'; }
            if(desktopBadge) { desktopBadge.innerText = globalUnread; desktopBadge.style.display = 'flex'; }
        } else {
            if(mobileBadge) mobileBadge.style.display = 'none';
            if(desktopBadge) desktopBadge.style.display = 'none';
        }
    }

    // HTML Markup Generators
    function generateChatsListMarkup() {
        if(conversations.length === 0) return `<p style="color:var(--text-muted); text-align:center; margin-top:20px; font-size:14px;">No conversations found</p>`;
        return conversations.map(c => `
            <div class="item-card" onclick="openActiveChatConversation('${c.id}')">
                <div class="card-avatar">
                    <img src="${c.avatar}" style="width:100%; height:100%; border-radius:14px; object-fit:cover;">
                    <div class="status-dot ${c.online ? 'online' : ''}"></div>
                </div>
                <div class="card-body">
                    <div class="card-title">
                        <span>${c.name}</span>
                        <span style="font-size:11px; color:var(--text-muted); font-weight:400;">${c.time}</span>
                    </div>
                    <div class="card-subtitle ${c.unread > 0 ? 'unread' : ''}" style="${c.unread > 0 ? 'font-weight:700; color:var(--text-primary);' : ''}">
                        ${c.text}
                    </div>
                </div>
                ${c.unread > 0 ? `<div style="background:var(--primary); color:white; font-size:11px; font-weight:800; border-radius:10px; min-width:20px; height:20px; display:flex; align-items:center; justify-content:center; padding:0 6px;">${c.unread}</div>` : ''}
            </div>
        `).join('');
    }

    function generateFriendsListMarkup() {
        return friendsList.map(f => `
            <div class="item-card" onclick="startInstantFriendChat('${f.name}')">
                <div class="card-avatar">
                    <img src="${f.avatar}" style="width:100%; height:100%; border-radius:14px; object-fit:cover;">
                    <div class="status-dot ${f.online ? 'online' : ''}"></div>
                </div>
                <div class="card-body">
                    <div class="card-title"><span>${f.name}</span></div>
                    <div class="card-subtitle">${f.status}</div>
                </div>
                <button class="header-btn" style="width:32px; height:32px; border-radius:10px;" onclick="event.stopPropagation(); triggerCustomConfirm('Direct Call', 'Initiate encrypted audio sync with ${f.name}?', () => triggerCustomAlert('Calling Status', 'Connection pending...'))">
                    <i data-feather="phone" style="width:14px; color:var(--primary);"></i>
                </button>
            </div>
        `).join('');
    }

    function generateDiscoverFeedMarkup() {
        return discoverPosts.map(p => `
            <div class="discover-post">
                <div class="post-header">
                    <div style="width:36px; height:36px; border-radius:10px; background:var(--primary-gradient); color:white; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;">${p.author[0]}</div>
                    <div>
                        <div class="post-author">${p.author}</div>
                        <div style="font-size:11px; color:var(--text-muted);">Trending Public Topic</div>
                    </div>
                    <div style="margin-left:auto;" class="post-tag">${p.tag}</div>
                </div>
                <div class="post-content">${p.content}</div>
                <div class="post-actions">
                    <button class="action-btn" onclick="likeDiscoverPost(${p.id})">
                        <i data-feather="heart" style="width:16px;"></i> <span>${p.likes}</span>
                    </button>
                    <button class="action-btn" onclick="triggerCustomAlert('Shared Link', 'In-app discovery card reference link copied.')">
                        <i data-feather="share-2" style="width:16px;"></i> Share
                    </button>
                </div>
            </div>
        `).join('');
    }

    function generateProfileViewMarkup() {
        return `
            <div class="profile-card">
                <div class="profile-banner"></div>
                <div class="profile-avatar-row">
                    <img class="profile-avatar-big" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150">
                    <button class="dialog-btn confirm" style="padding:6px 14px; font-size:12px; border-radius:20px;" onclick="editCurrentProfileBio()">Edit Profile</button>
                </div>
                <div class="profile-meta">
                    <div class="profile-name" id="prof-name-field">${mockUser.name} <i data-feather="check-circle" style="width:16px; color:var(--primary); fill:var(--surface2);"></i></div>
                    <div class="profile-handle">@${mockUser.handle}</div>
                    <div class="profile-bio" id="prof-bio-field">${mockUser.bio}</div>
                    <div class="profile-stats">
                        <div class="stat-block"><strong>${mockUser.following}</strong> Following</div>
                        <div class="stat-block"><strong>${mockUser.followers}</strong> Followers</div>
                    </div>
                </div>
            </div>
            <div class="config-row" onclick="toggleInterfaceTheme()">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i data-feather="moon" style="color:var(--text-secondary);"></i>
                    <span style="font-size:14.5px; font-weight:600;">Dark Theme Mode</span>
                </div>
                <div style="color:var(--text-muted); font-size:13px;" id="theme-indicator-txt">Off</div>
            </div>
            <div class="config-row" style="margin-top:8px; color:var(--danger); border-color:rgba(239,68,68,0.15);" onclick="triggerCustomConfirm('Account Action', 'Are you absolutely sure you want to log out of Vynix?', () => triggerCustomAlert('Logout Success', 'Session safely destroyed.'))">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i data-feather="log-out" style="color:var(--danger);"></i>
                    <span style="font-size:14.5px; font-weight:600;">Disconnect Session</span>
                </div>
            </div>
        `;
    }

    // Synchronization Builders
    function renderSidebarContent() {
        const holder = document.getElementById('sidebar-dynamic-content');
        if (currentActiveTab === "chats") {
            holder.innerHTML = `<h3 style="font-size:20px; font-weight:800; margin-bottom:12px;">Chats</h3>` + generateChatsListMarkup();
        } else if (currentActiveTab === "friends") {
            holder.innerHTML = `<div style="display:flex; justify-content:between; align-items:center; margin-bottom:12px;"><h3 style="font-size:20px; font-weight:800;">Friends</h3><button class="header-btn" style="width:32px; height:32px;" onclick="inviteNewFriend()"><i data-feather="user-plus" style="width:14px;"></i></button></div>` + generateFriendsListMarkup();
        } else if (currentActiveTab === "discover") {
            holder.innerHTML = `<h3 style="font-size:20px; font-weight:800; margin-bottom:12px;">Discover</h3>` + generateDiscoverFeedMarkup();
        } else if (currentActiveTab === "profile") {
            holder.innerHTML = `<h3 style="font-size:20px; font-weight:800; margin-bottom:12px;">Profile</h3>` + generateProfileViewMarkup();
        }
        feather.replace();
    }

    function renderMobileViewContent() {
        document.getElementById('chats-list-m').innerHTML = generateChatsListMarkup();
        document.getElementById('friends-list-m').innerHTML = generateFriendsListMarkup();
        document.getElementById('discover-feed-m').innerHTML = generateDiscoverFeedMarkup();
        document.getElementById('profile-container-m').innerHTML = generateProfileViewMarkup();
        feather.replace();
    }

    // Chat Conversation Windows Management
    function openActiveChatConversation(id) {
        activeConversationId = id;
        let conversation = conversations.find(c => c.id === id);
        conversation.unread = 0;
        updateBadgeCounters();

        const isDesktop = window.innerWidth >= 900;
        const layoutMarkup = generateChatWindowMarkup(conversation);

        if(isDesktop) {
            const rightPane = document.getElementById('desktop-chat-container');
            document.getElementById('desktop-placeholder').style.display = 'none';
            rightPane.style.display = 'block';
            rightPane.innerHTML = layoutMarkup;
            scrollActiveThreadToBottom('desktop-msg-area');
        } else {
            const over = document.getElementById('mobile-chat-window');
            over.innerHTML = layoutMarkup;
            over.classList.add('active');
            scrollActiveThreadToBottom('mobile-msg-area');
        }
        feather.replace();
    }

    function generateChatWindowMarkup(conv) {
        return `
            <div class="chat-topbar">
                <button class="back-btn" onclick="closeActiveChatConversation()"><i data-feather="arrow-left" style="width:18px;"></i></button>
                <img src="${conv.avatar}" style="width:38px; height:38px; border-radius:12px; object-fit:cover;">
                <div>
                    <div style="font-weight:700; font-size:15px;">${conv.name}</div>
                    <div style="font-size:11px; color:var(--text-muted);">${conv.online ? 'Active Now' : 'Offline'}</div>
                </div>
            </div>
            <div class="messages-area" id="${window.innerWidth >= 900 ? 'desktop-msg-area' : 'mobile-msg-area'}">
                ${conv.messages.map(m => `
                    <div class="msg-bubble-wrap ${m.me ? 'me' : 'other'}">
                        <div class="bubble">${m.text}</div>
                    </div>
                `).join('')}
            </div>
            <div class="input-bar">
                <input type="text" class="chat-input" id="active-input-node" placeholder="Type your message..." onkeydown="handleInputSubmissionEvent(event)">
                <button class="send-btn" onclick="submitMessageFromActiveNode()"><i data-feather="send" style="width:16px;"></i></button>
            </div>
        `;
    }

    function closeActiveChatConversation() {
        activeConversationId = null;
        document.getElementById('mobile-chat-window').classList.remove('active');
        renderCompleteApplication();
    }

    function handleInputSubmissionEvent(e) {
        if(e.key === 'Enter') {
            submitMessageFromActiveNode();
        }
    }

    function submitMessageFromActiveNode() {
        const input = document.getElementById('active-input-node');
        if(!input || !input.value.trim()) return;

        let activeConv = conversations.find(c => c.id === activeConversationId);
        activeConv.messages.push({ me: true, text: input.value.trim() });
        activeConv.text = input.value.trim();
        activeConv.time = "Just now";

        input.value = "";
        
        // Re-render open target frame instantly
        const areaId = window.innerWidth >= 900 ? 'desktop-msg-area' : 'mobile-msg-area';
        document.getElementById(areaId).innerHTML = activeConv.messages.map(m => `
            <div class="msg-bubble-wrap ${m.me ? 'me' : 'other'}">
                <div class="bubble">${m.text}</div>
            </div>
        `).join('');
        
        scrollActiveThreadToBottom(areaId);
        renderSidebarContent();
    }

    function scrollActiveThreadToBottom(id) {
        setTimeout(() => {
            const el = document.getElementById(id);
            if(el) el.scrollTop = el.scrollHeight;
        }, 30);
    }

    // Features Logic Interactions
    function openNewChatWindow() {
        triggerCustomPrompt("New Chat Thread", "Enter a username to initiate a clean message chain:", (name) => {
            if(!name) return;
            let newId = "conv_" + (conversations.length + 1);
            conversations.unshift({
                id: newId,
                name: name,
                avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150",
                text: "Conversation thread initialized.",
                time: "12:00 PM",
                unread: 0,
                online: true,
                messages: [{ me: true, text: "Hey! Let's start typing here." }]
            });
            switchView('chats');
            openActiveChatConversation(newId);
        });
    }

    function inviteNewFriend() {
        triggerCustomPrompt("Add Connection", "Type Vynix unique user handle registration code:", (handle) => {
            if(!handle) return;
            friendsList.push({
                name: handle,
                avatar: "https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?w=150",
                online: true,
                status: "Fresh connection status!"
            });
            triggerCustomAlert("Success", `@${handle} added to your workspace friends list.`);
            renderCompleteApplication();
        });
    }

    function startInstantFriendChat(friendName) {
        let existing = conversations.find(c => c.name === friendName);
        if(existing) {
            switchView('chats');
            openActiveChatConversation(existing.id);
        } else {
            let newId = "conv_" + (conversations.length + 1);
            conversations.unshift({
                id: newId,
                name: friendName,
                avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150",
                text: "Direct network handshake established.",
                time: "Just now",
                unread: 0,
                online: true,
                messages: [{ me: false, text: "Hey there! Realized we're connected now." }]
            });
            switchView('chats');
            openActiveChatConversation(newId);
        }
    }

    function editCurrentProfileBio() {
        triggerCustomPrompt("Update Bio", "Modify your current account text info:", (newBio) => {
            if(!newBio) return;
            mockUser.bio = newBio;
            renderCompleteApplication();
        });
    }

    function likeDiscoverPost(postId) {
        // Increment discovery count instantly
        triggerCustomAlert("Post Liked", "Your upvote was recorded onto the global community index framework.");
    }

    function toggleInterfaceTheme() {
        const doc = document.documentElement;
        const currentTheme = doc.getAttribute('data-theme') || 'light';
        const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
        
        doc.setAttribute('data-theme', targetTheme);
        doc.style.colorScheme = targetTheme;
        
        const indicator = document.getElementById('theme-indicator-txt');
        if(indicator) indicator.innerText = targetTheme === 'dark' ? 'On' : 'Off';
    }

    function filterList(query, containerId) {
        let lower = query.toLowerCase();
        let parent = document.getElementById(containerId);
        if(!parent) return;
        let cards = parent.getElementsByClassName('item-card');
        for(let card of cards) {
            let txt = card.innerText.toLowerCase();
            card.style.display = txt.includes(lower) ? 'flex' : 'none';
        }
    }

    // ── GORGEOUS REUSABLE NATIVE-REPLACEMENT DIALOGS CONTROLLERS ──
    let currentDialogCallback = null;

    function displayOverlayContainer() {
        const overlay = document.getElementById('dialog-overlay');
        overlay.style.display = 'flex';
        document.getElementById('dialog-input-field').style.display = 'none';
    }

    function closeOverlayContainer() {
        document.getElementById('dialog-overlay').style.display = 'none';
        currentDialogCallback = null;
    }

    function triggerCustomAlert(title, text) {
        displayOverlayContainer();
        document.getElementById('dialog-title').innerText = title;
        document.getElementById('dialog-text').innerText = text;
        
        document.getElementById('dialog-buttons-container').innerHTML = `
            <button class="dialog-btn confirm" onclick="closeOverlayContainer()">Acknowledge</button>
        `;
    }

    function triggerCustomConfirm(title, text, confirmSuccessCallback) {
        displayOverlayContainer();
        document.getElementById('dialog-title').innerText = title;
        document.getElementById('dialog-text').innerText = text;
        currentDialogCallback = confirmSuccessCallback;

        document.getElementById('dialog-buttons-container').innerHTML = `
            <button class="dialog-btn cancel" onclick="closeOverlayContainer()">Cancel</button>
            <button class="dialog-btn confirm" onclick="executeDialogCallbackAction()">Proceed</button>
        `;
    }

    function triggerCustomPrompt(title, text, promptSubmitCallback) {
        displayOverlayContainer();
        document.getElementById('dialog-title').innerText = title;
        document.getElementById('dialog-text').innerText = text;
        
        const inputNode = document.getElementById('dialog-input-field');
        inputNode.style.display = 'block';
        inputNode.value = "";
        inputNode.focus();

        currentDialogCallback = promptSubmitCallback;

        document.getElementById('dialog-buttons-container').innerHTML = `
            <button class="dialog-btn cancel" onclick="closeOverlayContainer()">Cancel</button>
            <button class="dialog-btn confirm" onclick="executePromptCallbackAction()">Submit</button>
        `;
    }

    function executeDialogCallbackAction() {
        if(currentDialogCallback) currentDialogCallback();
        closeOverlayContainer();
    }

    function executePromptCallbackAction() {
        const val = document.getElementById('dialog-input-field').value;
        if(currentDialogCallback) currentDialogCallback(val);
        closeOverlayContainer();
    }
    </script>
</body>
</html>
